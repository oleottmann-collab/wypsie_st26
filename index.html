 Ergebnis: 30 Jahre Nachkriegs-Wohlstand.","a_short":"Internationale Nachkriegsordnung: Feste Wechselkurse (Dollar als Leitwährung, goldgedeckt). Gründung von IWF (Krisenstabilisierung) und Weltbank (Entwicklung/Wiederaufbau).","extra":{"erklaerung":"Internationale Nachkriegsordnung: Feste Wechselkurse (Dollar als Leitwährung, goldgedeckt). Gründung von IWF (Krisenstabilisierung) und Weltbank (Entwicklung/Wiederaufbau). Keynesianisch geprägt — internationale Kooperation statt Protektionismus. Ergebnis: 30 Jahre Nachkriegs-Wohlstand."},"hasInfo":true},{"id":214,"cat":"Vertiefungen","q":"Warum ist die Schuldenbremse eher hayek-nah?","a":"Art. 109 GG begrenzt Neuverschuldung auf 0,35% BIP. Spiegelt Hayeks Misstrauen gegenüber Staatsausgaben: Schulden erzeugen Inflation, verzerren Zinsen, belasten künftige Generationen. \nKeynes-Gegenargument: In tiefen Krisen sind Schulden nötig, um Nachfrage zu stützen — sonst Deflationsspirale.","a_short":"Art. 109 GG begrenzt Neuverschuldung auf 0,35% BIP.","extra":{"erklaerung":"Art. 109 GG begrenzt Neuverschuldung auf 0,35% BIP. Spiegelt Hayeks Misstrauen gegenüber Staatsausgaben: Schulden erzeugen Inflation, verzerren Zinsen, belasten künftige Generationen. \nKeynes-Gegenargument: In tiefen Krisen sind Schulden nötig, um Nachfrage zu stützen — sonst Deflationsspirale."},"hasInfo":true},{"id":215,"cat":"Vertiefungen","q":"Was ist der fundamentale Unterschied zwischen Keynes und Hayek?","a":"Keynes: Staat stabilisiert — Märkte versagen kurzfristig, Fiskalpolitik notwendig.\nHayek: Markt heilt sich selbst — staatliche Eingriffe verlängern Krisen, verzerren Preissignale.\nKerndifferenz: Vertrauen in den Staat (Keynes) vs. Vertrauen in den Markt (Hayek).","a_short":"Keynes: Staat stabilisiert — Märkte versagen kurzfristig, Fiskalpolitik notwendig. Hayek: Markt heilt sich selbst — staatliche Eingriffe verlängern Krisen, verzerren Preissignale.","extra":{"definition":"Keynes: Staat stabilisiert — Märkte versagen kurzfristig, Fiskalpolitik notwendig.","erklaerung":"Keynes: Staat stabilisiert — Märkte versagen kurzfristig, Fiskalpolitik notwendig.\nHayek: Markt heilt sich selbst — staatliche Eingriffe verlängern Krisen, verzerren Preissignale.\nKerndifferenz: Vertrauen in den Staat (Keynes) vs. Vertrauen in den Markt (Hayek)."},"hasInfo":true},{"id":216,"cat":"Vertiefungen","q":"Wie verlief die ideologische Pendelbewegung des 20./21. Jahrhunderts?","a":"1900–1930: Freie Märkte dominieren. \n1930–1970: New Deal, Wohlfahrtsstaat — Keynes dominiert. \n1970er: Stagflation → Krise des Keynesianismus. 1980–2008: Thatcher, Reagan, Washington Consensus — Hayek dominiert. \n2008: Finanzkrise → Keynes-Revival (Konjunkturpakete, QE). 2020er: Unübersichtlichkeit — beide Seiten haben Argumente.","a_short":"1900–1930: Freie Märkte dominieren. 1930–1970: New Deal, Wohlfahrtsstaat — Keynes dominiert.","extra":{"erklaerung":"1900–1930: Freie Märkte dominieren. \n1930–1970: New Deal, Wohlfahrtsstaat — Keynes dominiert. \n1970er: Stagflation → Krise des Keynesianismus. 1980–2008: Thatcher, Reagan, Washington Consensus — Hayek dominiert. \n2008: Finanzkrise → Keynes-Revival (Konjunkturpakete, QE). 2020er: Unübersichtlichkeit — beide Seiten haben Argumente."},"hasInfo":true},{"id":217,"cat":"Vertiefungen","q":"Was ist die Kernthese von Keynes?","a":"Märkte können versagen. In Rezessionen entsteht Nachfragemangel und Arbeitslosigkeit. Der Staat muss durch Fiskalpolitik (Staatsausgaben, Steuersenkungen) gegensteuern.\nZiel: Kapitalismus stabilisieren, nicht abschaffen. Begründer der Makroökonomie.","a_short":"Märkte können versagen. In Rezessionen entsteht Nachfragemangel und Arbeitslosigkeit.","extra":{"erklaerung":"Märkte können versagen. In Rezessionen entsteht Nachfragemangel und Arbeitslosigkeit. Der Staat muss durch Fiskalpolitik (Staatsausgaben, Steuersenkungen) gegensteuern.\nZiel: Kapitalismus stabilisieren, nicht abschaffen. Begründer der Makroökonomie."},"hasInfo":true},{"id":218,"cat":"Vertiefungen","q":"welche Uni/ schools sind mit diesen Richtungen assoziiert?","a":"Keynes: Cambridge, Harvard\nHayek: chicago school, London school of economics","a_short":"Keynes: Cambridge, Harvard\nHayek: chicago school, London school of economics","extra":{},"hasInfo":false},{"id":219,"cat":"Vertiefungen","q":"Was war LTCM (1998) und welche Lehre zog man daraus?","a":"Long-Term Capital Management — US-Hedgefonds mit extremem Leverage (bis 1:50). Russland-Default 1998 → Verluste explodierten → systemisches Risiko für globale Finanzmärkte. Fed koordinierte private Rettung (kein Steuergeld). \nLehre: Too big to fail — systemisches Risiko erfordert Regulierung.","a_short":"Long-Term Capital Management — US-Hedgefonds mit extremem Leverage (bis 1:50). Russland-Default 1998 → Verluste explodierten → systemisches Risiko für globale Finanzmärkte.","extra":{"erklaerung":"Long-Term Capital Management — US-Hedgefonds mit extremem Leverage (bis 1:50). Russland-Default 1998 → Verluste explodierten → systemisches Risiko für globale Finanzmärkte. Fed koordinierte private Rettung (kein Steuergeld). \nLehre: Too big to fail — systemisches Risiko erfordert Regulierung."},"hasInfo":true},{"id":220,"cat":"Vertiefungen","q":"Welche Grundlage fehlt teilweise in den Entwicklungsländrn, um an den globalen Entwicklungen zu partizipieren?","a":"(Handschlag-prinzip) *Propertyrights* - Verbriefung von Rechten (wem gehört was?)","a_short":"(Handschlag-prinzip) *Propertyrights* - Verbriefung von Rechten (wem gehört was?)","extra":{},"hasInfo":false},{"id":221,"cat":"Vertiefungen","q":"Was bedeutet: „Globalisierung schafft Gewinner und Verlierer\"?","a":"Gewinner: \n• Konsumenten (günstigere Güter)\n• Emerging Markets (Exportwachstum)\n• multinationale Konzerne.\nVerlierer: \n• Industriearbeiter in Hochlohnländern\n• Bauern in EL durch subventionierte Importe\n• \nlokale Umwelt. Politische\nFolge: Abstiegsängste → Populismus (Trump, Brexit, Le Pen).","a_short":"Gewinner: \n• Konsumenten (günstigere Güter)\n• Emerging Markets (Exportwachstum)\n• multinationale Konzerne.\nVerlierer: \n• Industriearbeiter in Hochlohnländern\n• Bauern in EL durch subventionierte Importe\n• \nlokale Umwelt. Politische\nFolge: Abstiegsängste → Populismus (Trump, Brexit, Le Pen).","extra":{},"hasInfo":false},{"id":222,"cat":"Vertiefungen","q":"Klausurfrage: Warum scheiterte der Washington Consensus in vielen Ländern?","a":"1. Fehlende Institutionen: \nPrivatisierung ohne Wettbewerbsrecht → Monopole. \nKapitalöffnung ohne Bankenaufsicht → Krisen. \n2. Soziale Folgen ignoriert: Sparmaßnahmen ohne Kompensation → Armut stieg, politische Instabilität. \n3. Einheitslösung ohne Kontext: „One size fits all\" ignoriert unterschiedliche Ausgangsbedingungen. China war mit staatlich gelenkter Öffnung erfolgreich — ganz ohne Washington Consensus.","a_short":"1. Fehlende Institutionen: \nPrivatisierung ohne Wettbewerbsrecht → Monopole. \nKapitalöffnung ohne Bankenaufsicht → Krisen. \n2. Soziale Folgen ignoriert: Sparmaßnahmen ohne Kompensation → Armut stieg, politische Instabilität. \n3. Einheitslösung ohne Kontext: „One size fits all\" ignoriert unterschiedliche Ausgangsbedingungen. China war mit staatlich gelenkter Öffnung erfolgreich — ganz ohne Washington Consensus.","extra":{},"hasInfo":false},{"id":223,"cat":"Vertiefungen","q":"Was ist der Unterschied zwischen IWF und Weltbank?","a":"IWF = Feuerwehr: Kurzfristige Krisenkredite, Währungsstabilität, Strukturanpassungsauflagen (Conditionality). Weltbank = Architekt: Langfristige Entwicklungsprojekte für Infrastruktur, Bildung, Gesundheit in Entwicklungsländern. Armutsreduktion. Beide 1944 in Bretton Woods gegründet, USA-dominiert.","a_short":"IWF = Feuerwehr: Kurzfristige Krisenkredite, Währungsstabilität, Strukturanpassungsauflagen (Conditionality). Weltbank = Architekt: Langfristige Entwicklungsprojekte für Infrastruktur, Bildung, Gesundheit in Entwicklungsländern.","extra":{"definition":"IWF = Feuerwehr: Kurzfristige Krisenkredite, Währungsstabilität, Strukturanpassungsauflagen (Conditionality).","erklaerung":"IWF = Feuerwehr: Kurzfristige Krisenkredite, Währungsstabilität, Strukturanpassungsauflagen (Conditionality). Weltbank = Architekt: Langfristige Entwicklungsprojekte für Infrastruktur, Bildung, Gesundheit in Entwicklungsländern. Armutsreduktion. Beide 1944 in Bretton Woods gegründet, USA-dominiert."},"hasInfo":true},{"id":224,"cat":"Vertiefungen","q":"Was ist die These von Hernando de Soto zu Eigentumsrechten?","a":"Armut in Entwicklungsländern liegt nicht an fehlendem Kapital, sondern an fehlenden formalen Eigentumsrechten. Informelles Eigentum = „Dead Capital\" — nicht beleihbar, nicht investierbar. \nLösung: Formalisierung (Grundbuch, Register, Vertragsrecht) → Kreditzugang → Investitionen → Wohlstand.","a_short":"Armut in Entwicklungsländern liegt nicht an fehlendem Kapital, sondern an fehlenden formalen Eigentumsrechten. Informelles Eigentum = „Dead Capital\" — nicht beleihbar, nicht investierbar.","extra":{"definition":"Armut in Entwicklungsländern liegt nicht an fehlendem Kapital, sondern an fehlenden formalen Eigentumsrechten.","erklaerung":"Armut in Entwicklungsländern liegt nicht an fehlendem Kapital, sondern an fehlenden formalen Eigentumsrechten. Informelles Eigentum = „Dead Capital\" — nicht beleihbar, nicht investierbar. \nLösung: Formalisierung (Grundbuch, Register, Vertragsrecht) → Kreditzugang → Investitionen → Wohlstand."},"hasInfo":true},{"id":225,"cat":"Vertiefungen","q":"Woher stammt der Begriff Commanding Heights, der der Dokureihe den Namen gibt?","a":"Von Lenin (1922): Er bezeichnete damit die Schluesselsektoren der Wirtschaft (Stahl, Eisenbahn, Kohle, Schwerindustrie), die der Staat kontrollieren sollte. Die Doku nutzt den Begriff fuer die Grundfrage: Markt oder Staat steuert die Schluesselsektoren?","a_short":"Von Lenin (1922): Er bezeichnete damit die Schluesselsektoren der Wirtschaft (Stahl, Eisenbahn, Kohle, Schwerindustrie), die der Staat kontrollieren sollte. Die Doku nutzt den Begriff fuer die Grundfrage: Markt oder Staat steuert die Schluesselsektoren?","extra":{},"hasInfo":false},{"id":226,"cat":"Vertiefungen","q":"Was ist die zentrale Erzaehlung der Dokureihe Commanding Heights?","a":"Der Battle of Ideas des 20. Jahrhunderts: der Pendelschlag zwischen staatlicher Steuerung (Keynes) und freien Maerkten (Hayek/Friedman), und wer die Regeln der globalen Wirtschaft schreibt.","a_short":"Der Battle of Ideas des 20. Jahrhunderts: der Pendelschlag zwischen staatlicher Steuerung (Keynes) und freien Maerkten (Hayek/Friedman), und wer die Regeln der globalen Wirtschaft schreibt.","extra":{"definition":"Der Battle of Ideas des 20."},"hasInfo":true},{"id":227,"cat":"Vertiefungen","q":"Was war Hayeks zentrales Werk gegen die Planungseuphorie und wann erschien es?","a":"The Road to Serfdom (1944). These: Zentrale staatliche Planung gefaehrdet die Freiheit und kann in die Diktatur fuehren. Wurde anfangs als reaktionaer abgetan, beeinflusste aber u.a. Churchill.","a_short":"The Road to Serfdom (1944). These: Zentrale staatliche Planung gefaehrdet die Freiheit und kann in die Diktatur fuehren. Wurde anfangs als reaktionaer abgetan, beeinflusste aber u.a. Churchill.","extra":{},"hasInfo":false},{"id":228,"cat":"Vertiefungen","q":"Was war die Mont Pelerin Society?","a":"Die 1947 von Hayek mitgegruendete Gesellschaft liberaler Oekonomen (u.a. Friedman), die in der Hochphase des Keynesianismus die Ideen von Freiheit und Wettbewerb pflegte. Keimzelle der spaeteren marktliberalen Wende.","a_short":"Die 1947 von Hayek mitgegruendete Gesellschaft liberaler Oekonomen (u.a. Friedman), die in der Hochphase des Keynesianismus die Ideen von Freiheit und Wettbewerb pflegte.","extra":{"erklaerung":"Die 1947 von Hayek mitgegruendete Gesellschaft liberaler Oekonomen (u.a. Friedman), die in der Hochphase des Keynesianismus die Ideen von Freiheit und Wettbewerb pflegte. Keimzelle der spaeteren marktliberalen Wende."},"hasInfo":true},{"id":229,"cat":"Vertiefungen","q":"Was kennzeichnete den wirtschaftspolitischen Nachkriegskonsens (ca. 1945 bis 1970)?","a":"Dominanz keynesianischer Ideen: aktive Nachfragesteuerung, Wohlfahrtsstaat und Verstaatlichung der Commanding Heights (Kernindustrien in Staatsbesitz, z.B. unter Attlee in Grossbritannien).","a_short":"Dominanz keynesianischer Ideen: aktive Nachfragesteuerung, Wohlfahrtsstaat und Verstaatlichung der Commanding Heights (Kernindustrien in Staatsbesitz, z.B. unter Attlee in Grossbritannien).","extra":{},"hasInfo":false},{"id":230,"cat":"Vertiefungen","q":"Welches Phaenomen der 1970er-Jahre diskreditierte den naiven Keynesianismus?","a":"Die Stagflation (gleichzeitig hohe Arbeitslosigkeit UND Inflation), die das keynesianische Modell nicht erklaeren konnte. Friedman: Die Stagflation war das Ende des naiven Keynesianismus.","a_short":"Die Stagflation (gleichzeitig hohe Arbeitslosigkeit UND Inflation), die das keynesianische Modell nicht erklaeren konnte. Friedman: Die Stagflation war das Ende des naiven Keynesianismus.","extra":{},"hasInfo":false},{"id":231,"cat":"Vertiefungen","q":"Wie kam Hayeks und Friedmans Denken ab 1980 an die Macht?","a":"Ueber Margaret Thatcher (GB) und Ronald Reagan (USA): Deregulierung, Privatisierung der Commanding Heights (Thatcher verkaufte Strom, Telefon, Gas, Kohle, Stahl, Bahn) und Friedmans Monetarismus.","a_short":"Ueber Margaret Thatcher (GB) und Ronald Reagan (USA): Deregulierung, Privatisierung der Commanding Heights (Thatcher verkaufte Strom, Telefon, Gas, Kohle, Stahl, Bahn) und Friedmans Monetarismus.","extra":{},"hasInfo":false},{"id":232,"cat":"Vertiefungen","q":"Worum geht es in Teil 3 (The New Rules of the Game)?","a":"Um die Globalisierungsaera ab den 1990ern: die groesste Ausweitung des Welthandels der Geschichte, die Debatte ueber Gewinner und Verlierer und darueber, wer die neuen Regeln der vernetzten Weltwirtschaft schreibt.","a_short":"Um die Globalisierungsaera ab den 1990ern: die groesste Ausweitung des Welthandels der Geschichte, die Debatte ueber Gewinner und Verlierer und darueber, wer die neuen Regeln der vernetzten Weltwirtschaft schreibt.","extra":{},"hasInfo":false},{"id":233,"cat":"Vertiefungen","q":"Welche Lehre zieht Teil 3 aus den Finanzkrisen der 1990er (z.B. Asienkrise)?","a":"In einer eng vernetzten Weltwirtschaft breiten sich Krisen als globale Ansteckung (contagion) aus. Marktoeffnung ohne stabile Institutionen und Aufsicht ist gefaehrlich; es braucht neue Regeln und Sicherungsnetze.","a_short":"In einer eng vernetzten Weltwirtschaft breiten sich Krisen als globale Ansteckung (contagion) aus. Marktoeffnung ohne stabile Institutionen und Aufsicht ist gefaehrlich; es braucht neue Regeln und Sicherungsnetze.","extra":{},"hasInfo":false},{"id":234,"cat":"Vertiefungen","q":"Ist der Battle of Ideas (Keynes gegen Hayek) laut Commanding Heights entschieden?","a":"Nein. Das Pendel schlug mehrfach (Markt 1900-1930, Keynes 1930-1970, Hayek 1980-2008, Keynes-Revival ab 2008). Globalisierung, Nachhaltigkeit, Populismus und Krisen halten die Debatte offen.","a_short":"Nein. Das Pendel schlug mehrfach (Markt 1900-1930, Keynes 1930-1970, Hayek 1980-2008, Keynes-Revival ab 2008). Globalisierung, Nachhaltigkeit, Populismus und Krisen halten die Debatte offen.","extra":{},"hasInfo":false},{"id":235,"cat":"Finanzpsychologie","q":"Warum beruhen Geldsysteme auf Vertrauen – und welche besonderen Anforderungen gelten für Buchgeld?","a":"Geldsysteme beruhen auf drei Vertrauensebenen :\n• Geld wird auch künftig als Zahlungsmittel angenommen \n• Die Wirtschaft produziert weiter die nachgefragten Güter \n• Der Geldwert bleibt stabil (Geldmenge im Einklang mit Produktion)\nBuchgeld (elektronisches Geld) erfordert zusätzliches Vertrauen: Es ist kein gesetzliches Zahlungsmittel, kann bei Bankzusammenbruch verloren gehen und setzt Vertrauen in die Bank voraus.\nMerke: Bitcoin zeigt dasselbe Prinzip – Kurse brechen ein, sobald Vertrauen schwindet.","a_short":"Geldsysteme beruhen auf drei Vertrauensebenen :\n• Geld wird auch künftig als Zahlungsmittel angenommen \n• Die Wirtschaft produziert weiter die nachgefragten Güter \n• Der Geldwert bleibt stabil (Geldmenge im Einklang mit Produktion)\nBuchgeld (elektronisches Geld) erfordert zusätzliches Vertrauen: Es ist kein gesetzliches Zahlungsmittel, kann bei Bankzusammenbruch verloren gehen und setzt Vertrauen in die Bank voraus.\nMerke: Bitcoin zeigt dasselbe Prinzip – Kurse brechen ein, sobald Vertrauen schwindet.","extra":{"merkhilfe":"Merke: Bitcoin zeigt dasselbe Prinzip – Kurse brechen ein, sobald Vertrauen schwindet."},"hasInfo":true},{"id":236,"cat":"Finanzpsychologie","q":"Welche Bedeutungen hat Geld jenseits seiner ökonomischen Tauschmittelfunktion – und welche psychologischen Grenzen hat diese Funktion?","a":"Symbolkraft: Geld steht für Erfolg, Macht, Status, Unabhängigkeit, Sicherheit.\nPsychologische Grenzen der Tauschmittelfunktion: \n• Geldgeschenke unter Erwachsenen sind sozial verpönt\n• Monetäre Anreize gegen unerwünschtes Verhalten können dieses verstärken (Bsp. Kindergarten-Bußen: mehr Verspätungen)\n• Intrinsische Motivation kann durch Bezahlung verdrängt werden\nKontextabhängigkeit: Erscheinungsform (Bargeld vs. Karte), Erwerbskontext (Arbeit vs. Erbschaft), Situation (Weihnachten vs. Alltag) beeinflussen alle das Gelderleben.\nStichwort: Mental Accounting (Thaler, 1985) – unterschiedliche mentale Konten je nach Herkunft des Geldes.","a_short":"Symbolkraft: Geld steht für Erfolg, Macht, Status, Unabhängigkeit, Sicherheit.\nPsychologische Grenzen der Tauschmittelfunktion: \n• Geldgeschenke unter Erwachsenen sind sozial verpönt\n• Monetäre Anreize gegen unerwünschtes Verhalten können dieses verstärken (Bsp. Kindergarten-Bußen: mehr Verspätungen)\n• Intrinsische Motivation kann durch Bezahlung verdrängt werden\nKontextabhängigkeit: Erscheinungsform (Bargeld vs. Karte), Erwerbskontext (Arbeit vs. Erbschaft), Situation (Weihnachten vs. Alltag) beeinflussen alle das Gelderleben.\nStichwort: Mental Accounting (Thaler, 1985) – unterschiedliche mentale Konten je nach Herkunft des Geldes.","extra":{"beispiel":"(z. B. Kindergarten-Bußen: mehr Verspätungen)","merkhilfe":"Stichwort: Mental Accounting (Thaler, 1985) – unterschiedliche mentale Konten je nach Herkunft des Geldes."},"hasInfo":true},{"id":237,"cat":"Finanzpsychologie","q":"Was ist die Geldillusion (Geldwertillusion) – und wie zeigt sie sich konkret auf Arbeitsmärkten? (Shafir et al., 1997)","a":"Definition: Menschen denken in nominalen Geldeinheiten, auch wenn die realen Einheiten relevant wären.\nKernbeispiel (Shafir et al. 1997): \n+2 % Nominallohn bei 4 % Inflation = −2 % Reallohn → trotzdem positiver bewertet als −2 % Nominallohn bei 0 % Inflation (= identische reale Senkung) \nKonsequenz: Unternehmen können in Hochinflationsphasen leichter Reallöhne senken – ohne Widerstand der Arbeitnehmer. Damit kann Beschäftigung kurzfristig erhöht werden (Akerlof et al., 2000).\n10.2 Entscheidungen über Finanzen – Theorien & Anomalien","a_short":"Definition: Menschen denken in nominalen Geldeinheiten, auch wenn die realen Einheiten relevant wären. Kernbeispiel (Shafir et al.","extra":{"definition":"Definition: Menschen denken in nominalen Geldeinheiten, auch wenn die realen Einheiten relevant wären.","erklaerung":"Definition: Menschen denken in nominalen Geldeinheiten, auch wenn die realen Einheiten relevant wären.\nKernbeispiel (Shafir et al. 1997): \n+2 % Nominallohn bei 4 % Inflation = −2 % Reallohn → trotzdem positiver bewertet als −2 % Nominallohn bei 0 % Inflation (= identische reale Senkung) \nKonsequenz: Unternehmen können in Hochinflationsphasen leichter Reallöhne senken – ohne Widerstand der Arbeitnehmer. Damit kann Beschäftigung kurzfristig erhöht werden (Akerlof et al., 2000).\n10.2 Entscheidungen über Finanzen – Theorien & Anomalien"},"hasInfo":true},{"id":238,"cat":"Finanzpsychologie","q":"Was besagt die Erwartungsnutzentheorie (Expected Utility Theory) – und welche Annahmen liegen ihr zugrunde?","a":"Kern: Menschen handeln rational – sie berechnen den erwarteten Nutzen aller Alternativen und wählen die mit dem größten Gesamtnutzen.\nEU_j = Σ u_jk × p_jk \nu = subjektiver Nutzen der Konsequenz; p = subjektive Wahrscheinlichkeit\nZwei Rationalitätsannahmen: \n• Korrekte Vorstellungen über Umwelt und andere Akteure\n• Stabile, von Emotionen unabhängige Präferenzen\nStatus: Heute primär normative Theorie (wie man entscheiden sollte). Als deskriptive Theorie wird zunehmend die Prospect Theory bevorzugt.\nBegründer: Von Neumann & Morgenstern (1944); Savage (1954)","a_short":"Kern: Menschen handeln rational – sie berechnen den erwarteten Nutzen aller Alternativen und wählen die mit dem größten Gesamtnutzen.\nEU_j = Σ u_jk × p_jk \nu = subjektiver Nutzen der Konsequenz; p = subjektive Wahrscheinlichkeit\nZwei Rationalitätsannahmen: \n• Korrekte Vorstellungen über Umwelt und andere Akteure\n• Stabile, von Emotionen unabhängige Präferenzen\nStatus: Heute primär normative Theorie (wie man entscheiden sollte). Als deskriptive Theorie wird zunehmend die Prospect Theory bevorzugt.\nBegründer: Von Neumann & Morgenstern (1944); Savage (1954)","extra":{},"hasInfo":false},{"id":239,"cat":"Finanzpsychologie","q":"Was ist die Prospect Theory (Kahneman & Tversky, 1979) – Ablauf, Wertfunktion, Kernaussagen?","a":"Definition: Deskriptives Modell menschlicher Entscheidungen unter Unsicherheit – zeigt systematische Abweichungen von der Erwartungsnutzentheorie.\n2 Entscheidungsschritte: \n• 1. Editierung: Psychologische Vereinfachung (Runden, Kodieren als Gewinn/Verlust)\n• 2. Evaluation: Zuordnung von Nutzenwerten und Entscheidungsgewichten\nWertfunktion (s-förmig, asymmetrisch): \n• Bewertung relativ zum Referenzpunkt (Status quo) – Entscheidungen immer vom Status quo aus!\n• Im Gewinnbereich konkav (risikoscheu), im Verlustbereich konvex (risikosuchend)\n• Verlustaversion (WICHTIG!): 100 € Verlust wiegt psychologisch schwerer als 100 € Gewinn – die Kurve ist asymmetrisch!\nGewichtungsfunktion: Hohe Wahrscheinlichkeiten werden untergewichtet , kleine übergewichtet .\nKlausurhinweis (VL 13.05.): Die Wertfunktions-Abbildung (s-Kurve mit Referenzpunkt) erkennen und verstehen können – nicht nur auswendig lernen!","a_short":"Definition: Deskriptives Modell menschlicher Entscheidungen unter Unsicherheit – zeigt systematische Abweichungen von der Erwartungsnutzentheorie.\n2 Entscheidungsschritte: \n• 1. Editierung: Psychologische Vereinfachung (Runden, Kodieren als Gewinn/Verlust)\n• 2. Evaluation: Zuordnung von Nutzenwerten und Entscheidungsgewichten\nWertfunktion (s-förmig, asymmetrisch): \n• Bewertung relativ zum Referenzpunkt (Status quo) – Entscheidungen immer vom Status quo aus!\n• Im Gewinnbereich konkav (risikoscheu), im Verlustbereich konvex (risikosuchend)\n• Verlustaversion (WICHTIG!): 100 € Verlust wiegt psychologisch schwerer als 100 € Gewinn – die Kurve ist asymmetrisch!\nGewichtungsfunktion: Hohe Wahrscheinlichkeiten werden untergewichtet , kleine übergewichtet .\nKlausurhinweis (VL 13.05.): Die Wertfunktions-Abbildung (s-Kurve mit Referenzpunkt) erkennen und verstehen können – nicht nur auswendig lernen!","extra":{"definition":"Definition: Deskriptives Modell menschlicher Entscheidungen unter Unsicherheit – zeigt systematische Abweichungen von der Erwartungsnutzentheorie.","merkhilfe":"Klausurhinweis (VL 13.05.): Die Wertfunktions-Abbildung (s-Kurve mit Referenzpunkt) erkennen und verstehen können – nicht nur auswendig lernen!","quelle":"(VL 13.05.)"},"hasInfo":true},{"id":240,"cat":"Finanzpsychologie","q":"Prospect Theory vs. Erwartungsnutzentheorie – Gemeinsamkeiten und zentrale Unterschiede?","a":"Kriterium \nEUT \nProspect Theory \nArt \nNormativ \nDeskriptiv \nReferenzpunkt \nNein \nJa (Status quo) \nVerlustaversion \nNein \nJa \nWahrscheinlich-keitsgewichtung \nObjektiv \nVerzerrt (kleine überschätzt) \nPräferenzen \nStabil, kontextfrei \nKontextabhängig \nBeide gehen von Nutzenmaximierung aus – aber wie Nutzen bestimmt wird, unterscheidet sie fundamental.","a_short":"Kriterium \nEUT \nProspect Theory \nArt \nNormativ \nDeskriptiv \nReferenzpunkt \nNein \nJa (Status quo) \nVerlustaversion \nNein \nJa \nWahrscheinlich-keitsgewichtung \nObjektiv \nVerzerrt (kleine überschätzt) \nPräferenzen \nStabil, kontextfrei \nKontextabhängig \nBeide gehen von Nutzenmaximierung aus – aber wie Nutzen bestimmt wird, unterscheidet sie fundamental.","extra":{"merkhilfe":"Beide gehen von Nutzenmaximierung aus – aber wie Nutzen bestimmt wird, unterscheidet sie fundamental."},"hasInfo":true},{"id":241,"cat":"Finanzpsychologie","q":"Was ist das vierfache Muster der Risikopräferenzen laut Prospect Theory?","a":"Ergibt sich aus Zusammenspiel von s-förmiger Wertfunktion und übergewichteten kleinen Wahrscheinlichkeiten:\nGewinnbereich \nVerlustbereich \nNiedrige p \nrisikoliebend (Lotto) \nrisikoscheu (Versicherung) \nHohe p \nrisikoscheu \nrisikosuchend (\"Possibility Effect\") \nBei hoher Verlustwahrscheinlichkeit: Man setzt lieber alles aufs Spiel, als den Verlust sicher hinzunehmen – klassisches Spielerverhalten.","a_short":"Ergibt sich aus Zusammenspiel von s-förmiger Wertfunktion und übergewichteten kleinen Wahrscheinlichkeiten:\nGewinnbereich \nVerlustbereich \nNiedrige p \nrisikoliebend (Lotto) \nrisikoscheu (Versicherung) \nHohe p \nrisikoscheu \nrisikosuchend (\"Possibility Effect\") \nBei hoher Verlustwahrscheinlichkeit: Man setzt lieber alles aufs Spiel, als den Verlust sicher hinzunehmen – klassisches Spielerverhalten.","extra":{"merkhilfe":"Bei hoher Verlustwahrscheinlichkeit: Man setzt lieber alles aufs Spiel, als den Verlust sicher hinzunehmen – klassisches Spielerverhalten."},"hasInfo":true},{"id":242,"cat":"Finanzpsychologie","q":"Was ist der Endowment-Effekt – Merkmale, Bezug zur Prospect Theory und Praxisbeispiele?","a":"Definition: Was mir gehört, überschätze ich – Menschen schätzen Objekte, die sie besitzen , höher ein als identische Objekte, die sie nicht besitzen.\n5 Kernmerkmale: \n• Wertüberschätzung durch bloßen Besitz (z.B. eigenes Haus ist weniger wert als man denkt)\n• Verlustaversion: Verkaufspreisforderung > Kaufbereitschaft für identisches Objekt\n• Status quo-Bias: Tendenz, den aktuellen Besitzstand zu behalten\n• Tritt schon nach kurzer Zeit ein\n• Emotionale Bindung verstärkt den Effekt\nMarketing-Praxis (VL-Beispiele): \n• Autoverkauf: Auto übers Wochenende verleihen → Kunde gewöhnt sich dran, will es nicht mehr abgeben\n• Zalando: Mehrere Stücke günstig bestellen → will man 1–3 behalten, weil man sie kurz „besessen\" hat\n• Allgemein: Probefahrt, „zur Ansicht\", kostenlose Testphase\nVerbindung zur PT: Besitzstand = Referenzpunkt. Hergeben = Verlust, der stärker schmerzt als der Gewinn durch den Kaufpreis. Deshalb Verkaufspreis > Kaufbereitschaft.","a_short":"Definition: Was mir gehört, überschätze ich – Menschen schätzen Objekte, die sie besitzen , höher ein als identische Objekte, die sie nicht besitzen.\n5 Kernmerkmale: \n• Wertüberschätzung durch bloßen Besitz (z.B. eigenes Haus ist weniger wert als man denkt)\n• Verlustaversion: Verkaufspreisforderung > Kaufbereitschaft für identisches Objekt\n• Status quo-Bias: Tendenz, den aktuellen Besitzstand zu behalten\n• Tritt schon nach kurzer Zeit ein\n• Emotionale Bindung verstärkt den Effekt\nMarketing-Praxis (VL-Beispiele): \n• Autoverkauf: Auto übers Wochenende verleihen → Kunde gewöhnt sich dran, will es nicht mehr abgeben\n• Zalando: Mehrere Stücke günstig bestellen → will man 1–3 behalten, weil man sie kurz „besessen\" hat\n• Allgemein: Probefahrt, „zur Ansicht\", kostenlose Testphase\nVerbindung zur PT: Besitzstand = Referenzpunkt. Hergeben = Verlust, der stärker schmerzt als der Gewinn durch den Kaufpreis. Deshalb Verkaufspreis > Kaufbereitschaft.","extra":{"definition":"Definition: Was mir gehört, überschätze ich – Menschen schätzen Objekte, die sie besitzen , höher ein als identische Objekte, die sie nicht besitzen.","beispiel":"(z. B. eigenes Haus ist weniger wert als man denkt)","merkhilfe":"Verbindung zur PT: Besitzstand = Referenzpunkt. Hergeben = Verlust, der stärker schmerzt als der Gewinn durch den Kaufpreis. Deshalb Verkaufspreis > Kaufbereitschaft.","quelle":"(VL-Beispiele)"},"hasInfo":true},{"id":243,"cat":"Finanzpsychologie","q":"Welche weiteren Präferenzanomalien (jenseits der Prospect Theory) kennt die Finanzpsychologie?","a":"• Ambiguitätsaversion: Bekannte Risiken werden unbekannten vorgezogen. Bsp: Urne mit 50/50 Kugeln bevorzugt gegenüber Urne mit unbekannter Verteilung.\n• Zeitinkonsistentes Verhalten: Heute 10 € werden gegenüber morgen 20 € bevorzugt – aber in 365 vs. 366 Tagen wählt man 20 €. Kurzfristige Gegenwart wird überbewertet.\n• Emotionsabhängige Präferenzen: Börsenkurse werden sogar von der Wetterlage beeinflusst (Hirshleifer & Shumway, 2003).\nAlle verstoßen gegen die EUT-Annahme stabiler, kontextfreier Präferenzen.","a_short":"• Ambiguitätsaversion: Bekannte Risiken werden unbekannten vorgezogen. Bsp: Urne mit 50/50 Kugeln bevorzugt gegenüber Urne mit unbekannter Verteilung.\n• Zeitinkonsistentes Verhalten: Heute 10 € werden gegenüber morgen 20 € bevorzugt – aber in 365 vs. 366 Tagen wählt man 20 €. Kurzfristige Gegenwart wird überbewertet.\n• Emotionsabhängige Präferenzen: Börsenkurse werden sogar von der Wetterlage beeinflusst (Hirshleifer & Shumway, 2003).\nAlle verstoßen gegen die EUT-Annahme stabiler, kontextfreier Präferenzen.","extra":{},"hasInfo":false},{"id":244,"cat":"Finanzpsychologie","q":"Welche drei zentralen Heuristiken bei Finanzentscheidungen nennen Lehrbuch und Folien – und was bewirken sie?","a":"• Verfügbarkeitsheuristik: Leicht abrufbare (verfügbare) Information wird überbewertet → Anleger kaufen zuletzt medial präsente Aktien.\n• Overconfidence Bias: Akteure überschätzen die eigene Leistungsfähigkeit → zu häufige Transaktionen, geringere Rendite als Markt.\n• Repräsentativitätsheuristik: Wahrscheinlichkeit wird an Prototypen gemessen → „Startup\" = erfolgreich, weil das der mentale Prototyp ist.\nWeitere aus Lehrbuch: Ankerheuristik, Herdenverhalten, Belief perseverance (Festhalten an Überzeugungen) \n10.3 Anlegerverhalten (Behavioral Finance)","a_short":"• Verfügbarkeitsheuristik: Leicht abrufbare (verfügbare) Information wird überbewertet → Anleger kaufen zuletzt medial präsente Aktien.\n• Overconfidence Bias: Akteure überschätzen die eigene Leistungsfähigkeit → zu häufige Transaktionen, geringere Rendite als Markt.\n• Repräsentativitätsheuristik: Wahrscheinlichkeit wird an Prototypen gemessen → „Startup\" = erfolgreich, weil das der mentale Prototyp ist.\nWeitere aus Lehrbuch: Ankerheuristik, Herdenverhalten, Belief perseverance (Festhalten an Überzeugungen) \n10.3 Anlegerverhalten (Behavioral Finance)","extra":{"merkhilfe":"Weitere aus Lehrbuch: Ankerheuristik, Herdenverhalten, Belief perseverance (Festhalten an Überzeugungen)"},"hasInfo":true},{"id":245,"cat":"Finanzpsychologie","q":"Was ist Behavioral Finance – Ziel, zwei Säulen, Verhältnis zur traditionellen Finanzmarkttheorie?","a":"Ziel: Erklären, wann und wie das Verhalten von Anlegern von rationalen Annahmen abweicht – und wie sich das auf Märkte auswirkt.\nZwei Säulen (Barberis & Thaler, 2003): \n• Grenzen der Arbitrage: Fehlbewertungen werden nicht zwangsläufig korrigiert\n• Psychologie der Akteure: Empirische Befunde zu irrationalen Verhaltensmustern\nVerhältnis: Behavioral Finance will die traditionelle Finanzmarkttheorie ergänzen , nicht ersetzen.\nZur Markteffizienz: Die Aussage, dass es keine dauerhaft überrenditestarke Strategie gibt, ist weitgehend korrekt. Aber: Preise „stimmen\" nicht immer.","a_short":"Ziel: Erklären, wann und wie das Verhalten von Anlegern von rationalen Annahmen abweicht – und wie sich das auf Märkte auswirkt.\nZwei Säulen (Barberis & Thaler, 2003): \n• Grenzen der Arbitrage: Fehlbewertungen werden nicht zwangsläufig korrigiert\n• Psychologie der Akteure: Empirische Befunde zu irrationalen Verhaltensmustern\nVerhältnis: Behavioral Finance will die traditionelle Finanzmarkttheorie ergänzen , nicht ersetzen.\nZur Markteffizienz: Die Aussage, dass es keine dauerhaft überrenditestarke Strategie gibt, ist weitgehend korrekt. Aber: Preise „stimmen\" nicht immer.","extra":{"definition":"Ziel: Erklären, wann und wie das Verhalten von Anlegern von rationalen Annahmen abweicht – und wie sich das auf Märkte auswirkt."},"hasInfo":true},{"id":246,"cat":"Finanzpsychologie","q":"Was ist Arbitrage – und warum sind die Möglichkeiten in der Realität begrenzt?","a":"Definition: (Beinahe) risikolose Ausnutzung von Preisunterschieden zur Gewinnerzielung.\nGrenzen der Arbitrage – 5 Gründe: \n• Fundamentalwert von Wertpapieren ist nur ungenau bekannt\n• Fehlbewertungen können sich verstärken statt korrigiert zu werden\n• Ungeduldige Gläubiger entziehen Portfoliomanagern vorzeitig das Vertrauen\n• Herdenverhalten schützt – irren „mit der Herde\" = weniger Reputationsverlust ( Sharing-the-blame-Effekt )\n• Arbitrage ist immer mit Kosten verbunden (Identifizierung + Transaktion)","a_short":"Definition: (Beinahe) risikolose Ausnutzung von Preisunterschieden zur Gewinnerzielung.\nGrenzen der Arbitrage – 5 Gründe: \n• Fundamentalwert von Wertpapieren ist nur ungenau bekannt\n• Fehlbewertungen können sich verstärken statt korrigiert zu werden\n• Ungeduldige Gläubiger entziehen Portfoliomanagern vorzeitig das Vertrauen\n• Herdenverhalten schützt – irren „mit der Herde\" = weniger Reputationsverlust ( Sharing-the-blame-Effekt )\n• Arbitrage ist immer mit Kosten verbunden (Identifizierung + Transaktion)","extra":{"definition":"Definition: (Beinahe) risikolose Ausnutzung von Preisunterschieden zur Gewinnerzielung."},"hasInfo":true},{"id":247,"cat":"Finanzpsychologie","q":"Erkläre den CUBA-Fonds als Fallbeispiel für die Grenzen der Arbitrage (Thaler, 2015).","a":"Ausgangslage: Fonds mit Kürzel „CUBA\" – keinerlei Kuba-Bezug (69 % US-Aktien). Kurs lag 10 % unter Inventarwert (NAV).\nEreignis (18.12.2014): Obama kündigt Normalisierung der US-Kuba-Beziehungen an.\nReaktion: Kurs stieg um >70 % – allein wegen des Namens, obwohl kein inhaltlicher Bezug zu Kuba bestand.\nPointe: Selbst wer wusste, dass der Kurs irrational war, konnte Arbitrage kaum nutzen – der Kurs blieb monatelang über NAV.\nZeigt: Irrationalität + Grenzen der Arbitrage = Fehlbewertungen halten sich dauerhaft.","a_short":"Ausgangslage: Fonds mit Kürzel „CUBA\" – keinerlei Kuba-Bezug (69 % US-Aktien). Kurs lag 10 % unter Inventarwert (NAV).","extra":{"erklaerung":"Ausgangslage: Fonds mit Kürzel „CUBA\" – keinerlei Kuba-Bezug (69 % US-Aktien). Kurs lag 10 % unter Inventarwert (NAV).\nEreignis (18.12.2014): Obama kündigt Normalisierung der US-Kuba-Beziehungen an.\nReaktion: Kurs stieg um >70 % – allein wegen des Namens, obwohl kein inhaltlicher Bezug zu Kuba bestand.\nPointe: Selbst wer wusste, dass der Kurs irrational war, konnte Arbitrage kaum nutzen – der Kurs blieb monatelang über NAV.\nZeigt: Irrationalität + Grenzen der Arbitrage = Fehlbewertungen halten sich dauerhaft.","merkhilfe":"Zeigt: Irrationalität + Grenzen der Arbitrage = Fehlbewertungen halten sich dauerhaft."},"hasInfo":true},{"id":248,"cat":"Finanzpsychologie","q":"Welche typischen Anlegerfehler lassen sich psychologisch erklären? (Beispiele aus Tabelle 10.1)","a":"• Ungenügende Diversifikation (Home bias) → Ambiguitätsaversion \n• Naive Diversifikation (1/n-Strategie) → Einfachheitspräferenz\n• Übermäßig häufige Transaktionen → Overconfidence Bias + Action Bias → niedrigere Renditen nach Gebühren\n• Dispositionseffekt : Verlierer-Aktien werden zu lang gehalten, Gewinner zu früh verkauft → Verlustaversion\n• Aufmerksamkeitseffekt : Kauf von Aktien, die zuletzt stark gestiegen/gesunken sind → Verfügbarkeitsheuristik\n• Herdenverhalten : Kauf wegen steigendem Kurs ohne neue Information\n• Stimmungseffekte : Neutrale Stimmung = höchste Gewinne → Emotionseinfluss","a_short":"• Ungenügende Diversifikation (Home bias) → Ambiguitätsaversion \n• Naive Diversifikation (1/n-Strategie) → Einfachheitspräferenz\n• Übermäßig häufige Transaktionen → Overconfidence Bias + Action Bias → niedrigere Renditen nach Gebühren\n• Dispositionseffekt : Verlierer-Aktien werden zu lang gehalten, Gewinner zu früh verkauft → Verlustaversion\n• Aufmerksamkeitseffekt : Kauf von Aktien, die zuletzt stark gestiegen/gesunken sind → Verfügbarkeitsheuristik\n• Herdenverhalten : Kauf wegen steigendem Kurs ohne neue Information\n• Stimmungseffekte : Neutrale Stimmung = höchste Gewinne → Emotionseinfluss","extra":{},"hasInfo":false},{"id":249,"cat":"Finanzpsychologie","q":"Wie erklärt Verlustaversion die übermäßige Volatilität von Aktienmärkten und die Aktienprämie ?","a":"Übermäßige Volatilität (Barberis et al., 2001): \nNach Gewinnen sinkt Verlustaversion → mehr Investitionen → Kurse steigen weiter. Nach Verlusten steigt Verlustaversion → Aktienanteil sinkt → Kurse fallen weiter. Aktien sind daher volatiler als die zugrundeliegenden Dividenden (Shiller, 1981).\nAktienprämie (Thaler et al., 1997): \nAktienbesitzer bilanzieren häufiger als andere Anleger → erleben mehr Verlusterlebnisse → benötigen höhere Renditen als Kompensation. Deshalb sind Aktienrenditen strukturell höher als Anleihenrenditen. Experimentell bestätigt: Bei jährlicher statt monatlicher Bilanzierung investierten Teilnehmer deutlich mehr in Aktien.\nFachbegriff: Myopic Loss Aversion = kurzfristige Verlustaversion durch häufiges Bewerten","a_short":"Übermäßige Volatilität (Barberis et al., 2001): Nach Gewinnen sinkt Verlustaversion → mehr Investitionen → Kurse steigen weiter. Nach Verlusten steigt Verlustaversion → Aktienanteil sinkt → Kurse fallen weiter.","extra":{"erklaerung":"Übermäßige Volatilität (Barberis et al., 2001): \nNach Gewinnen sinkt Verlustaversion → mehr Investitionen → Kurse steigen weiter. Nach Verlusten steigt Verlustaversion → Aktienanteil sinkt → Kurse fallen weiter. Aktien sind daher volatiler als die zugrundeliegenden Dividenden (Shiller, 1981).\nAktienprämie (Thaler et al., 1997): \nAktienbesitzer bilanzieren häufiger als andere Anleger → erleben mehr Verlusterlebnisse → benötigen höhere Renditen als Kompensation. Deshalb sind Aktienrenditen strukturell höher als Anleihenrenditen. Experimentell bestätigt: Bei jährlicher statt monatlicher Bilanzierung investierten Teilnehmer deutlich mehr in Aktien.\nFachbegriff: Myopic Loss Aversion = kurzfristige Verlustaversion durch häufiges Bewerten"},"hasInfo":true},{"id":250,"cat":"Finanzpsychologie","q":"Was sind Spekulationsblasen – Entstehung und Erkennbarkeit?","a":"Entstehung: Gegenseitige psychologische Ansteckung von Emotionen, Einstellungen und Erwartungen + Herdenverhalten . Medienmitteilungen verstärken das „Aufschaukeln\".\nErkennbarkeit: Schwierig – bei starkem Preisanstieg lassen sich Fundamentalgründe nicht ausschließen.\nBeispiele: Dotcom-Blase (Begründung: „New Economy, alte Regeln gelten nicht mehr\"), US-Immobilienblase vor 2007.\nBei funktionierender Arbitrage müsste es keine Spekulationsblasen geben – ihr Bestehen ist empirischer Beleg für Marktgrenzen. \n10.4 Finanzmarktregulierung","a_short":"Entstehung: Gegenseitige psychologische Ansteckung von Emotionen, Einstellungen und Erwartungen + Herdenverhalten . Medienmitteilungen verstärken das „Aufschaukeln\".","extra":{"erklaerung":"Entstehung: Gegenseitige psychologische Ansteckung von Emotionen, Einstellungen und Erwartungen + Herdenverhalten . Medienmitteilungen verstärken das „Aufschaukeln\".\nErkennbarkeit: Schwierig – bei starkem Preisanstieg lassen sich Fundamentalgründe nicht ausschließen.\nBeispiele: Dotcom-Blase (Begründung: „New Economy, alte Regeln gelten nicht mehr\"), US-Immobilienblase vor 2007.\nBei funktionierender Arbitrage müsste es keine Spekulationsblasen geben – ihr Bestehen ist empirischer Beleg für Marktgrenzen. \n10.4 Finanzmarktregulierung","merkhilfe":"Bei funktionierender Arbitrage müsste es keine Spekulationsblasen geben – ihr Bestehen ist empirischer Beleg für Marktgrenzen."},"hasInfo":true},{"id":251,"cat":"Finanzpsychologie","q":"Welche Erkenntnisse lieferte die schwedische Sozialversicherungsprivatisierung (Cronqvist & Thaler, 2004) über irrationales Anlegerverhalten?","a":"Setting: 2000 konnten 66,9 % der Schweden aus 456 Fonds wählen. 33,1 % nutzen den sorgfältig vorgewählten Standardfonds.\nBefunde (aktiv Wählende): \n• Viel höherer Aktienanteil (96 % vs. 82 %)\n• Starker Home Bias (48 % Schweden vs. 17 %)\n• Kaum Indexfonds (4 % vs. 60 %)\n• Viel höhere Gebühren (0,77 % vs. 0,17 % p.a.)\n• Rendite über 3 Jahre: −39,6 % vs. −29,9 % (Standardfonds)\nBotschaft: Selbstbestimmte Portfoliowahl führt durch Heuristiken (Repräsentativität, Home Bias) zu schlechteren Ergebnissen als ein gut konzipierter Default.\nRegulierungsimplikation: Default-Optionen sind mächtige Instrumente (Nudge-Ansatz) \n10.5 Sparen und Vorsorgen","a_short":"Setting: 2000 konnten 66,9 % der Schweden aus 456 Fonds wählen. 33,1 % nutzen den sorgfältig vorgewählten Standardfonds.\nBefunde (aktiv Wählende): \n• Viel höherer Aktienanteil (96 % vs. 82 %)\n• Starker Home Bias (48 % Schweden vs. 17 %)\n• Kaum Indexfonds (4 % vs. 60 %)\n• Viel höhere Gebühren (0,77 % vs. 0,17 % p.a.)\n• Rendite über 3 Jahre: −39,6 % vs. −29,9 % (Standardfonds)\nBotschaft: Selbstbestimmte Portfoliowahl führt durch Heuristiken (Repräsentativität, Home Bias) zu schlechteren Ergebnissen als ein gut konzipierter Default.\nRegulierungsimplikation: Default-Optionen sind mächtige Instrumente (Nudge-Ansatz) \n10.5 Sparen und Vorsorgen","extra":{},"hasInfo":false},{"id":252,"cat":"Finanzpsychologie","q":"Welche Sparmotive unterscheidet Wiswede (2012) – und was sind die übergeordneten abstrakten Sparziele?","a":"7 Sparmotive nach Wiswede (2012): \n• Größere Anschaffungen (Auto, Haus, Urlaub)\n• Sicherheitsmotiv (Lebensstandard sichern)\n• Kontrollmotiv (Unabhängigkeit)\n• Leistungsmotiv (hohe Erträge)\n• Prestigemotiv (Vermögen als Statussignal)\n• Intrinsisches Motiv (Sparen als Selbstzweck)\n• Altruismus-Motiv (Vorsorge für andere)\n3 übergeordnete abstrakte Sparziele (Canova et al., 2005): Selbstwert, Freude (Self-Gratification), Autonomie \nMerkhilfe: „SFA\" – Selbstwert, Freude, Autonomie","a_short":"7 Sparmotive nach Wiswede (2012): \n• Größere Anschaffungen (Auto, Haus, Urlaub)\n• Sicherheitsmotiv (Lebensstandard sichern)\n• Kontrollmotiv (Unabhängigkeit)\n• Leistungsmotiv (hohe Erträge)\n• Prestigemotiv (Vermögen als Statussignal)\n• Intrinsisches Motiv (Sparen als Selbstzweck)\n• Altruismus-Motiv (Vorsorge für andere)\n3 übergeordnete abstrakte Sparziele (Canova et al., 2005): Selbstwert, Freude (Self-Gratification), Autonomie \nMerkhilfe: „SFA\" – Selbstwert, Freude, Autonomie","extra":{"merkhilfe":"Merkhilfe: „SFA\" – Selbstwert, Freude, Autonomie"},"hasInfo":true},{"id":253,"cat":"Finanzpsychologie","q":"Ökonomische Konsumtheorie vs. Relative Income-Hypothese beim Sparverhalten – was sagen sie?","a":"Ökonomische Theorie (Life-Cycle / Permanent Income): Referenzgruppen spielen keine Rolle. Sparen = Funktion des individuell erwarteten Einkommens über den Lebenszyklus.\nRelative Income-Hypothese (Duesenberry, 1949): Sparquote korreliert positiv mit der Einkommensposition innerhalb der Referenzgruppe. Wer relativ viel verdient, spart auch viel.\nEmpirisches Phänomen (Frank, 2014): „Ausgabenkaskaden\" – hohe Ausgaben Weniger führen zu Mehrkäufen der darunter Liegenden. Erklärt niedrigere US-Sparquote bei höherer Ungleichheit vs. Europa.\nPotentielle Rolle von Social Media: verstärkt soziale Aufwärtsvergleiche und könnte Ausgabekaskaden beschleunigen.","a_short":"Ökonomische Theorie (Life-Cycle / Permanent Income): Referenzgruppen spielen keine Rolle. Sparen = Funktion des individuell erwarteten Einkommens über den Lebenszyklus.","extra":{"erklaerung":"Ökonomische Theorie (Life-Cycle / Permanent Income): Referenzgruppen spielen keine Rolle. Sparen = Funktion des individuell erwarteten Einkommens über den Lebenszyklus.\nRelative Income-Hypothese (Duesenberry, 1949): Sparquote korreliert positiv mit der Einkommensposition innerhalb der Referenzgruppe. Wer relativ viel verdient, spart auch viel.\nEmpirisches Phänomen (Frank, 2014): „Ausgabenkaskaden\" – hohe Ausgaben Weniger führen zu Mehrkäufen der darunter Liegenden. Erklärt niedrigere US-Sparquote bei höherer Ungleichheit vs. Europa.\nPotentielle Rolle von Social Media: verstärkt soziale Aufwärtsvergleiche und könnte Ausgabekaskaden beschleunigen."},"hasInfo":true},{"id":254,"cat":"Finanzpsychologie","q":"Welche psychologisch orientierten Maßnahmen zur Sparförderung zeigt die Forschung (Madrian & Shea; Thaler & Benartzi)?","a":"1. Automatische Standardeinzahlung (Madrian & Shea, 2001): Unternehmen zahlen standardmäßig Teile des Lohns in Vorsorgekonten ein – Arbeitnehmer müssen aktiv widersprechen. Führt zu deutlich mehr Vorsorgesparen als opt-in.\n2. Save More Tomorrow (Thaler & Benartzi, 2004): Sparplan, bei dem Sparbeiträge bei jeder Lohnerhöhung automatisch steigen. Ergebnis: Sparquote stieg von 3,5 % auf 11,6 % in <3 Jahren (drei Lohnerhöhungen).\nPrinzip: Default-Effekt – der Status quo wird beibehalten. Wer richtig gewählt wird als Standard, beeinflusst das Verhalten massiv.\nEinsatz in USA und UK als Regulierung. Aber: Standardbeiträge oft zu niedrig → manche harren in zu geringen Raten. \n10.6 Lohn – Marktpreise, Fairness, Persönlichkeit","a_short":"1. Automatische Standardeinzahlung (Madrian & Shea, 2001): Unternehmen zahlen standardmäßig Teile des Lohns in Vorsorgekonten ein – Arbeitnehmer müssen aktiv widersprechen. Führt zu deutlich mehr Vorsorgesparen als opt-in.\n2. Save More Tomorrow (Thaler & Benartzi, 2004): Sparplan, bei dem Sparbeiträge bei jeder Lohnerhöhung automatisch steigen. Ergebnis: Sparquote stieg von 3,5 % auf 11,6 % in <3 Jahren (drei Lohnerhöhungen).\nPrinzip: Default-Effekt – der Status quo wird beibehalten. Wer richtig gewählt wird als Standard, beeinflusst das Verhalten massiv.\nEinsatz in USA und UK als Regulierung. Aber: Standardbeiträge oft zu niedrig → manche harren in zu geringen Raten. \n10.6 Lohn – Marktpreise, Fairness, Persönlichkeit","extra":{"merkhilfe":"Einsatz in USA und UK als Regulierung. Aber: Standardbeiträge oft zu niedrig → manche harren in zu geringen Raten."},"hasInfo":true},{"id":255,"cat":"Finanzpsychologie","q":"In welcher Hinsicht weicht die Realität der Lohnbildung vom ökonomischen Standardmodell ab?","a":"Ökonomisches Modell: Lohn = Wertgrenzprodukt, Arbeitnehmer wählen optimal zwischen Arbeit und Freizeit, kennen ihren Marktwert.\nRealität – mehrere Abweichungen: \n• Arbeitnehmer wissen nicht gut, wie viel Freizeit sie Geld wert ist\n• Sie wissen nicht, was ihre Arbeit dem Arbeitgeber wert ist – Lohngeschichte ist oft der einzige Anhaltspunkt\n• Reziprozität (psychologischer Vertrag) spielt eine zentrale Rolle\n• Fairnesspräferenzen beeinflussen Arbeitseinsatz\n• Arbeit hat für viele einen Eigenwert – keine reine Freizeit-Lohn-Abwägung","a_short":"Ökonomisches Modell: Lohn = Wertgrenzprodukt, Arbeitnehmer wählen optimal zwischen Arbeit und Freizeit, kennen ihren Marktwert.\nRealität – mehrere Abweichungen: \n• Arbeitnehmer wissen nicht gut, wie viel Freizeit sie Geld wert ist\n• Sie wissen nicht, was ihre Arbeit dem Arbeitgeber wert ist – Lohngeschichte ist oft der einzige Anhaltspunkt\n• Reziprozität (psychologischer Vertrag) spielt eine zentrale Rolle\n• Fairnesspräferenzen beeinflussen Arbeitseinsatz\n• Arbeit hat für viele einen Eigenwert – keine reine Freizeit-Lohn-Abwägung","extra":{},"hasInfo":false},{"id":256,"cat":"Finanzpsychologie","q":"Erkläre die drei Fairness-Modelle am Arbeitsmarkt: Equity-Theorie, Fair-Wage-Effort-Modell, Gift-Exchange-Ansatz .","a":"• Equity-Theorie (Adams, 1965): Fairness = Verhältnis von Beiträgen zu Belohnungen. Wird dieses Verhältnis als ungleich wahrgenommen, entsteht das Bedürfnis nach Anpassung – auch beim Besserverdienenden.\n• Fair-Wage-Effort-Modell (Akerlof & Yellen, 1988): Leistung hängt davon ab, ob Arbeitnehmer ihren Lohn als gerecht empfinden. Als fair geltender Lohn variiert je nach Referenzgruppe und Arbeitslosenquote.\n• Gift-Exchange-Ansatz (Akerlof, 1984): Reziprozität – Arbeitgeber und Arbeitnehmer „beschenken\" sich gegenseitig mit höherem Lohn und höherem Arbeitseinsatz.\nHenry Ford 1914: Lohn auf $5/Tag verdoppelt → Fluktuation sank drastisch → „finest cost cutting move\" – klassisches Gift-Exchange-Beispiel.","a_short":"• Equity-Theorie (Adams, 1965): Fairness = Verhältnis von Beiträgen zu Belohnungen. Wird dieses Verhältnis als ungleich wahrgenommen, entsteht das Bedürfnis nach Anpassung – auch beim Besserverdienenden.\n• Fair-Wage-Effort-Modell (Akerlof & Yellen, 1988): Leistung hängt davon ab, ob Arbeitnehmer ihren Lohn als gerecht empfinden. Als fair geltender Lohn variiert je nach Referenzgruppe und Arbeitslosenquote.\n• Gift-Exchange-Ansatz (Akerlof, 1984): Reziprozität – Arbeitgeber und Arbeitnehmer „beschenken\" sich gegenseitig mit höherem Lohn und höherem Arbeitseinsatz.\nHenry Ford 1914: Lohn auf $5/Tag verdoppelt → Fluktuation sank drastisch → „finest cost cutting move\" – klassisches Gift-Exchange-Beispiel.","extra":{"merkhilfe":"Henry Ford 1914: Lohn auf $5/Tag verdoppelt → Fluktuation sank drastisch → „finest cost cutting move\" – klassisches Gift-Exchange-Beispiel."},"hasInfo":true},{"id":257,"cat":"Finanzpsychologie","q":"Welchen Einfluss haben Big Five-Persönlichkeitsmerkmale auf den Lohn – und was ist dabei überraschend? (Nyhus & Pons, 2005)","a":"Dänische Studie – zentrale Befunde: \n• Emotionale Stabilität : positiv mit Lohn korreliert (erwartet)\n• Gewissenhaftigkeit : kein positiver Effekt (überraschend)\n• Verträglichkeit : bei Frauen negativ mit Lohn korreliert → evtl. bescheidenere Lohnverhandlungen\n• Extraversion: kein signifikanter Effekt\nWechselwirkungen: Bei Universitätsabschluss verliert emotionale Stabilität an Bedeutung; Verträglichkeit wirkt dort noch stärker negativ.\nFazit: Persönlichkeit muss bei Lohnanalysen berücksichtigt werden – sonst wird z.B. Berufserfahrung überschätzt. \n10.7 Steuern – Wahrnehmung, Verhalten, Ansätze","a_short":"Dänische Studie – zentrale Befunde: \n• Emotionale Stabilität : positiv mit Lohn korreliert (erwartet)\n• Gewissenhaftigkeit : kein positiver Effekt (überraschend)\n• Verträglichkeit : bei Frauen negativ mit Lohn korreliert → evtl. bescheidenere Lohnverhandlungen\n• Extraversion: kein signifikanter Effekt\nWechselwirkungen: Bei Universitätsabschluss verliert emotionale Stabilität an Bedeutung; Verträglichkeit wirkt dort noch stärker negativ.\nFazit: Persönlichkeit muss bei Lohnanalysen berücksichtigt werden – sonst wird z.B. Berufserfahrung überschätzt. \n10.7 Steuern – Wahrnehmung, Verhalten, Ansätze","extra":{},"hasInfo":false},{"id":258,"cat":"Finanzpsychologie","q":"Welche Faktoren beeinflussen die Wahrnehmung der eigenen Steuerbelastung ? (Schmölders 1975 / Wiswede 2012)","a":"5 Faktoren der Steuerwahrnehmung: \n• Höhe der Besteuerung – auch im Vergleich mit Referenzgruppen/Staaten\n• Distributive Gerechtigkeit – fair oder unfair behandelt?\n• Staatliche Effizienz – werden Gelder effizient oder verschwendet eingesetzt?\n• Wahrgenommene Dauerhaftigkeit der Belastung\n• Spürbarkeit der Steuern – fallen sie überhaupt ins Auge?\nDiese Faktoren bestimmen, ob Steuern als gerechtfertigt wahrgenommen werden – was wiederum das Hinterziehungsverhalten beeinflusst.","a_short":"5 Faktoren der Steuerwahrnehmung: \n• Höhe der Besteuerung – auch im Vergleich mit Referenzgruppen/Staaten\n• Distributive Gerechtigkeit – fair oder unfair behandelt?\n• Staatliche Effizienz – werden Gelder effizient oder verschwendet eingesetzt?\n• Wahrgenommene Dauerhaftigkeit der Belastung\n• Spürbarkeit der Steuern – fallen sie überhaupt ins Auge?\nDiese Faktoren bestimmen, ob Steuern als gerechtfertigt wahrgenommen werden – was wiederum das Hinterziehungsverhalten beeinflusst.","extra":{},"hasInfo":false},{"id":259,"cat":"Finanzpsychologie","q":"Welche Faktoren erklären Steuerhinterziehung psychologisch? (Weigel et al., 1987)","a":"Psychologische Modelle (Weigel et al. 1987) unterscheiden:\nSituative Bedingungen: \n• Anreize: finanzieller Druck, soziale Duldung kriminellen Handelns\n• Hindernisse: klar deklariertes Einkommen, Wahrscheinlichkeit einer Steuerprüfung, soziale Kontrolle\nPersönliche Bedingungen: \n• Anreize: wahrgenommene ungerechte Besteuerung, egoistische Nutzenmaximierung\n• Hindernisse: eigene Intoleranz von Hinterziehung, wahrgenommenes Entdeckungsrisiko\nWichtig: Befragte Steuerhinterziehung korreliert mit Einstellungen; beobachtete Hinterziehung korreliert mit Persönlichkeitsmerkmalen (Unzufriedenheit, Egoismus, Konkurrenzorientierung).","a_short":"Psychologische Modelle (Weigel et al. 1987) unterscheiden:\nSituative Bedingungen: \n• Anreize: finanzieller Druck, soziale Duldung kriminellen Handelns\n• Hindernisse: klar deklariertes Einkommen, Wahrscheinlichkeit einer Steuerprüfung, soziale Kontrolle\nPersönliche Bedingungen: \n• Anreize: wahrgenommene ungerechte Besteuerung, egoistische Nutzenmaximierung\n• Hindernisse: eigene Intoleranz von Hinterziehung, wahrgenommenes Entdeckungsrisiko\nWichtig: Befragte Steuerhinterziehung korreliert mit Einstellungen; beobachtete Hinterziehung korreliert mit Persönlichkeitsmerkmalen (Unzufriedenheit, Egoismus, Konkurrenzorientierung).","extra":{"merkhilfe":"Wichtig: Befragte Steuerhinterziehung korreliert mit Einstellungen; beobachtete Hinterziehung korreliert mit Persönlichkeitsmerkmalen (Unzufriedenheit, Egoismus, Konkurrenzorientierung)."},"hasInfo":true},{"id":260,"cat":"Finanzpsychologie","q":"Welche drei Ansätze zur Stärkung der Steuermoral unterscheidet die Finanzpsychologie – und was ist der Kern des Trust-Ansatzes?","a":"• Enforcement-Ansatz: häufige Steuerprüfungen + harte Strafen. Wirkt über Prospect Theory (Übergewichtung seltener Entdeckung).\n• Service-Ansatz: Steuerverwaltung als kundenorientierter Dienstleister → reduziert Reaktanz.\n• Trust-Ansatz (Alm & Torgler, 2011): Stärkt Normen des Steuerzahlens:\n• Zusammenhang Steuern ↔ staatliche Leistungen betonen\n• Aktive Kommunikation: Steuern zahlen = richtiges Verhalten\n• Namen von Delinquenten veröffentlichen\n• Unternehmen in Kampagnen einbinden\n• Keine Steueramnestien (signalisiert Akzeptanz)\n• Ungerechtigkeitswahrnehmungen ernst nehmen\nGute Steuerkultur = Zusammenspiel von Normen, sozialen Einflüssen und Effizienzwahrnehmung","a_short":"• Enforcement-Ansatz: häufige Steuerprüfungen + harte Strafen. Wirkt über Prospect Theory (Übergewichtung seltener Entdeckung).\n• Service-Ansatz: Steuerverwaltung als kundenorientierter Dienstleister → reduziert Reaktanz.\n• Trust-Ansatz (Alm & Torgler, 2011): Stärkt Normen des Steuerzahlens:\n• Zusammenhang Steuern ↔ staatliche Leistungen betonen\n• Aktive Kommunikation: Steuern zahlen = richtiges Verhalten\n• Namen von Delinquenten veröffentlichen\n• Unternehmen in Kampagnen einbinden\n• Keine Steueramnestien (signalisiert Akzeptanz)\n• Ungerechtigkeitswahrnehmungen ernst nehmen\nGute Steuerkultur = Zusammenspiel von Normen, sozialen Einflüssen und Effizienzwahrnehmung","extra":{},"hasInfo":false},{"id":261,"cat":"Finanzpsychologie","q":"Warum zahlen wir überhaupt Steuern – und welche psychologischen Argumente gibt es für Umverteilung ?","a":"Ökonomisches Argument: Grenznutzen des Einkommens sinkt → Umverteilung von reich zu arm erhöht Gesamtnutzen.\nPsychologische Argumente: \n• Fairnesspräferenzen: Menschen befürworten faire Verteilung auch ohne eigenen Vorteil\n• Psychologische externe Effekte: Hohes Einkommen anderer führt zu Unglück bei Geringerverdienenden → ähnlich wie Umweltverschmutzung. Besteuerung internalisiert diesen externen Effekt.\nRelative statt absolute Einkommensposition ist psychologisch entscheidend für Wohlbefinden.","a_short":"Ökonomisches Argument: Grenznutzen des Einkommens sinkt → Umverteilung von reich zu arm erhöht Gesamtnutzen.\nPsychologische Argumente: \n• Fairnesspräferenzen: Menschen befürworten faire Verteilung auch ohne eigenen Vorteil\n• Psychologische externe Effekte: Hohes Einkommen anderer führt zu Unglück bei Geringerverdienenden → ähnlich wie Umweltverschmutzung. Besteuerung internalisiert diesen externen Effekt.\nRelative statt absolute Einkommensposition ist psychologisch entscheidend für Wohlbefinden.","extra":{"merkhilfe":"Relative statt absolute Einkommensposition ist psychologisch entscheidend für Wohlbefinden."},"hasInfo":true},{"id":262,"cat":"Finanzpsychologie","q":"Was beeinflusst die Wirksamkeit von Transferleistungen psychologisch – und was zeigen Experimente zum Grundeinkommen?","a":"US-Experiment 1970er (bedingungsloses Grundeinkommen): Leichte Reduktion der Erwerbsbereitschaft – aber Effekte insgesamt schwach. In ländlichen Gebieten kein Einfluss auf Arbeitsstunden bei Männern.\nPsychologische Faktoren bei Transferleistungen: \n• Hilfe wirkt besser, wenn sie gleichzeitig das Selbstwertgefühl stärkt \n• Kostenlose Kinderbetreuung = kognitive Entlastung → bessere Alltagsbewältigung (Mullainathan & Shafir)\n• Bezeichnung der Leistung beeinflusst Motivation: „Jobseeker allowance\" (UK) vs. „Unemployment insurance\" (USA) – erstere betont Zugehörigkeit zur Erwerbsbevölkerung\nKlausurfragen – Offene Fragen mit Musterlösung","a_short":"US-Experiment 1970er (bedingungsloses Grundeinkommen): Leichte Reduktion der Erwerbsbereitschaft – aber Effekte insgesamt schwach. In ländlichen Gebieten kein Einfluss auf Arbeitsstunden bei Männern.\nPsychologische Faktoren bei Transferleistungen: \n• Hilfe wirkt besser, wenn sie gleichzeitig das Selbstwertgefühl stärkt \n• Kostenlose Kinderbetreuung = kognitive Entlastung → bessere Alltagsbewältigung (Mullainathan & Shafir)\n• Bezeichnung der Leistung beeinflusst Motivation: „Jobseeker allowance\" (UK) vs. „Unemployment insurance\" (USA) – erstere betont Zugehörigkeit zur Erwerbsbevölkerung\nKlausurfragen – Offene Fragen mit Musterlösung","extra":{},"hasInfo":false},{"id":263,"cat":"Finanzpsychologie","q":"Klausurfrage: Erläutern Sie die Prospect Theory und zeigen Sie, wie sie sich von der Erwartungsnutzentheorie unterscheidet. Nehmen Sie dabei kritisch Stellung.","a":"Musterlösung: \nErwartungsnutzentheorie (EUT): Normative Theorie – Menschen maximieren rational ihren erwarteten Nutzen, haben stabile Präferenzen, gewichten Wahrscheinlichkeiten objektiv.\nProspect Theory (Kahneman & Tversky, 1979): Deskriptiv – beschreibt, wie Menschen tatsächlich entscheiden:\n1. Editierung (Vereinfachung) → 2. Evaluation (Nutzenzuordnung über Referenzpunkt)\nKernunterschiede: Verlustaversion, Referenzpunkt, s-förmige Wertfunktion, Übergewichtung kleiner Wahrscheinlichkeiten → vierfaches Muster der Risikopräferenzen.\nKritik an der Prospect Theory: \n• Referenzpunkte sind nicht immer klar definiert – wie wird der Status quo bestimmt?\n• Wurde hauptsächlich in Laborexperimenten getestet (Glücksspiele) – externe Validität fraglich\n• Keine klare normativen Implikationen – nur deskriptiv\n• Trotzdem: weit besser als EUT bei Erklärung realen Verhaltens bestätigt (Kahneman, Nobelpreis 2002)\nFazit: PT ist die aktuell beste deskriptive Theorie – ersetzt EUT nicht als normativen Standard, ergänzt sie aber fundamental.","a_short":"Musterlösung: \nErwartungsnutzentheorie (EUT): Normative Theorie – Menschen maximieren rational ihren erwarteten Nutzen, haben stabile Präferenzen, gewichten Wahrscheinlichkeiten objektiv.\nProspect Theory (Kahneman & Tversky, 1979): Deskriptiv – beschreibt, wie Menschen tatsächlich entscheiden:\n1. Editierung (Vereinfachung) → 2. Evaluation (Nutzenzuordnung über Referenzpunkt)\nKernunterschiede: Verlustaversion, Referenzpunkt, s-förmige Wertfunktion, Übergewichtung kleiner Wahrscheinlichkeiten → vierfaches Muster der Risikopräferenzen.\nKritik an der Prospect Theory: \n• Referenzpunkte sind nicht immer klar definiert – wie wird der Status quo bestimmt?\n• Wurde hauptsächlich in Laborexperimenten getestet (Glücksspiele) – externe Validität fraglich\n• Keine klare normativen Implikationen – nur deskriptiv\n• Trotzdem: weit besser als EUT bei Erklärung realen Verhaltens bestätigt (Kahneman, Nobelpreis 2002)\nFazit: PT ist die aktuell beste deskriptive Theorie – ersetzt EUT nicht als normativen Standard, ergänzt sie aber fundamental.","extra":{},"hasInfo":false},{"id":264,"cat":"Finanzpsychologie","q":"Klausurfrage: Was ist Behavioral Finance – und welche Konsequenzen hat sie für die Regulierung von Finanzmärkten?","a":"Behavioral Finance: Teilgebiet der Wirtschaftspsychologie am Finanzmarkt – fragt, wann und wie Anlegerverhalten von rationalen Annahmen abweicht. Zwei Säulen: Grenzen der Arbitrage + Psychologie der Akteure.\nRegulierungsimplikationen: \n• Spekulationsblasen verhindern durch antizyklische Maßnahmen\n• Finanzinstitute müssen Anlagerisiken korrekt und transparent kommunizieren \n• Systemische Anreize für Risikolimitierung schaffen (Finanzkrise 2007: individuell rational, kollektiv katastrophal)\n• Default-Effekte nutzen (schwedisches Beispiel: guter Standardfonds schlägt aktive Wahl)\n• Nudge-Ansätze: automatische Vorsorgebeiträge (Save More Tomorrow)\nKritik: Wer entscheidet, was eine „gute\" Default-Option ist? Paternalismusvorwurf. Regulierung kann auch Fehlanreize setzen (z.B. Too-big-to-fail).","a_short":"Behavioral Finance: Teilgebiet der Wirtschaftspsychologie am Finanzmarkt – fragt, wann und wie Anlegerverhalten von rationalen Annahmen abweicht. Zwei Säulen: Grenzen der Arbitrage + Psychologie der Akteure.\nRegulierungsimplikationen: \n• Spekulationsblasen verhindern durch antizyklische Maßnahmen\n• Finanzinstitute müssen Anlagerisiken korrekt und transparent kommunizieren \n• Systemische Anreize für Risikolimitierung schaffen (Finanzkrise 2007: individuell rational, kollektiv katastrophal)\n• Default-Effekte nutzen (schwedisches Beispiel: guter Standardfonds schlägt aktive Wahl)\n• Nudge-Ansätze: automatische Vorsorgebeiträge (Save More Tomorrow)\nKritik: Wer entscheidet, was eine „gute\" Default-Option ist? Paternalismusvorwurf. Regulierung kann auch Fehlanreize setzen (z.B. Too-big-to-fail).","extra":{"beispiel":"guter Standardfonds schlägt aktive Wahl)"},"hasInfo":true},{"id":265,"cat":"Finanzpsychologie","q":"Klausurfrage: Steuerhinterziehung – Erklärung und Prävention aus finanzpsychologischer Perspektive.","a":"Ausmaß: 8 % globaler Finanzvermögen versteckt; EU-Verlust bis zu 1 Billion € p.a. (EU-Kommission 2016).\nTraditionell (Becker, 1968): Rationale Kosten-Nutzen-Abwägung – Hinterziehung wenn Nutzen > erwartete Strafe.\nPsychologische Ergänzungen: \n• Prospect Theory: Bei erwarteter Steuernachzahlung (= Verlust) höhere Hinterziehungsneigung als bei Rückzahlung (Gewinn)\n• Gesellschaftliche Normen und individuell wahrgenommene Fairness\n• Persönlichkeit (Unzufriedenheit, Egoismus) erklärt beobachtete Hinterziehung besser als Einstellungen\n3 Präventionsansätze: \nEnforcement (Prüfungen + Strafen) / Service (Kundenorientierung) / Trust – Alm & Torgler 2011 (Normen stärken, Amnestien vermeiden, Fairness ernst nehmen)\nFazit: Rein monetäre Abschreckung greift zu kurz – Steuermoral ist kulturelles Phänomen.","a_short":"Ausmaß: 8 % globaler Finanzvermögen versteckt; EU-Verlust bis zu 1 Billion € p.a. (EU-Kommission 2016).\nTraditionell (Becker, 1968): Rationale Kosten-Nutzen-Abwägung – Hinterziehung wenn Nutzen > erwartete Strafe.\nPsychologische Ergänzungen: \n• Prospect Theory: Bei erwarteter Steuernachzahlung (= Verlust) höhere Hinterziehungsneigung als bei Rückzahlung (Gewinn)\n• Gesellschaftliche Normen und individuell wahrgenommene Fairness\n• Persönlichkeit (Unzufriedenheit, Egoismus) erklärt beobachtete Hinterziehung besser als Einstellungen\n3 Präventionsansätze: \nEnforcement (Prüfungen + Strafen) / Service (Kundenorientierung) / Trust – Alm & Torgler 2011 (Normen stärken, Amnestien vermeiden, Fairness ernst nehmen)\nFazit: Rein monetäre Abschreckung greift zu kurz – Steuermoral ist kulturelles Phänomen.","extra":{},"hasInfo":false},{"id":266,"cat":"Finanzpsychologie","q":"Klausurfrage: Geldillusion und ihre wirtschaftliche Bedeutung – Erklärung, Beispiel, Konsequenzen.","a":"Definition: Menschen denken und handeln in nominalen statt in realen Geldeinheiten, auch wenn Letztere rational relevant wären.\nBeispiel (Shafir et al. 1997): \n+2 % Nominallohn bei 4 % Inflation → bewertet als Lohnerhöhung\n−2 % Nominallohn bei 0 % Inflation → bewertet als Lohnsenkung\nRealeffekt in beiden Fällen: −2 % Reallohn\nWirtschaftliche Konsequenzen: \n• Unternehmen können in Hochinflationsphasen Reallöhne ohne Widerstand senken\n• Kurzfristig: mehr Beschäftigung möglich (Akerlof et al., 2000)\n• Bei starker Inflation oder Währungsumstellung: Preisintransparenz, desorientierende Wirkung\n• Beeinflusst Konjunkturverlauf über Lohn- und Nachfrageeffekte\nWichtig für Prof. Süßmair: Geldillusion ist ein konkretes Beispiel, wie psychologische Wahrnehmungsverzerrungen gesamtwirtschaftlich wirksam werden.","a_short":"Definition: Menschen denken und handeln in nominalen statt in realen Geldeinheiten, auch wenn Letztere rational relevant wären.\nBeispiel (Shafir et al. 1997): \n+2 % Nominallohn bei 4 % Inflation → bewertet als Lohnerhöhung\n−2 % Nominallohn bei 0 % Inflation → bewertet als Lohnsenkung\nRealeffekt in beiden Fällen: −2 % Reallohn\nWirtschaftliche Konsequenzen: \n• Unternehmen können in Hochinflationsphasen Reallöhne ohne Widerstand senken\n• Kurzfristig: mehr Beschäftigung möglich (Akerlof et al., 2000)\n• Bei starker Inflation oder Währungsumstellung: Preisintransparenz, desorientierende Wirkung\n• Beeinflusst Konjunkturverlauf über Lohn- und Nachfrageeffekte\nWichtig für Prof. Süßmair: Geldillusion ist ein konkretes Beispiel, wie psychologische Wahrnehmungsverzerrungen gesamtwirtschaftlich wirksam werden.","extra":{},"hasInfo":false},{"id":267,"cat":"Finanzpsychologie","q":"Last Minute – Kernbegriffe Kap. 10: Geldillusion / Prospect Theory / Verlustaversion / Behavioral Finance / Arbitrage / Endowment-Effekt / Gift-Exchange / Trust-Ansatz","a":"• Geldillusion: Denken in Nominalwerten statt Realwerten\n     "title": "Was Wirtschaftspsychologie ist und woher sie kommt",

    "konzepte": "Definition und Selbstverständnis (empirische Wissenschaft), Postulat 'Wirtschaft wird von Menschen gemacht', Wie- und Wozu-Frage, Disziplinen der Psychologie (Sozialpsychologie als Fundament), BWL und VWL (Mikro/Makro), drei Themenkreise und wirtschaftlicher Kreislauf, Geschichte (Smith, Wundt, Münsterberg, Tarde, Veblen, Hawthorne, Taylor, Katona, Kahneman), Typologie der Aussagen.",
    "lesezeit": "etwa 12 bis 14 Minuten",
    "sections": [
     {
      "h": "",
      "body": [
       "Beginnen wir mit einer Frage, die einfacher klingt, als sie ist: Womit beschäftigt sich die Wirtschaftspsychologie eigentlich? Die Antwort, die du wortnah können solltest, weil der Professor sie in Vorlesung und Lehrbuch fast identisch formuliert, lautet: Sie befasst sich mit dem Erleben und Verhalten des Menschen beim wirtschaftlichen Handeln, mit einem Schwerpunkt auf dem Entscheidungsverhalten. Genauso wichtig ist der zweite Teil dieser Definition: Sie ist eine empirische Wissenschaft. Das heißt, sie gewinnt ihre Erkenntnisse nicht im Lehnstuhl durch bloßes Nachdenken, sondern durch systematische Beobachtung, Experimente und Datenauswertung. Diese beiden Halbsätze, Gegenstand und empirische Methode, sind Grundlagenwissen, und sie tauchen mit hoher Wahrscheinlichkeit in der Klausur auf.",
       "Dahinter steht ein Leitgedanke, das zentrale Postulat des Fachs: Wirtschaft wird von Menschen gemacht. Gemeint ist, dass es die Wirtschaft nur gibt, weil Menschen gemeinschaftlich organisierte Austauschprozesse gefunden haben, die ihnen das Überleben in einer Welt knapper Ressourcen erleichtern. Teilen, Tauschen und Handeln haben sich über Zehntausende von Jahren herausgebildet, sie gehören zur menschlichen Natur. Daraus folgt der Anspruch des Fachs: Ohne Psychologie kann man die Wirtschaft nicht verstehen."
      ]
     },
     {
      "h": "Nicht nur das Irrationale, und immer auch das Wozu",
      "body": [
       "Ein verbreitetes Missverständnis ist, Wirtschaftspsychologie handle nur vom Irrationalen. Dieses Image entsteht, weil Medien und Politik sie meist dann zu Hilfe rufen, wenn etwas schiefläuft. Tatsächlich erklärt sie aber genauso, warum etwas gelingt. Und selbst scheinbar irrationales Verhalten hat oft gute Gründe. Menschen wollen zum Beispiel nicht möglichst viel verdienen, sondern mehr als ihre Nachbarn, und sie suchen das absolut beste Produkt, nehmen dann aber das erstbeste. Worauf sie eigentlich aus sind: im Kampf um knappe Ressourcen mit möglichst wenig Aufwand möglichst gut dazustehen. Deshalb fragt das Fach nicht nur nach dem Wie, also den naheliegenden Ursachen eines Verhaltens, sondern auch nach dem Wozu, den Letztursachen. Diese Doppelperspektive ist typisch und hilft dir, Verhalten tiefer zu deuten."
      ]
     },
     {
      "h": "Wo das Fach zu Hause ist",
      "body": [
       "Um die Wirtschaftspsychologie einzuordnen, brauchst du zwei Landkarten, eine psychologische und eine ökonomische. In der Psychologie gibt es mehrere Disziplinen: die Allgemeine Psychologie behandelt die Grundlagen des Erlebens, die Persönlichkeitspsychologie die Unterschiede zwischen Menschen, dazu kommen Entwicklungs-, biologische und evolutionäre Psychologie. Den einen Satz, den du dir hier unbedingt merkst, ist aber dieser: Die Sozialpsychologie gilt als das Fundament der Wirtschaftspsychologie, weil wirtschaftliches Handeln immer in einem sozialen Umfeld stattfindet, mit Gruppen, Normen und Wettstreit um Ressourcen. Wegen ihrer starken Anwendungsorientierung lässt sich das Fach zugleich als Teil der Angewandten Psychologie verstehen.",
       "Die zweite Landkarte ist die Ökonomie, wobei du Wirtschaft und Ökonomie unterscheiden solltest: Wirtschaft meint das System, Ökonomie die Lehre davon. Die Betriebswirtschaftslehre betrachtet die einzelnen Betriebe, mit Themen wie Produktion, Strategie, Finanzen, Organisation, Marketing und Personal, und genau hier liegen die Brücken zur Psychologie. Die Volkswirtschaftslehre abstrahiert von den einzelnen Betrieben und teilt sich in Mikroökonomik, die das Verhalten von Haushalten und Unternehmen auf Märkten untersucht, und Makroökonomik, die Staat, Konjunktur, Geldpolitik und Arbeitslosigkeit in den Blick nimmt.",
       "Diese Ordnung spiegelt sich in der Gliederung des ganzen Fachs. Fichter teilt es in drei Themenkreise, die du als roten Faden durch das gesamte Studienjahr verstehen kannst: Erstens Konsum, Markt und Werbung, die Perspektive des Verbrauchs, mikroökonomisch. Zweitens Arbeit, Organisation und Personal, die Perspektive der Herstellung, ebenfalls mikroökonomisch. Und drittens Geld, Gesellschaft und Entwicklung, die gesamtwirtschaftlichen Rahmenbedingungen, makroökonomisch. Dahinter steht ein einfacher wirtschaftlicher Kreislauf: Menschliche Bedürfnisse sind die Basis, Güter werden durch Arbeit hergestellt, dafür organisieren sich Menschen und brauchen passend ausgewähltes, entlohntes Personal, und mit dem Lohn wird wieder konsumiert, während ein Teil an Staat und Vorsorge geht.",
       ". . ."
      ]

     {
      "h": "Eine kurze Geschichte mit ein paar Namen, die sitzen müssen",
      "body": [
       "Ökonomische Überlegungen sind uralt, von den alten Ägyptern über Hesiod, der die Arbeit zugleich als wichtigste Beschäftigung und als Übel aus der Büchse der Pandora sah, bis zu Aristoteles. Den ersten großen Namen, den du brauchst, ist Adam Smith, der 1776 mit dem Wohlstand der Nationen als Begründer der modernen Wirtschaftswissenschaft gilt. Von ihm stammt das Bild der unsichtbaren Hand: Das Streben jedes Einzelnen nach eigenem Nutzen wirkt in der Summe wie eine ordnende Kraft. Aus dieser Tradition stammt auch das Menschenbild des Homo oeconomicus, des durchweg rationalen Nutzenmaximierers, das uns später noch oft als Kontrastfolie begegnet.",
       "Die wissenschaftliche Psychologie als empirisches Fach entstand 1879, als Wilhelm Wundt in Leipzig das erste psychologische Labor gründete. Und jetzt der wichtigste Name des Kapitels: Hugo Münsterberg, ein Schüler Wundts, gilt als Begründer der Wirtschaftspsychologie. Er baute an der Harvard University ein Labor auf, setzte experimentelle Methoden für betriebliche Fragen ein, etwa Auswahlverfahren für Telefonistinnen und Straßenbahnfahrer, und veröffentlichte 1912 das Buch Psychologie und Wirtschaftsleben. Hier lauert eine klassische Falle: Den Begriff Wirtschaftspsychologie hat nicht Münsterberg zuerst verwendet, sondern Gabriel Tarde, bereits 1902, allerdings folgenlos. Begründer und Begriffsprägerin sind also zwei verschiedene Personen, verwechsle sie nicht.",
       "Ein paar weitere Namen runden das Bild: Walter Dill Scott begründete die Werbepsychologie, Kurt Lewin die Feldtheorie und die Forschung zu Führungsstilen, und der Soziologe Thorstein Veblen lieferte den Veblen-Effekt, also die Beobachtung, dass die Nachfrage nach Luxusgütern trotz Preiserhöhung steigen kann, weil sie Status demonstrieren. Ab etwa 1930 stagnierte die Entwicklung, doch zwei Dinge aus dieser Zeit musst du kennen. Erstens die Hawthorne-Studien: Bei einem Beleuchtungsexperiment stieg die Arbeitsleistung sogar dann, als man die Beleuchtung wieder senkte, einfach weil die Arbeiterinnen wussten, Teil einer Studie zu sein. Die Lehre daraus war, dass härteres Anpeitschen nicht mehr Leistung bringt, sondern Sinn, Anerkennung und gute Beziehungen, das war der Beginn der Human-Relations-Bewegung und das Ende des Taylorismus, jener Lehre Frederick Taylors, die Arbeit in kleinste, monotone Schritte zerlegte. Zweitens George Katona, der ein bis heute genutztes Instrument zur Messung der Konsumentenstimmung entwickelte und damit den dritten Themenkreis vorbereitete. Den vorläufigen Schlusspunkt setzt das Jahr 2002, als der Psychologe Daniel Kahneman den Wirtschaftsnobelpreis erhielt, für seine Arbeiten mit Amos Tversky zu Urteilsheuristiken und zur Prospect Theory. Damit war die Verhaltensökonomie endgültig etabliert, und Krisen wie die Dotcom-Blase und die Subprime-Krise bestätigten, dass das reine Homo-oeconomicus-Bild zu kurz greift."
      ]

      "h": "Vier Arten, etwas zu sagen",
      "body": [
       "Zum Schluss dieses ersten Texts ein kleines, aber ausdrücklich klausurrelevantes Werkzeug: die Typologie der Aussagen. Es gibt vier Typen, und am leichtesten merkst du sie über je ein Verb. Eine deskriptive Aussage beschreibt einen Sachverhalt, sie stellt wertfrei den Ist-Zustand dar. Eine explikative Aussage erklärt ihn, sie stützt sich auf Gesetzmäßigkeiten, deren logische Form im Hempel-Oppenheim-Schema steckt und die man durch den Versuch der Falsifikation prüft. Eine normative Aussage bewertet einen Sachverhalt, sie beruft sich auf Normen, also gesellschaftlich festgelegte Regeln. Und eine präskriptive Aussage fordert etwas, sie beschreibt einen Soll-Zustand im Sinne von so soll es sein. Der Merksatz, den du sicher beherrschen solltest, lautet also: beschreiben, erklären, bewerten, fordern. Pass besonders auf das letzte Paar auf, denn normativ und präskriptiv werden leicht verwechselt: Das eine bewertet, das andere fordert."

       "Ein eigenes, prüfungsdichtes Feld ist die Preiswahrnehmung. Sie verläuft nicht als glatte Kurve, sondern über Schwellen: Es gibt eine absolute obere Schwelle, ab der etwas als zu teuer oder unfair gilt, eine absolute untere Schwelle, unter der Qualitätszweifel aufkommen, und dazwischen einen akzeptierten Bereich, in dem Preisänderungen kaum auffallen. Besonders prüfungsrelevant sind zwei Mechanismen, die erklären, dass der Absatz bei steigendem Preis sogar steigen kann, und die du sauber trennen musst. Die Preis-Qualitäts-Heuristik nutzt den Preis als Qualitätssignal, klassisch belegt durch die McConnell-Bier-Studie, in der teureres Bier besser schmeckte. Der Veblen-Effekt dagegen beruht auf Status und Luxus, in der Variante des Geltungskonsums etwa beim Prius als sichtbarem Statussymbol. Beide führen zu mehr Absatz bei höherem Preis, aber aus völlig verschiedenen Gründen. Hinzu kommen zwei weitere Effekte: Der Ankereffekt lässt uns bei geringem Preiswissen an einer willkürlichen Vorgabe orientieren, sodass ein höheres Startgebot den Endpreis hebt. Der Kompromisseffekt, auch Extremeness Aversion, sorgt dafür, dass ein sehr teures Zusatzprodukt die bisher teuerste Option plötzlich attraktiver macht. Schließlich wirken gebrochene Preise wie 2,99, weil die linke Ziffer dominiert und die Neun mit Preisgünstigkeit assoziiert wird, und der Pain of Paying nach Prelec und Loewenstein erklärt, dass Barzahlung mehr Schmerz auslöst als Karte oder Flatrate, sodass die Entkopplung von Konsum und Bezahlung den Konsum erhöht."
      ]
     }

       "Stell dir vor, du sollst einen Arbeitsplatz besser machen, sagen wir ein Callcenter, in dem die Leute reihenweise kündigen. Dein erster Reflex ist vielleicht, sofort etwas zu ändern. Genau das ist der Fehler, den die Arbeitspsychologie vermeiden will. Bevor man etwas verbessern kann, muss man verstehen, woraus die Arbeit überhaupt besteht. Deshalb gelten Arbeitsanalyse und Arbeitsgestaltung als zwei der vornehmsten Aufgaben des Fachs. Das Schöne daran ist, dass hier beide Seiten gewinnen: Eine gut gestaltete Arbeit lässt sich ohne gesundheitliche Schädigung und trotzdem produktiv ausführen. Das war historisch keine Selbstverständlichkeit, denn in der frühen Industrialisierung waren viele Arbeitsplätze menschenunwürdig und zugleich ineffizient. Dass man die Passung zwischen Mensch und Arbeit überhaupt als Problem erkannte, verdanken wir frühen Wirtschaftspsychologen wie Hugo Münsterberg."

      "h": "Herzberg: zwei Dimensionen statt einer Skala",

      "body": [
