"Alle Bemühungen einer Person, das eigene Verhalten zielgerichtet zu beeinflussen.","extra":{},"hasInfo":false},{"id":93,"cat":"Arbeit","q":"Definiere 'Entrepreneurship' (Unternehmertum).","a":"Die Einstellung und Handlung, innovative Geschäftsmöglichkeiten zu identifizieren und ökonomisch zu nutzen.","a_short":"Die Einstellung und Handlung, innovative Geschäftsmöglichkeiten zu identifizieren und ökonomisch zu nutzen.","extra":{"definition":"Die Einstellung und Handlung, innovative Geschäftsmöglichkeiten zu identifizieren und ökonomisch zu nutzen."},"hasInfo":true},{"id":94,"cat":"Arbeit","q":"Was ist 'unternehmerische Findigkeit'?","a":"Die Fähigkeit, geschäftliche Möglichkeiten zu entdecken, ohne gezielt nach ihnen gesucht zu haben.","a_short":"Die Fähigkeit, geschäftliche Möglichkeiten zu entdecken, ohne gezielt nach ihnen gesucht zu haben.","extra":{"definition":"Die Fähigkeit, geschäftliche Möglichkeiten zu entdecken, ohne gezielt nach ihnen gesucht zu haben."},"hasInfo":true},{"id":95,"cat":"Arbeit","q":"Was versteht man unter 'Social Loafing' (soziales Faulenzen)?","a":"Der unbewusste Abfall der individuellen Leistung in einer Gruppe, wenn der Einzelbeitrag nicht direkt messbar ist.","a_short":"Der unbewusste Abfall der individuellen Leistung in einer Gruppe, wenn der Einzelbeitrag nicht direkt messbar ist.","extra":{"definition":"Der unbewusste Abfall der individuellen Leistung in einer Gruppe, wenn der Einzelbeitrag nicht direkt messbar ist."},"hasInfo":true},{"id":96,"cat":"Arbeit","q":"Welchen Fokus hat 'Organisationsentwicklung' (OE) im Vergleich zum Change Management?","a":"OE fokussiert stärker auf den Einbezug der Betroffenen (Bottom-Up) und langfristige soziale Prozesse.","a_short":"OE fokussiert stärker auf den Einbezug der Betroffenen (Bottom-Up) und langfristige soziale Prozesse.","extra":{},"hasInfo":false},{"id":97,"cat":"Arbeit","q":"Was ist der Hauptzweck des 'Job Diagnostic Survey' (JDS) von Hackman und Oldham?","a":"Die Ermittlung, wie motivierend eine Arbeit aufgrund bestimmter Merkmale (z. B. Autonomie, Rückmeldung) ist.","a_short":"Die Ermittlung, wie motivierend eine Arbeit aufgrund bestimmter Merkmale (z. B. Autonomie, Rückmeldung) ist.","extra":{"beispiel":"(z. B. Autonomie, Rückmeldung)"},"hasInfo":true},{"id":98,"cat":"Arbeit","q":"Welche Gefahr besteht bei der 'Partikularisierung' von Aufgaben in der Produktion?","a":"Die Entstehung von Sinnentleerung durch die Zerlegung der Arbeit in kleinste, monotone Schritte.","a_short":"Die Entstehung von Sinnentleerung durch die Zerlegung der Arbeit in kleinste, monotone Schritte.","extra":{},"hasInfo":false},{"id":99,"cat":"Arbeit","q":"Warum wird die Maslow-Pyramide in der Arbeitspsychologie kritisiert?","a":"Motive bauen in der Realität nicht zwingend hierarchisch aufeinander auf und das Modell ist empirisch nicht bestätigt.","a_short":"Motive bauen in der Realität nicht zwingend hierarchisch aufeinander auf und das Modell ist empirisch nicht bestätigt.","extra":{},"hasInfo":false},{"id":100,"cat":"Arbeit","q":"Definiere den Begriff 'Arbeitsanalyse'.","a":"Die systematische Untersuchung eines Arbeitsplatzes mit wissenschaftlichen Methoden zur Erfassung von Aufgaben und Anforderungen.","a_short":"Die systematische Untersuchung eines Arbeitsplatzes mit wissenschaftlichen Methoden zur Erfassung von Aufgaben und Anforderungen.","extra":{"definition":"Die systematische Untersuchung eines Arbeitsplatzes mit wissenschaftlichen Methoden zur Erfassung von Aufgaben und Anforderungen."},"hasInfo":true},{"id":101,"cat":"Arbeit","q":"Was charakterisiert ein 'soziotechnisches System'?","a":"Die Erkenntnis, dass technische und soziale Faktoren in einer Organisation untrennbar miteinander verknüpft sind.","a_short":"Die Erkenntnis, dass technische und soziale Faktoren in einer Organisation untrennbar miteinander verknüpft sind.","extra":{},"hasInfo":false},{"id":102,"cat":"Organisation","q":"Äußere Wirkung von Organisationskultur?","a":"relevant für Image der Organisation ggü. Kunden + Mitarbeiter","a_short":"relevant für Image der Organisation ggü. Kunden + Mitarbeiter","extra":{},"hasInfo":false},{"id":103,"cat":"Organisation","q":"Definition: Personalführung","a":"Personalführung zielt darauf ab, Menschen durch orientierende,\nunterstützende und motivierende Interaktionen zu befähigen und sie dazu zu\nbewegen, ihr Bestmögliches zum Erreichen der Organisationsziele\nbeizutragen.\nDie alte Frage nach dem Führungserfolg wurde lange mit den Eigenschaften\nder Führungskraft begründet","a_short":"Personalführung zielt darauf ab, Menschen durch orientierende,\nunterstützende und motivierende Interaktionen zu befähigen und sie dazu zu\nbewegen, ihr Bestmögliches zum Erreichen der Organisationsziele\nbeizutragen.\nDie alte Frage nach dem Führungserfolg wurde lange mit den Eigenschaften\nder Führungskraft begründet","extra":{},"hasInfo":false},{"id":104,"cat":"Organisation","q":"Verhaltensorientierte Ansätze","a":"Sie gehen davon aus, dass Führungsverhalten gelernt und verändert\nwerden kann.\nSituationsorientierte","a_short":"Sie gehen davon aus, dass Führungsverhalten gelernt und verändert\nwerden kann.\nSituationsorientierte","extra":{},"hasInfo":false},{"id":105,"cat":"Organisation","q":"MODELL nach SCHEIN","a":"1) Beziehung zur Umwelt → wie betrachten Organisationsmitglieder diese Beziehungen\n2) Natur der Wirklichkeit →was hat innerhalb der Organisation Geltung\n3) Natur der menschIichenTätigkeit →wie sollen sich Organisationsmitglieder in Bezug auf 1) + 2) verhalten\n4) Natur der menschlichen Beziehungen → wie sollen Organisationsmitglieder miteinander umgehen","a_short":"1) Beziehung zur Umwelt → wie betrachten Organisationsmitglieder diese Beziehungen\n2) Natur der Wirklichkeit →was hat innerhalb der Organisation Geltung\n3) Natur der menschIichenTätigkeit →wie sollen sich Organisationsmitglieder in Bezug auf 1) + 2) verhalten\n4) Natur der menschlichen Beziehungen → wie sollen Organisationsmitglieder miteinander umgehen","extra":{},"hasInfo":false},{"id":106,"cat":"Organisation","q":"Situationsorientierte Ansätze","a":"Sie berücksichtigen situative Faktoren (z. B. Strukturiertheit der Aufgaben,\nMacht der Führungskraft, Art der zu fällenden Entscheidung.)","a_short":"Sie berücksichtigen situative Faktoren (z. B. Strukturiertheit der Aufgaben,\nMacht der Führungskraft, Art der zu fällenden Entscheidung.)","extra":{"beispiel":"(z. B. Strukturiertheit der Aufgaben,\nMacht der Führungskraft, Art der zu fällenden Entscheidung.)"},"hasInfo":true},{"id":107,"cat":"Organisation","q":"In welchen Formen zeigt sich Organisationskultur?","a":"• Artefakten (z.B. Bürotüren offen oder geschlossen, Unternehmensfarben, Logos, „Look und Feel“ der\nOrganisation),\n• Werten, z.B. Schutz der Umwelt + MA),\n• Annahmen über das Funktionieren des Unternehmens:","a_short":"• Artefakten (z.B. Bürotüren offen oder geschlossen, Unternehmensfarben, Logos, „Look und Feel“ der\nOrganisation),\n• Werten, z.B. Schutz der Umwelt + MA),\n• Annahmen über das Funktionieren des Unternehmens:","extra":{"beispiel":"(z. B. Bürotüren offen oder geschlossen, Unternehmensfarben, Logos, „Look und Feel“ der\nOrganisation)"},"hasInfo":true},{"id":108,"cat":"Organisation","q":"Welche vier Schritte werden prinzipiell für Wissensmanagement erfordert?","a":"1. Bestandsaufnahme\n2. Speicherung\n3. Nutzbarmachung\n4. Aktualisierung","a_short":"1. Bestandsaufnahme\n2. Speicherung\n3. Nutzbarmachung\n4. Aktualisierung","extra":{},"hasInfo":false},{"id":109,"cat":"Organisation","q":"Definition: Wissensmanagement","a":"Wissensmanagement ist der planvolle, aktiv gesteuerte, zielorientierte\nUmgang mit dem Wissen einer Organisation, um es für die gegenwärtige und\ndie zukünftige Verwendung zu sichern.\nDies umfasst die Identifikation des relevanten Wissens, dessen Speicherung,\nAbruf, Verwendung und Weitergabe.","a_short":"Wissensmanagement ist der planvolle, aktiv gesteuerte, zielorientierte\nUmgang mit dem Wissen einer Organisation, um es für die gegenwärtige und\ndie zukünftige Verwendung zu sichern.\nDies umfasst die Identifikation des relevanten Wissens, dessen Speicherung,\nAbruf, Verwendung und Weitergabe.","extra":{},"hasInfo":false},{"id":110,"cat":"Organisation","q":"Definition Organisationsklima","a":"Das Organisationsklima beschreibt die Umgangsformen, die gemeinsam\nerlebte Stimmung und den Aktivierungsgrad der Mitglieder einer Organisation.\nEs ist zeitlich relativ überdauernd und beeinflusst das Erleben, das Verhalten\nund die Zufriedenheit der Organisationsmitglieder.\nEs kann bewusst wahrgenommen und daher auch relativ leicht gemessen und\ngestaltet werden.","a_short":"Das Organisationsklima beschreibt die Umgangsformen, die gemeinsam erlebte Stimmung und den Aktivierungsgrad der Mitglieder einer Organisation. Es ist zeitlich relativ überdauernd und beeinflusst das Erleben, das Verhalten und die Zufriedenheit der Organisationsmitglieder.","extra":{"erklaerung":"Das Organisationsklima beschreibt die Umgangsformen, die gemeinsam\nerlebte Stimmung und den Aktivierungsgrad der Mitglieder einer Organisation.\nEs ist zeitlich relativ überdauernd und beeinflusst das Erleben, das Verhalten\nund die Zufriedenheit der Organisationsmitglieder.\nEs kann bewusst wahrgenommen und daher auch relativ leicht gemessen und\ngestaltet werden."},"hasInfo":true},{"id":111,"cat":"Organisation","q":"Definition: Partizipation","a":"»(Direkte) Partizipation ist die von der Organisation gewährte oder verlangte,\nsubjektiv wahrgenommene, direkte Beteiligung des Einzelnen an Ent-\nscheidungen, die im Zusammenwirken mit anderen Organisationsmitgliedern\ngetroffen werden und die seine oder ihre mittel-oder unmittelbaren Bereiche\nder Arbeit betreffen« ( Lohmann & Prümper, 2006, S. 120).\nBei einer zu ausgeprägten Partizipationskultur besteht die Möglichkeit, dass\nEntscheidungen verzögert werden und einen Kompromisscharakter be-\nkommen.\nVgl. Jedoch Partizipation im Hinblick auf „Demokratieförderlichkeit“ gemäß\nHonneth","a_short":"»(Direkte) Partizipation ist die von der Organisation gewährte oder verlangte, subjektiv wahrgenommene, direkte Beteiligung des Einzelnen an Ent- scheidungen, die im Zusammenwirken mit anderen Organisationsmitgliedern getroffen werden und die seine oder ihre mittel-oder unmittelbaren Bereiche der Arbeit betreffen« ( Lohmann & Prümper, 2006, S. 120).","extra":{"erklaerung":"»(Direkte) Partizipation ist die von der Organisation gewährte oder verlangte,\nsubjektiv wahrgenommene, direkte Beteiligung des Einzelnen an Ent-\nscheidungen, die im Zusammenwirken mit anderen Organisationsmitgliedern\ngetroffen werden und die seine oder ihre mittel-oder unmittelbaren Bereiche\nder Arbeit betreffen« ( Lohmann & Prümper, 2006, S. 120).\nBei einer zu ausgeprägten Partizipationskultur besteht die Möglichkeit, dass\nEntscheidungen verzögert werden und einen Kompromisscharakter be-\nkommen.\nVgl. Jedoch Partizipation im Hinblick auf „Demokratieförderlichkeit“ gemäß\nHonneth"},"hasInfo":true},{"id":112,"cat":"Organisation","q":"Definition Organisationsentwicklung","a":"Organisationsentwicklung ist die planvolle Gestaltung von Organisationen, ihren Abteilungen\nund ihren Mitgliedern.\nSie umfasst eine Vielzahl von Methoden und Maßnahmen, um die Strukturen und Prozesse von\nOrganisationen zu verändern.\nZiel ist deren Weiterentwicklung –im Hinblick auf ökonomische und soziale Verbesserungen\noder als Antwort auf Anpassungsbedarf, der sich aus äußerem oder innerem Wandel ergibt.","a_short":"Organisationsentwicklung ist die planvolle Gestaltung von Organisationen, ihren Abteilungen und ihren Mitgliedern. Sie umfasst eine Vielzahl von Methoden und Maßnahmen, um die Strukturen und Prozesse von Organisationen zu verändern.","extra":{"erklaerung":"Organisationsentwicklung ist die planvolle Gestaltung von Organisationen, ihren Abteilungen\nund ihren Mitgliedern.\nSie umfasst eine Vielzahl von Methoden und Maßnahmen, um die Strukturen und Prozesse von\nOrganisationen zu verändern.\nZiel ist deren Weiterentwicklung –im Hinblick auf ökonomische und soziale Verbesserungen\noder als Antwort auf Anpassungsbedarf, der sich aus äußerem oder innerem Wandel ergibt."},"hasInfo":true},{"id":113,"cat":"Organisation","q":"Definition Organisationskultur","a":"• beschreibt ein System von Regeln, Normen, Werten und typischen Verhaltensweisen, das sich im Laufe\nder Zeit unter den Mitgliedern einer Organisation etabliert hat.\n• Sie ist den Organisationsmitgliedern meist nicht bewusst, hat aber dennoch großen Einfluss auf deren\nVerhalten.\n• Operationalisierung und damit auch Messung und Veränderung der Organisationskultur sind schwierig","a_short":"• beschreibt ein System von Regeln, Normen, Werten und typischen Verhaltensweisen, das sich im Laufe\nder Zeit unter den Mitgliedern einer Organisation etabliert hat.\n• Sie ist den Organisationsmitgliedern meist nicht bewusst, hat aber dennoch großen Einfluss auf deren\nVerhalten.\n• Operationalisierung und damit auch Messung und Veränderung der Organisationskultur sind schwierig","extra":{},"hasInfo":false},{"id":114,"cat":"Organisation","q":"warum ist Organisationsentwicklung mit Unsicherheit verbunden?","a":"- kritische Auslöser sind oft dem Wandel zugrunde\n- Beteiligte sind oft unsicher, ob Veränderungen für sie persönlich positive oder negative\nKonsequenzen hat\n- daher mit großer Verantwortung verbunden\n- Change Agentssind oftmals erforderlich, die Vertrauen der Führung + Mitarbeiter genießen\n- Dies sind häufig interne/externe Personen die die OE-Maßnahmen umsetzen (z.B. Berater,\nFührungskräfte)\n- Maßnahmen der Organisationsentwicklung sollen transparent sein, Betroffene einbeziehen,\noffen + ehrlich kommuniziert werden","a_short":"- kritische Auslöser sind oft dem Wandel zugrunde\n- Beteiligte sind oft unsicher, ob Veränderungen für sie persönlich positive oder negative\nKonsequenzen hat\n- daher mit großer Verantwortung verbunden\n- Change Agentssind oftmals erforderlich, die Vertrauen der Führung + Mitarbeiter genießen\n- Dies sind häufig interne/externe Personen die die OE-Maßnahmen umsetzen (z.B. Berater,\nFührungskräfte)\n- Maßnahmen der Organisationsentwicklung sollen transparent sein, Betroffene einbeziehen,\noffen + ehrlich kommuniziert werden","extra":{"beispiel":"(z. B. Berater,\nFührungskräfte)"},"hasInfo":true},{"id":115,"cat":"Organisation","q":"Merkmale Zielvereinbarung","a":"- Es werden mit jedem Mitarbeiter Ziele definiert, die zum Unternehmenserfolg führen sollen\n- Zweck: Leistungssicherung bzgl. der Ziele,\n- Mitarbeiter aktiv in Zielfestlegung einbinden,\n- Mitarbeiter sollen selbständig arbeiten können ohne ständige Steuerung und Kontrolle\n- Anforderungen an die Ziele:\n- S(spezifisch)\n- M(messbar)\n- A(ausführbar)\n- R(relevant)\n- T(terminierbar)\n=> gewährt Mitarbeitenden Flexibilität und entlastet gleichzeitig die Führungskraft","a_short":"- Es werden mit jedem Mitarbeiter Ziele definiert, die zum Unternehmenserfolg führen sollen\n- Zweck: Leistungssicherung bzgl. der Ziele,\n- Mitarbeiter aktiv in Zielfestlegung einbinden,\n- Mitarbeiter sollen selbständig arbeiten können ohne ständige Steuerung und Kontrolle\n- Anforderungen an die Ziele:\n- S(spezifisch)\n- M(messbar)\n- A(ausführbar)\n- R(relevant)\n- T(terminierbar)\n=> gewährt Mitarbeitenden Flexibilität und entlastet gleichzeitig die Führungskraft","extra":{},"hasInfo":false},{"id":116,"cat":"Organisation","q":"Innere Wirkung von Organisationskultur?","a":"Organisationskultur wichtig für Erreichen der Unternehmensziele","a_short":"Organisationskultur wichtig für Erreichen der Unternehmensziele","extra":{},"hasInfo":false},{"id":117,"cat":"Organisation","q":"Merkmale Mitarbeitergespräche","a":"- hohe Praxisrelevanz\n- i.d.R. fixe, geplante Termine\n- Zweck: Übergabe und Kontrolle von Aufgaben, Beziehungspflege, Besprechung von\nLeistungen, Motivierung, Entwicklung des Mitarbeiters","a_short":"- hohe Praxisrelevanz\n- i.d.R. fixe, geplante Termine\n- Zweck: Übergabe und Kontrolle von Aufgaben, Beziehungspflege, Besprechung von\nLeistungen, Motivierung, Entwicklung des Mitarbeiters","extra":{},"hasInfo":false},{"id":118,"cat":"Organisation","q":"zwei Führungsinstrumente","a":"1. Mitarbeitergespräche\n2. Zielvereinbarung (=Management by Objectives)","a_short":"1. Mitarbeitergespräche\n2. Zielvereinbarung (=Management by Objectives)","extra":{},"hasInfo":false},{"id":119,"cat":"Organisation","q":"Interaktionsorientierte Ansätze","a":"Sie betrachten die Interaktion zwischen Führungsperson und Mitarbeiter\n(z. B. transaktionale und die transformationale Führung).","a_short":"Sie betrachten die Interaktion zwischen Führungsperson und Mitarbeiter\n(z. B. transaktionale und die transformationale Führung).","extra":{"beispiel":"(z. B. transaktionale und die transformationale Führung)"},"hasInfo":true},{"id":120,"cat":"Organisation","q":"Eigenschaftsorientierte Ansätze","a":"Sie gehen davon aus, dass zeitlich stabile und situationsunabhängige\nPersönlichkeitseigenschaften für den Erfolg einer Führungskraft\nverantwortlich sind.(siehe Kapitel Personal -Persönlichkeitsdimensionen)","a_short":"Sie gehen davon aus, dass zeitlich stabile und situationsunabhängige\nPersönlichkeitseigenschaften für den Erfolg einer Führungskraft\nverantwortlich sind.(siehe Kapitel Personal -Persönlichkeitsdimensionen)","extra":{},"hasInfo":false},{"id":121,"cat":"Organisation","q":"Funktionen der Organisationskultur","a":"- Abgrenzung ggü. anderen Organisationen\n- Identitätsstiftung („Wir-Gefühl“)\n- Förderung der Bindung an die Organisation\n- Unterstützung der Stabilität des Systems\n- Vermitteln von Verhaltensmaßstäben\n- Sozialisation neuer Organisationsmitglieder","a_short":"- Abgrenzung ggü. anderen Organisationen\n- Identitätsstiftung („Wir-Gefühl“)\n- Förderung der Bindung an die Organisation\n- Unterstützung der Stabilität des Systems\n- Vermitteln von Verhaltensmaßstäben\n- Sozialisation neuer Organisationsmitglieder","extra":{},"hasInfo":false},{"id":122,"cat":"Organisation","q":"Definition: Change Management","a":"Change Management umfasst alle bewusst getroffenen Maßnahmen, die zur\nAnpassung einer Organisation an sich wandelnde Anforderungen getroffen\nwerden.\nDie getroffenen Maßnahmen sind oft weitreichend und können Strukturen,\nProzesse, Strategie, Führung und Personal einer Organisation betreffen","a_short":"Change Management umfasst alle bewusst getroffenen Maßnahmen, die zur\nAnpassung einer Organisation an sich wandelnde Anforderungen getroffen\nwerden.\nDie getroffenen Maßnahmen sind oft weitreichend und können Strukturen,\nProzesse, Strategie, Führung und Personal einer Organisation betreffen","extra":{},"hasInfo":false},{"id":123,"cat":"Organisation","q":"Wie berechnet sich der Economic Profit (Uebergewinn)?","a":"Economic Profit = (ROIC - WACC) x investiertes Kapital. Wert wird nur geschaffen, wenn ROIC groesser als WACC ist. (Klausur: selbst rechnen koennen, Folie 24.)","a_short":"Economic Profit = (ROIC - WACC) x investiertes Kapital. Wert wird nur geschaffen, wenn ROIC groesser als WACC ist. (Klausur: selbst rechnen koennen, Folie 24.)","extra":{"quelle":"(Klausur: selbst rechnen koennen, Folie 24.); Folie 24"},"hasInfo":true},{"id":124,"cat":"Organisation","q":"Was ist der ROIC und wie wird er berechnet?","a":"Return on Invested Capital = Betriebsergebnis / investiertes Kapital. Die Rendite auf das eingesetzte Kapital.","a_short":"Return on Invested Capital = Betriebsergebnis / investiertes Kapital. Die Rendite auf das eingesetzte Kapital.","extra":{"definition":"Return on Invested Capital = Betriebsergebnis / investiertes Kapital."},"hasInfo":true},{"id":125,"cat":"Organisation","q":"Wie berechnet sich der WACC (gewichteter Kapitalkostensatz)?","a":"WACC = D/(D+E) x CD + E/(D+E) x CE. D = Fremdkapital, E = Eigenkapital, CD = Fremdkapitalkosten, CE = Eigenkapitalkosten. Beispiel: 40% FK zu 2% + 60% EK zu 5% = 3,8%.","a_short":"WACC = D/(D+E) x CD + E/(D+E) x CE. D = Fremdkapital, E = Eigenkapital, CD = Fremdkapitalkosten, CE = Eigenkapitalkosten. Beispiel: 40% FK zu 2% + 60% EK zu 5% = 3,8%.","extra":{"beispiel":"40% FK zu 2% + 60% EK zu 5% = 3,8%."},"hasInfo":true},{"id":126,"cat":"Organisation","q":"Rechenbeispiel: investiertes Kapital 1000, Betriebsergebnis 100, WACC 3,8% - wie hoch ist der Economic Profit?","a":"ROIC = 100/1000 = 10%. Economic Profit = (10% - 3,8%) x 1000 = rund 62 Euro. Faellt ROIC unter den WACC, wird der Economic Profit negativ (Wertvernichtung).","a_short":"ROIC = 100/1000 = 10%. Economic Profit = (10% - 3,8%) x 1000 = rund 62 Euro. Faellt ROIC unter den WACC, wird der Economic Profit negativ (Wertvernichtung).","extra":{},"hasInfo":false},{"id":127,"cat":"Organisation","q":"Welche vier Grundfunktionen muss nach dem AGIL-Modell (Parsons) jedes soziale System erfuellen?","a":"Adaptation (Anpassung/Ressourcen - Wirtschaft), Goal Attainment (Zielerreichung - Politik/Recht), Integration (soziale Integration - Schulen/Sozialisation), Latency/Strukturerhaltung (Werte - Kultur/Religion/Wissenschaft). (Klausurrelevant, Folie 44.)","a_short":"Adaptation (Anpassung/Ressourcen - Wirtschaft), Goal Attainment (Zielerreichung - Politik/Recht), Integration (soziale Integration - Schulen/Sozialisation), Latency/Strukturerhaltung (Werte - Kultur/Religion/Wissenschaft). (Klausurrelevant, Folie 44.)","extra":{"quelle":"(Klausurrelevant, Folie 44.); Folie 44"},"hasInfo":true},{"id":128,"cat":"Organisation","q":"Welche Achsen hat die Strategic Control Map?","a":"x-Achse: Umsatz (Mrd USD). y-Achse: Marktwert/Umsatz-Verhaeltnis. Das Produkt beider ergibt den absoluten Marktwert (Hyperbeln gleichen Marktwerts).","a_short":"x-Achse: Umsatz (Mrd USD). y-Achse: Marktwert/Umsatz-Verhaeltnis. Das Produkt beider ergibt den absoluten Marktwert (Hyperbeln gleichen Marktwerts).","extra":{},"hasInfo":false},{"id":129,"cat":"Organisation","q":"Welche vier strategischen Gruppen unterscheidet die Strategic Control Map?","a":"Second Tier (geringer Umsatz, geringes Multiple), Integrated Size Players (hoher Umsatz, geringes Multiple), Focused Attackers (geringer Umsatz, hohes Multiple), Industry Shapers (hoher Umsatz, hohes Multiple).","a_short":"Second Tier (geringer Umsatz, geringes Multiple), Integrated Size Players (hoher Umsatz, geringes Multiple), Focused Attackers (geringer Umsatz, hohes Multiple), Industry Shapers (hoher Umsatz, hohes Multiple).","extra":{},"hasInfo":false},{"id":130,"cat":"Organisation","q":"Worin unterscheiden sich Shareholder- und Stakeholder-Ansatz?","a":"Shareholder-Ansatz: Orientierung am Eigentuemer-/Aktionaerswert (Finanzmarkt priorisiert). Stakeholder-Ansatz: Beruecksichtigung aller Anspruchsgruppen (Kunden, Mitarbeiter, Lieferanten, Gesellschaft).","a_short":"Shareholder-Ansatz: Orientierung am Eigentuemer-/Aktionaerswert (Finanzmarkt priorisiert). Stakeholder-Ansatz: Beruecksichtigung aller Anspruchsgruppen (Kunden, Mitarbeiter, Lieferanten, Gesellschaft).","extra":{},"hasInfo":false},{"id":131,"cat":"Organisation","q":"Was ist der Total Return to Shareholder (TRS) und wie kann ihn das Management beeinflussen?","a":"TRS = Kurszuwachs + Dividende. Beeinflussbar nur ueber die Veraenderung der Markterwartungen an die oekonomische Leistung (DEEP): kurzfristig STEEP (Gewinnschaetzungen/EPS), langfristig LTEEP (Kurs-Gewinn-Verhaeltnis P/E).","a_short":"TRS = Kurszuwachs + Dividende. Beeinflussbar nur ueber die Veraenderung der Markterwartungen an die oekonomische Leistung (DEEP): kurzfristig STEEP (Gewinnschaetzungen/EPS), langfristig LTEEP (Kurs-Gewinn-Verhaeltnis P/E).","extra":{"definition":"TRS = Kurszuwachs + Dividende."},"hasInfo":true},{"id":132,"cat":"Organisation","q":"Wie wird der Unternehmenswert ueber die DCF-Methode bestimmt (inkl. NOPLAT)?","a":"Kuenftige Free Cash Flows mit dem WACC auf heute abzinsen, plus diskontierter Restwert. FCF aus EBIT: EBIT minus Steuern = NOPLAT, plus Abschreibungen, minus Investitionen und Working-Capital-Aenderung. (EBIT nur grob erklaeren koennen.)","a_short":"Kuenftige Free Cash Flows mit dem WACC auf heute abzinsen, plus diskontierter Restwert. FCF aus EBIT: EBIT minus Steuern = NOPLAT, plus Abschreibungen, minus Investitionen und Working-Capital-Aenderung.","extra":{"erklaerung":"Kuenftige Free Cash Flows mit dem WACC auf heute abzinsen, plus diskontierter Restwert. FCF aus EBIT: EBIT minus Steuern = NOPLAT, plus Abschreibungen, minus Investitionen und Working-Capital-Aenderung. (EBIT nur grob erklaeren koennen.)"},"hasInfo":true},{"id":133,"cat":"Organisation","q":"Welche sieben Elemente umfasst das McKinsey-7-S-Modell?","a":"Strategy, Structure, Systems, Shared Values (im Zentrum), Skills, Staff, Style. Leitsatz: structure follows strategy.","a_short":"Strategy, Structure, Systems, Shared Values (im Zentrum), Skills, Staff, Style. Leitsatz: structure follows strategy.","extra":{"merkhilfe":"structure follows strategy."},"hasInfo":true},{"id":134,"cat":"Personal","q":"Wie wählen wir die richtigen Personen aus?","a":"Eignungsdiagnostik und Auswahlverfahren","a_short":"Eignungsdiagnostik und Auswahlverfahren","extra":{},"hasInfo":false},{"id":135,"cat":"Personal","q":"Welche Mitarbeitenden benötigen wir?","a":"Arbeits-und Anforderungsanalyse","a_short":"Arbeits-und Anforderungsanalyse","extra":{},"hasInfo":false},{"id":136,"cat":"Personal","q":"Verbesserung der Erfolgsquote von einzustellenden\nMitarbeitenden\n3 Einflussfaktoren:","a":"3 Einflussfaktoren:\n• Validitätskoeffizient\n• Grundquote\n• Selektionsquote","a_short":"3 Einflussfaktoren:\n• Validitätskoeffizient\n• Grundquote\n• Selektionsquote","extra":{},"hasInfo":false},{"id":137,"cat":"Personal","q":"Interner Arbeitsmarkt","a":"Das Recruiting richtet sich an bestehende Mitarbeiter (Stellenbesetzung aus dem eigenen Personalbestand)","a_short":"Das Recruiting richtet sich an bestehende Mitarbeiter (Stellenbesetzung aus dem eigenen Personalbestand)","extra":{},"hasInfo":false},{"id":138,"cat":"Personal","q":"Vorteile extern","a":"- Gewinnung von neuem Wissen und neuen Ideen\n- Keine Probleme mit ehemaligen Kollegen, die zu Vorge- setzten werden M\n- Externer Bewerber ist nicht betriebsblind\n- Größere Auswahl an potenziell geeigneten Bewerbern\n- Kein Versetzungskarussell","a_short":"- Gewinnung von neuem Wissen und neuen Ideen\n- Keine Probleme mit ehemaligen Kollegen, die zu Vorge- setzten werden M\n- Externer Bewerber ist nicht betriebsblind\n- Größere Auswahl an potenziell geeigneten Bewerbern\n- Kein Versetzungskarussell","extra":{},"hasInfo":false},{"id":139,"cat":"Personal","q":"Welches primäre Ziel verfolgt die personenbezogen-empirische Methode im Rahmen der Arbeits- und Anforderungsanalyse?","a":"Die Ableitung von Anforderungen durch statistische Zusammenhänge zwischen Personenmerkmalen und Erfolgskriterien.","a_short":"Die Ableitung von Anforderungen durch statistische Zusammenhänge zwischen Personenmerkmalen und Erfolgskriterien.","extra":{},"hasInfo":false},{"id":140,"cat":"Personal","q":"Objektivität","a":"Es sollte keine Rolle spielen, wer den Test durchführt und auswertet, bzw.\ndas Medium; ob der Test online oder auf Papier durchgeführt wird","a_short":"Es sollte keine Rolle spielen, wer den Test durchführt und auswertet, bzw.\ndas Medium; ob der Test online oder auf Papier durchgeführt wird","extra":{},"hasInfo":false},{"id":141,"cat":"Personal","q":"Reliabilität","a":"Der Test sollte bei wiederholter Durchführung beim selben Bewerber zum\nselben Ergebnis führen","a_short":"Der Test sollte bei wiederholter Durchführung beim selben Bewerber zum\nselben Ergebnis führen","extra":{},"hasInfo":false},{"id":142,"cat":"Personal","q":"Valide Auswahlverfahren","a":"– Validität: Messen, was gemessen werden soll\n– Was soll gemessen werden: Analytisches Denken (GMA),\nTeamfähigkeit (AC-Übungen), Arbeitsweise (Arbeitsprobe),\ndiverse „Soft Skills“ (Einstellungsinterview)\n– Ziel der Messung: hohe Job Performance, Berufserfolg\n(Kriteriumsvalidität) „überdurchschnittlich gute\nMitarbeiter“","a_short":"– Validität: Messen, was gemessen werden soll\n– Was soll gemessen werden: Analytisches Denken (GMA),\nTeamfähigkeit (AC-Übungen), Arbeitsweise (Arbeitsprobe),\ndiverse „Soft Skills“ (Einstellungsinterview)\n– Ziel der Messung: hohe Job Performance, Berufserfolg\n(Kriteriumsvalidität) „überdurchschnittlich gute\nMitarbeiter“","extra":{},"hasInfo":false},{"id":143,"cat":"Personal","q":"Vorteile intern","a":"- Aufstiegspotenzial für bestehende Mitarbeiter, dadurch Motivationspotenzial\n- Durchschaubare Personalpolitik\n- Mitarbeiter kennt den Betrieb und ist im Betrieb bekannt\n- Geringe Personalbeschaffungskosten\n- Schnelle Neubesetzung der Vakanz","a_short":"- Aufstiegspotenzial für bestehende Mitarbeiter, dadurch Motivationspotenzial\n- Durchschaubare Personalpolitik\n- Mitarbeiter kennt den Betrieb und ist im Betrieb bekannt\n- Geringe Personalbeschaffungskosten\n- Schnelle Neubesetzung der Vakanz","extra":{},"hasInfo":false},{"id":144,"cat":"Personal","q":"4 wichtige themen der personalauswahl","a":"• Arbeits- und Anforderungsanalyse\n• Personalmarketing\n• Eignungsdiagnostik\n• Auswahlverfahren","a_short":"• Arbeits- und Anforderungsanalyse\n• Personalmarketing\n• Eignungsdiagnostik\n• Auswahlverfahren","extra":{},"hasInfo":false},{"id":145,"cat":"Personal","q":"Wo finden wir diese?","a":"Personalmarketing","a_short":"Personalmarketing","extra":{},"hasInfo":false},{"id":146,"cat":"Personal","q":"Validität","a":"Der Test sollte tatsächlich diejenigen Merkmale messen, die er messen soll,\nz.B. Gewissenhaftigkeit\n– prognostische Validität sagt aus, wie gut ein Verfahren den zukünftigen Berufserfolg\nvorhersagen kann\n– inkrementelle Validität: Zuwachs der Validität durch Kombination verschiedener\nAuswahlverfahren","a_short":"Der Test sollte tatsächlich diejenigen Merkmale messen, die er messen soll,\nz.B. Gewissenhaftigkeit\n– prognostische Validität sagt aus, wie gut ein Verfahren den zukünftigen Berufserfolg\nvorhersagen kann\n– inkrementelle Validität: Zuwachs der Validität durch Kombination verschiedener\nAuswahlverfahren","extra":{},"hasInfo":false},{"id":147,"cat":"Personal","q":"Externer Arbeitsmarkt","a":"Personalmarketing wendet sich an Personen außerhalb der Organisation","a_short":"Personalmarketing wendet sich an Personen außerhalb der Organisation","extra":{},"hasInfo":false},{"id":148,"cat":"Personal","q":"Welche vier Funktionen umfasst der Personalmanagement-Zyklus des Michigan-Modells?","a":"Selection (Auswahl), Appraisal (Beurteilung), Rewards (Belohnung), Development (Entwicklung) - alle auf die Performance ausgerichtet.","a_short":"Selection (Auswahl), Appraisal (Beurteilung), Rewards (Belohnung), Development (Entwicklung) - alle auf die Performance ausgerichtet.","extra":{},"hasInfo":false},{"id":149,"cat":"Personal","q":"Welche drei Ansaetze unterscheidet der trimodale Ansatz der Eignungsdiagnostik (Schuler)?","a":"Eigenschaftsorientiert (stabile Merkmale, z.B. Tests/NEO-FFI), simulationsorientiert (berufsbezogenes Verhalten, z.B. Arbeitsproben/Assessment-Center), biografieorientiert (vergangenes Verhalten, z.B. Lebenslauf, biografische Interviews).","a_short":"Eigenschaftsorientiert (stabile Merkmale, z.B. Tests/NEO-FFI), simulationsorientiert (berufsbezogenes Verhalten, z.B. Arbeitsproben/Assessment-Center), biografieorientiert (vergangenes Verhalten, z.B. Lebenslauf, biografische Interviews).","extra":{},"hasInfo":false},{"id":150,"cat":"Personal","q":"Von welchen drei Faktoren haengt nach Taylor-Russell die Verbesserung der Erfolgsquote ab?","a":"Validitaetskoeffizient des Verfahrens, Grundquote (Anteil Geeigneter in der Bewerberpopulation), Selektionsquote (Anteil Eingestellter an den Bewerbern). (Klausur: koennen.)","a_short":"Validitaetskoeffizient des Verfahrens, Grundquote (Anteil Geeigneter in der Bewerberpopulation), Selektionsquote (Anteil Eingestellter an den Bewerbern). (Klausur: koennen.)","extra":{"quelle":"(Klausur: koennen.)"},"hasInfo":true},{"id":151,"cat":"Personal","q":"Welche vier Felder ergibt das Taylor-Russell-Quadrantenmodell?","a":"EG (eingestellt + geeignet, richtige Einstellung), EU (eingestellt + ungeeignet, Fehlbesetzung), AG (abgelehnt + geeignet, verpasste Chance), AU (abgelehnt + ungeeignet, richtige Ablehnung). Erfolgsquote = Anteil EG an den Eingestellten.","a_short":"EG (eingestellt + geeignet, richtige Einstellung), EU (eingestellt + ungeeignet, Fehlbesetzung), AG (abgelehnt + geeignet, verpasste Chance), AU (abgelehnt + ungeeignet, richtige Ablehnung). Erfolgsquote = Anteil EG an den Eingestellten.","extra":{},"hasInfo":false},{"id":152,"cat":"Personal","q":"Was ist prognostische und was inkrementelle Validitaet?","a":"Prognostische Validitaet: wie gut ein Verfahren den kuenftigen Berufserfolg vorhersagt (Korrelation r). Inkrementelle Validitaet: der Validitaetszuwachs durch Kombination mehrerer Verfahren.","a_short":"Prognostische Validitaet: wie gut ein Verfahren den kuenftigen Berufserfolg vorhersagt (Korrelation r). Inkrementelle Validitaet: der Validitaetszuwachs durch Kombination mehrerer Verfahren.","extra":{"definition":"Prognostische Validitaet: wie gut ein Verfahren den kuenftigen Berufserfolg vorhersagt (Korrelation r)."},"hasInfo":true},{"id":153,"cat":"Personal","q":"Wie viel der kuenftigen Arbeitsleistung erklaeren Personalauswahlverfahren laut Schmidt-Hunter?","a":"Etwa 30 bis 50% der Variabilitaet. Validste Einzelverfahren: kognitive Faehigkeitstests, strukturierte Interviews, Arbeitsproben; Graphologie geht gegen null; Kombinationen erhoehen die Validitaet. (Tafeln/Schmidt-Hunter: verstehen, nicht auswendig.)","a_short":"Etwa 30 bis 50% der Variabilitaet. Validste Einzelverfahren: kognitive Faehigkeitstests, strukturierte Interviews, Arbeitsproben; Graphologie geht gegen null; Kombinationen erhoehen die Validitaet.","extra":{"erklaerung":"Etwa 30 bis 50% der Variabilitaet. Validste Einzelverfahren: kognitive Faehigkeitstests, strukturierte Interviews, Arbeitsproben; Graphologie geht gegen null; Kombinationen erhoehen die Validitaet. (Tafeln/Schmidt-Hunter: verstehen, nicht auswendig.)"},"hasInfo":true},{"id":154,"cat":"Personal","q":"Welche vier Stufen der Trainingsevaluation unterscheidet Kirkpatrick?","a":"Reaktionen (Gefallen, per Fragebogen), Lernen (Lernerfolg, per Test), Verhalten (Umsetzung am Arbeitsplatz), Ergebnisse (messbare Erfolgskriterien). Stufe 1 ist leicht, Stufe 4 sehr aufwendig zu erfassen.","a_short":"Reaktionen (Gefallen, per Fragebogen), Lernen (Lernerfolg, per Test), Verhalten (Umsetzung am Arbeitsplatz), Ergebnisse (messbare Erfolgskriterien). Stufe 1 ist leicht, Stufe 4 sehr aufwendig zu erfassen.","extra":{},"hasInfo":false},{"id":155,"cat":"Personal","q":"Was ist die Transferdistanz in der Personalentwicklung?","a":"Die inhaltliche Aehnlichkeit zwischen Massnahme und Anwendungsfeld. Geringe Transferdistanz (z.B. Telefonschulung fuer den Innendienst) = guter Transfer; grosse (z.B. Outdoor-Training/Flossbau) = eher motivierend als kompetenzbildend.","a_short":"Die inhaltliche Aehnlichkeit zwischen Massnahme und Anwendungsfeld. Geringe Transferdistanz (z.B.","extra":{"definition":"Die inhaltliche Aehnlichkeit zwischen Massnahme und Anwendungsfeld.","erklaerung":"Die inhaltliche Aehnlichkeit zwischen Massnahme und Anwendungsfeld. Geringe Transferdistanz (z.B. Telefonschulung fuer den Innendienst) = guter Transfer; grosse (z.B. Outdoor-Training/Flossbau) = eher motivierend als kompetenzbildend.","beispiel":"(z. B. Telefonschulung fuer den Innendienst)"},"hasInfo":true},{"id":156,"cat":"Personal","q":"Welche vier Felder hat das Johari-Fenster?","a":"Arena (mir und anderen bekannt), blinder Fleck (anderen bekannt, mir nicht), Fassade (mir bekannt, anderen nicht), Unbekanntes (weder mir noch anderen bekannt). Selbstoffenbarung verkleinert die Fassade, Feedback den blinden Fleck.","a_short":"Arena (mir und anderen bekannt), blinder Fleck (anderen bekannt, mir nicht), Fassade (mir bekannt, anderen nicht), Unbekanntes (weder mir noch anderen bekannt). Selbstoffenbarung verkleinert die Fassade, Feedback den blinden Fleck.","extra":{},"hasInfo":false},{"id":157,"cat":"Personal","q":"Welche vier Dimensionen hat der MBTI und was ist die zentrale Kritik?","a":"Extraversion/Introversion, Sensing/Intuition, Thinking/Feeling, Judging/Perceiving (16 Typen). Kritik: Barnum-/Forer-Effekt, reine Selbsteinschaetzung, dichotome Items, sehr niedrige Retest-Reliabilitaet. Nicht fuer valide Personalauswahl geeignet.","a_short":"Extraversion/Introversion, Sensing/Intuition, Thinking/Feeling, Judging/Perceiving (16 Typen). Kritik: Barnum-/Forer-Effekt, reine Selbsteinschaetzung, dichotome Items, sehr niedrige Retest-Reliabilitaet. Nicht fuer valide Personalauswahl geeignet.","extra":{},"hasInfo":false},{"id":158,"cat":"Personal","q":"Welche sechs Faktoren umfasst das HEXACO-Modell?","a":"Honesty-Humility, Emotionality, eXtraversion, Agreeableness, Conscientiousness, Openness. Kontinuierliche Dimensionen statt Typen, empirisch deutlich besser abgesichert als der MBTI.","a_short":"Honesty-Humility, Emotionality, eXtraversion, Agreeableness, Conscientiousness, Openness. Kontinuierliche Dimensionen statt Typen, empirisch deutlich besser abgesichert als der MBTI.","extra":{},"hasInfo":false},{"id":159,"cat":"Finanzpsychologie","q":"Wie entsteht Buchgeld, und was bedeutet Geldschoepfung durch Kreditvergabe?","a":"Buchgeld (Giralgeld) sind elektronische Guthaben in den Buechern der Banken (Sichtguthaben auf Giro- und Sparkonten). Es entsteht, wenn eine Geschaeftsbank einen Kredit gewaehrt und den Betrag dem Kundenkonto gutschreibt: So schaffen Geschaeftsbanken selbst Geld (Geldschoepfung). Buchgeld setzt Vertrauen in Bankensystem und Waehrung voraus. (Bonus 'Wie entsteht Geld'; Seminar Finanzpsychologie Folie 13, VL Teil 4 Folie 4.)","a_short":"Buchgeld (Giralgeld) sind elektronische Guthaben in den Buechern der Banken (Sichtguthaben auf Giro- und Sparkonten). Es entsteht, wenn eine Geschaeftsbank einen Kredit gewaehrt und den Betrag dem Kundenkonto gutschreibt: So schaffen Geschaeftsbanken selbst Geld (Geldschoepfung).","extra":{"erklaerung":"Buchgeld (Giralgeld) sind elektronische Guthaben in den Buechern der Banken (Sichtguthaben auf Giro- und Sparkonten). Es entsteht, wenn eine Geschaeftsbank einen Kredit gewaehrt und den Betrag dem Kundenkonto gutschreibt: So schaffen Geschaeftsbanken selbst Geld (Geldschoepfung). Buchgeld setzt Vertrauen in Bankensystem und Waehrung voraus. (Bonus 'Wie entsteht Geld'; Seminar Finanzpsychologie Folie 13, VL Teil 4 Folie 4.)","quelle":"(Bonus 'Wie entsteht Geld'; Seminar Finanzpsychologie Folie 13, VL Teil 4 Folie 4.); Folie 13; Folie 4; VL Teil 4"},"hasInfo":true},{"id":160,"cat":"Finanzpsychologie","q":"Worin unterscheiden sich Buchgeld, Fiat-Geld und die Vollgeld-Idee?","a":"Fiat-Geld ist das gesetzliche Zahlungsmittel von Staat/Zentralbank ('fiat' = 'es werde'); es hat keinen inneren Wert und keine Rohstoffdeckung, sein Wert beruht allein auf Vertrauen und rechtlicher Anerkennung (Banknoten, Muenzen und Buchgeld). Buchgeld ist die digitale Repraesentation im Bankensystem und selbst eine Form von Fiat-Geld. Die Vollgeld-Initiative will die Geldschoepfung allein der Zentralbank vorbehalten; Geschaeftsbanken duerften dann kein Buchgeld mehr per Kredit schaffen. (Seminar Folie 13; VL Teil 4 Folie 4.)","a_short":"Fiat-Geld ist das gesetzliche Zahlungsmittel von Staat/Zentralbank ('fiat' = 'es werde'); es hat keinen inneren Wert und keine Rohstoffdeckung, sein Wert beruht allein auf Vertrauen und rechtlicher Anerkennung (Banknoten, Muenzen und Buchgeld). Buchgeld ist die digitale Repraesentation im Bankensystem und selbst eine Form von Fiat-Geld.","extra":{"erklaerung":"Fiat-Geld ist das gesetzliche Zahlungsmittel von Staat/Zentralbank ('fiat' = 'es werde'); es hat keinen inneren Wert und keine Rohstoffdeckung, sein Wert beruht allein auf Vertrauen und rechtlicher Anerkennung (Banknoten, Muenzen und Buchgeld). Buchgeld ist die digitale Repraesentation im Bankensystem und selbst eine Form von Fiat-Geld. Die Vollgeld-Initiative will die Geldschoepfung allein der Zentralbank vorbehalten; Geschaeftsbanken duerften dann kein Buchgeld mehr per Kredit schaffen. (Seminar Folie 13; VL Teil 4 Folie 4.)","quelle":"(Seminar Folie 13; VL Teil 4 Folie 4.); Folie 13; Folie 4; VL Teil 4"},"hasInfo":true},{"id":161,"cat":"Finanzpsychologie","q":"Wie unterscheiden sich Kryptowaehrungen und Zentralbankgeld, und was ist eine CBDC?","a":"Kryptowaehrungen (Bitcoin, Ethereum, Ripple) sind digitale, auf Kryptografie und Blockchain beruhende Waehrungen: dezentral, staatsunabhaengig, Peer-to-Peer, hohe Volatilitaet, begrenzte Akzeptanz. Zentralbankgeld (Fiat) ist zentral kontrolliert, gesetzliches Zahlungsmittel, relativ wertstabil durch Geldpolitik. Unterschiede in Kontrolle (dezentral vs. zentral), Vertrauensbasis (Kryptografie vs. Staat/Zentralbank), Akzeptanz und Stabilitaet. CBDC (Central Bank Digital Currency) = digitales Zentralbankgeld mit Krypto-Eigenschaften, aber unter zentralbanklicher Kontrolle. (Seminar Folie 14.)","a_short":"Kryptowaehrungen (Bitcoin, Ethereum, Ripple) sind digitale, auf Kryptografie und Blockchain beruhende Waehrungen: dezentral, staatsunabhaengig, Peer-to-Peer, hohe Volatilitaet, begrenzte Akzeptanz. Zentralbankgeld (Fiat) ist zentral kontrolliert, gesetzliches Zahlungsmittel, relativ wertstabil durch Geldpolitik.","extra":{"erklaerung":"Kryptowaehrungen (Bitcoin, Ethereum, Ripple) sind digitale, auf Kryptografie und Blockchain beruhende Waehrungen: dezentral, staatsunabhaengig, Peer-to-Peer, hohe Volatilitaet, begrenzte Akzeptanz. Zentralbankgeld (Fiat) ist zentral kontrolliert, gesetzliches Zahlungsmittel, relativ wertstabil durch Geldpolitik. Unterschiede in Kontrolle (dezentral vs. zentral), Vertrauensbasis (Kryptografie vs. Staat/Zentralbank), Akzeptanz und Stabilitaet. CBDC (Central Bank Digital Currency) = digitales Zentralbankgeld mit Krypto-Eigenschaften, aber unter zentralbanklicher Kontrolle. (Seminar Folie 14.)","quelle":"(Seminar Folie 14.); Folie 14"},"hasInfo":true},{"id":162,"cat":"Finanzpsychologie","q":"Was besagt die Greater-Fool-Theorie, und wie ordnet das Seminar den Ursprung von Bitcoin ein?","a":"Greater-Fool-Theorie: Der Preis eines Objekts richtet sich nicht nach seinem inneren Wert, sondern nach den irrationalen Erwartungen der Marktteilnehmer. Man zahlt bewusst einen scheinbar 'toerichten' hohen Preis in der Erwartung, spaeter an einen noch groesseren Narren ('greater fool') teurer weiterzuverkaufen. Erklaert mit das Entstehen von Spekulationsblasen (z.B. Immobilien). Bitcoin entstand im Kontext der Finanzkrise 2008: Misstrauen gegen das etablierte Bankensystem befeuerte die Idee einer dezentralen, staatsunabhaengigen Waehrung. (Seminar Folien 4 bis 6.)","a_short":"Greater-Fool-Theorie: Der Preis eines Objekts richtet sich nicht nach seinem inneren Wert, sondern nach den irrationalen Erwartungen der Marktteilnehmer. Man zahlt bewusst einen scheinbar 'toerichten' hohen Preis in der Erwartung, spaeter an einen noch groesseren Narren ('greater fool') teurer weiterzuverkaufen.","extra":{"erklaerung":"Greater-Fool-Theorie: Der Preis eines Objekts richtet sich nicht nach seinem inneren Wert, sondern nach den irrationalen Erwartungen der Marktteilnehmer. Man zahlt bewusst einen scheinbar 'toerichten' hohen Preis in der Erwartung, spaeter an einen noch groesseren Narren ('greater fool') teurer weiterzuverkaufen. Erklaert mit das Entstehen von Spekulationsblasen (z.B. Immobilien). Bitcoin entstand im Kontext der Finanzkrise 2008: Misstrauen gegen das etablierte Bankensystem befeuerte die Idee einer dezentralen, staatsunabhaengigen Waehrung. (Seminar Folien 4 bis 6.)","beispiel":"(z. B. Immobilien)","quelle":"(Seminar Folien 4 bis 6.)"},"hasInfo":true},{"id":163,"cat":"Finanzpsychologie","q":"Warum sind Kryptowaehrungen fuer Schwellenlaender attraktiv, und welche Risiken bestehen?","a":"Attraktiv wegen finanzieller Inklusion (Zahlungen ohne Bankkonto), Waehrungsstabilitaet (Alternative zu Hochinflations-Landeswaehrungen), Umgehung von Kapitalverkehrskontrollen (grenzueberschreitende Transaktionen) und technologischer Innovation (Blockchain, Smart Contracts). Risiken: hohe Volatilitaet, regulatorische Unsicherheit, Sicherheitsaspekte. Beispiel: El Salvador fuehrte Bitcoin zeitweise als gesetzliches Zahlungsmittel ein. (Seminar Folie 15.)","a_short":"Attraktiv wegen finanzieller Inklusion (Zahlungen ohne Bankkonto), Waehrungsstabilitaet (Alternative zu Hochinflations-Landeswaehrungen), Umgehung von Kapitalverkehrskontrollen (grenzueberschreitende Transaktionen) und technologischer Innovation (Blockchain, Smart Contracts). Risiken: hohe Volatilitaet, regulatorische Unsicherheit, Sicherheitsaspekte.","extra":{"erklaerung":"Attraktiv wegen finanzieller Inklusion (Zahlungen ohne Bankkonto), Waehrungsstabilitaet (Alternative zu Hochinflations-Landeswaehrungen), Umgehung von Kapitalverkehrskontrollen (grenzueberschreitende Transaktionen) und technologischer Innovation (Blockchain, Smart Contracts). Risiken: hohe Volatilitaet, regulatorische Unsicherheit, Sicherheitsaspekte. Beispiel: El Salvador fuehrte Bitcoin zeitweise als gesetzliches Zahlungsmittel ein. (Seminar Folie 15.)","beispiel":"El Salvador fuehrte Bitcoin zeitweise als gesetzliches Zahlungsmittel ein. (Seminar Folie 15.)","quelle":"(Seminar Folie 15.); Folie 15"},"hasInfo":true},{"id":164,"cat":"Gesellschaft","q":"Welche drei Arten von Konjunkturindikatoren gibt es, und welche ist psychologisch zentral?","a":"Vorlaufende (Fruehindikatoren), gleichlaufende, nachlaufende. Psychologisch zentral sind die vorlaufenden, vor allem Konsumentenstimmung (ICS) und Unternehmenserwartungen (ifo, KOF, WIFO).","a_short":"Vorlaufende (Fruehindikatoren), gleichlaufende, nachlaufende. Psychologisch zentral sind die vorlaufenden, vor allem Konsumentenstimmung (ICS) und Unternehmenserwartungen (ifo, KOF, WIFO).","extra":{},"hasInfo":false},{"id":165,"cat":"Gesellschaft","q":"Warum ist die Konjunktur langfristig prinzipiell nicht vorhersagbar?","a":"Weil sich Menschen in ihren Erwartungen gegenseitig beeinflussen (positive Rueckkopplung) und Prognosen sich selbst aufheben wuerden: Wuessten alle, dass Kurse in drei Monaten steigen, stiegen sie schon heute.","a_short":"Weil sich Menschen in ihren Erwartungen gegenseitig beeinflussen (positive Rueckkopplung) und Prognosen sich selbst aufheben wuerden: Wuessten alle, dass Kurse in drei Monaten steigen, stiegen sie schon heute.","extra":{},"hasInfo":false},{"id":166,"cat":"Gesellschaft","q":"Wie wirken Stimmungen auf die Konjunktur?","a":"Stimmungskongruente Informationsaufnahme (je nach Stimmung werden eher negative oder positive Infos aufgenommen) erklaert die Persistenz von Auf- und Abschwuengen. Stimmungen sind ansteckend (emotional contagion, vermutet ueber Spiegelneurone).","a_short":"Stimmungskongruente Informationsaufnahme (je nach Stimmung werden eher negative oder positive Infos aufgenommen) erklaert die Persistenz von Auf- und Abschwuengen. Stimmungen sind ansteckend (emotional contagion, vermutet ueber Spiegelneurone).","extra":{},"hasInfo":false},{"id":167,"cat":"Gesellschaft","q":"Welche latenten Funktionen der Erwerbsarbeit nennt Jahoda?","a":"Zeitstruktur, soziale Kontakte/Erfahrungen, Teilnahme an kollektiven Zielen, Status und Identitaet, regelmaessige Taetigkeit. Ihr Wegfall (nicht nur das fehlende Einkommen) erklaert die psychische Belastung durch Arbeitslosigkeit.","a_short":"Zeitstruktur, soziale Kontakte/Erfahrungen, Teilnahme an kollektiven Zielen, Status und Identitaet, regelmaessige Taetigkeit. Ihr Wegfall (nicht nur das fehlende Einkommen) erklaert die psychische Belastung durch Arbeitslosigkeit.","extra":{},"hasInfo":false},{"id":168,"cat":"Gesellschaft","q":"Welchen Einfluss hat die Attribution der Arbeitslosigkeit auf die Wiederbeschaeftigung?","a":"Arbeitslosigkeit kann internal (selbstverschuldet) oder external (strukturell) attribuiert werden. Internal attribuierende Arbeitslose finden im Schnitt schneller wieder eine Stelle (Uhlendorff, 2004).","a_short":"Arbeitslosigkeit kann internal (selbstverschuldet) oder external (strukturell) attribuiert werden. Internal attribuierende Arbeitslose finden im Schnitt schneller wieder eine Stelle (Uhlendorff, 2004).","extra":{},"hasInfo":false},{"id":169,"cat":"Gesellschaft","q":"Was ist libertaerer (sanfter) Paternalismus?","a":"Ein Regulierungsansatz, der Entscheidungen zum eigenen Vorteil in bestimmte Richtungen lenkt, ohne die Wahlfreiheit einzuschraenken (Nudge; Thaler & Sunstein). (Klausurrelevant.)","a_short":"Ein Regulierungsansatz, der Entscheidungen zum eigenen Vorteil in bestimmte Richtungen lenkt, ohne die Wahlfreiheit einzuschraenken (Nudge; Thaler & Sunstein). (Klausurrelevant.)","extra":{"definition":"Ein Regulierungsansatz, der Entscheidungen zum eigenen Vorteil in bestimmte Richtungen lenkt, ohne die Wahlfreiheit einzuschraenken (Nudge; Thaler & Sunstein).","quelle":"(Klausurrelevant.)"},"hasInfo":true},{"id":170,"cat":"Gesellschaft","q":"Welche vier Werkzeuge des sanften Paternalismus nennt Sunstein?","a":"Deklarationspflichten, Standardoptionen (Defaults), Erhoehung der Salienz, Unterstuetzung sozialer Normen.","a_short":"Deklarationspflichten, Standardoptionen (Defaults), Erhoehung der Salienz, Unterstuetzung sozialer Normen.","extra":{},"hasInfo":false},{"id":171,"cat":"Gesellschaft","q":"Aus welchen vier Bereichen erklaert sich, weshalb Nudging funktioniert?","a":"Traegheit und Aufschieben, Framing und Praesentation, soziale Einfluesse (go with the flow), Schwierigkeiten im Umgang mit Wahrscheinlichkeiten.","a_short":"Traegheit und Aufschieben, Framing und Praesentation, soziale Einfluesse (go with the flow), Schwierigkeiten im Umgang mit Wahrscheinlichkeiten.","extra":{},"hasInfo":false},{"id":172,"cat":"Gesellschaft","q":"Wie zeigt die Organspende die Macht von Defaults?","a":"In Opt-out-Laendern (Widerspruchsloesung) sind ueber 90% spendebereit; in Opt-in-Laendern (z.B. USA) stellen nur 28% ihre Organe explizit zur Verfuegung.","a_short":"In Opt-out-Laendern (Widerspruchsloesung) sind ueber 90% spendebereit; in Opt-in-Laendern (z.B. USA) stellen nur 28% ihre Organe explizit zur Verfuegung.","extra":{"beispiel":"(z. B. USA)"},"hasInfo":true},{"id":173,"cat":"Gesellschaft","q":"Worin unterscheiden sich sanfter Paternalismus und sanfte Wohltaetigkeit?","a":"Sanfter Paternalismus lenkt zum eigenen Vorteil des Einzelnen (z.B. Warnhinweise). Sanfte Wohltaetigkeit lenkt zum Vorteil der Allgemeinheit (z.B. angenommene Spendenbereitschaft) und ist problematischer, weil sie Trittbrettfahren ermoeglicht.","a_short":"Sanfter Paternalismus lenkt zum eigenen Vorteil des Einzelnen (z.B. Warnhinweise).","extra":{"erklaerung":"Sanfter Paternalismus lenkt zum eigenen Vorteil des Einzelnen (z.B. Warnhinweise). Sanfte Wohltaetigkeit lenkt zum Vorteil der Allgemeinheit (z.B. angenommene Spendenbereitschaft) und ist problematischer, weil sie Trittbrettfahren ermoeglicht.","beispiel":"(z. B. Warnhinweise)"},"hasInfo":true},{"id":174,"cat":"Gesellschaft","q":"Was ist ein soziales Dilemma und warum ist es Hauptgrund fuer nicht nachhaltiges Verhalten?","a":"Ein Konflikt zwischen Eigen- und Gemeinnutz: individuell erscheint es rational, die Folgen fuers Kollektiv zu ignorieren (Trittbrettfahren). Wuerden alle so handeln, verlieren alle.","a_short":"Ein Konflikt zwischen Eigen- und Gemeinnutz: individuell erscheint es rational, die Folgen fuers Kollektiv zu ignorieren (Trittbrettfahren). Wuerden alle so handeln, verlieren alle.","extra":{"definition":"Ein Konflikt zwischen Eigen- und Gemeinnutz: individuell erscheint es rational, die Folgen fuers Kollektiv zu ignorieren (Trittbrettfahren)."},"hasInfo":true},{"id":175,"cat":"Gesellschaft","q":"Was zeigen Public-Good-Game-Experimente ueber Kooperation?","a":"Beitraege liegen im Mittel bei 40 bis 60% (nicht 0 wie oekonomisch erwartet), hoeher mit denselben Partnern und bei Kommunikation. Bedingte Kooperation (Reziprozitaet) ist zentral; eine Bestrafungsmoeglichkeit erhoeht die Beitraege.","a_short":"Beitraege liegen im Mittel bei 40 bis 60% (nicht 0 wie oekonomisch erwartet), hoeher mit denselben Partnern und bei Kommunikation. Bedingte Kooperation (Reziprozitaet) ist zentral; eine Bestrafungsmoeglichkeit erhoeht die Beitraege.","extra":{},"hasInfo":false},{"id":176,"cat":"Gesellschaft","q":"Welcher Faktor beeinflusst neben den Kosten am staerksten die Unterstuetzung einer globalen Klimavereinbarung (Bechtel & Scheve)?","a":"Die Anzahl kooperierender Laender. Reziprozitaet gilt auch im Grossen: Menschen tragen bei, wenn ihre Regierungen sicherstellen, dass auch die anderen Laender ihren Teil leisten.","a_short":"Die Anzahl kooperierender Laender. Reziprozitaet gilt auch im Grossen: Menschen tragen bei, wenn ihre Regierungen sicherstellen, dass auch die anderen Laender ihren Teil leisten.","extra":{},"hasInfo":false},{"id":177,"cat":"Gesellschaft","q":"Welche vier psychologischen Konsequenzen der Globalisierung nennt Arnett?","a":"Bikulturelle Identitaeten, Identitaetskonflikte, selbstgewaehlte Kulturen, Ausweitung des beginnenden Erwachsenseins (emerging adulthood).","a_short":"Bikulturelle Identitaeten, Identitaetskonflikte, selbstgewaehlte Kulturen, Ausweitung des beginnenden Erwachsenseins (emerging adulthood).","extra":{},"hasInfo":false},{"id":178,"cat":"Gesellschaft","q":"Wie definiert die WCED (1987) Nachhaltigkeit?","a":"Die Beduerfnisse der Gegenwart befriedigen, ohne die Moeglichkeiten kuenftiger Generationen zu beeintraechtigen, ihre eigenen Beduerfnisse zu befriedigen.","a_short":"Die Beduerfnisse der Gegenwart befriedigen, ohne die Moeglichkeiten kuenftiger Generationen zu beeintraechtigen, ihre eigenen Beduerfnisse zu befriedigen.","extra":{},"hasInfo":false},{"id":179,"cat":"Gesellschaft II","q":"Mit welchen zwei Hypothesen erklaert Inglehart den Wandel zu postmateriellen Werten?","a":"Knappheitshypothese (wertvoll ist, was knapp ist -> Wandel sofort mit steigendem Wohlstand) und Sozialisierungshypothese (Praegung in fruehen Lebensjahren -> Wandel erst im Generationenwechsel). Beide schliessen sich nicht aus.","a_short":"Knappheitshypothese (wertvoll ist, was knapp ist -> Wandel sofort mit steigendem Wohlstand) und Sozialisierungshypothese (Praegung in fruehen Lebensjahren -> Wandel erst im Generationenwechsel). Beide schliessen sich nicht aus.","extra":{},"hasInfo":false},{"id":180,"cat":"Gesellschaft II","q":"Was besagt das Easterlin-Paradox?","a":"Im Querschnitt sind Reichere zufriedener als Aermere, im Laengsschnitt steigt die Lebenszufriedenheit aber trotz stark gestiegenem Wohlstand nicht. In entwickelten Laendern erklaert Einkommen nur 2 bis 5% der Zufriedenheitsunterschiede.","a_short":"Im Querschnitt sind Reichere zufriedener als Aermere, im Laengsschnitt steigt die Lebenszufriedenheit aber trotz stark gestiegenem Wohlstand nicht. In entwickelten Laendern erklaert Einkommen nur 2 bis 5% der Zufriedenheitsunterschiede.","extra":{},"hasInfo":false},{"id":181,"cat":"Gesellschaft II","q":"Mit welchen zwei Prozessen wird das Easterlin-Paradox erklaert?","a":"Adaptation (Gewoehnung an neue Umstaende, der emotionale Effekt verschwindet) und soziale Vergleiche (der relative Status zaehlt; mit hoeherem Einkommen steigt das Anspruchsniveau).","a_short":"Adaptation (Gewoehnung an neue Umstaende, der emotionale Effekt verschwindet) und soziale Vergleiche (der relative Status zaehlt; mit hoeherem Einkommen steigt das Anspruchsniveau).","extra":{},"hasInfo":false},{"id":182,"cat":"Gesellschaft II","q":"Was ist die hedonische Tretmuehle?","a":"Die Gewoehnung an einen hoeheren Lebensstandard: Ein teureres Auto hebt die Stimmung nur kurz, dann kehrt die Zufriedenheit auf das Ausgangsniveau zurueck. Wir rennen, ohne voranzukommen. (Klausurrelevant, Folie 166.)","a_short":"Die Gewoehnung an einen hoeheren Lebensstandard: Ein teureres Auto hebt die Stimmung nur kurz, dann kehrt die Zufriedenheit auf das Ausgangsniveau zurueck. Wir rennen, ohne voranzukommen.","extra":{"definition":"Die Gewoehnung an einen hoeheren Lebensstandard: Ein teureres Auto hebt die Stimmung nur kurz, dann kehrt die Zufriedenheit auf das Ausgangsniveau zurueck.","erklaerung":"Die Gewoehnung an einen hoeheren Lebensstandard: Ein teureres Auto hebt die Stimmung nur kurz, dann kehrt die Zufriedenheit auf das Ausgangsniveau zurueck. Wir rennen, ohne voranzukommen. (Klausurrelevant, Folie 166.)","quelle":"(Klausurrelevant, Folie 166.); Folie 166"},"hasInfo":true},{"id":183,"cat":"Gesellschaft II","q":"Wie haengen Einkommen, emotionales Wohlbefinden und Lebenszufriedenheit zusammen (Kahneman & Deaton)?","a":"Emotionales Wohlbefinden steigt mit dem Einkommen nur bis etwa 75.000 Dollar (Saettigung); die Lebenszufriedenheit steigt auch darueber hinaus weiter an.","a_short":"Emotionales Wohlbefinden steigt mit dem Einkommen nur bis etwa 75.000 Dollar (Saettigung); die Lebenszufriedenheit steigt auch darueber hinaus weiter an.","extra":{},"hasInfo":false},{"id":184,"cat":"Gesellschaft II","q":"Was sind positionale Gueter (Frank)?","a":"Gueter, bei denen die relative Position zur Referenzgruppe besonders zaehlt (z.B. Autos, Haeuser). Sie fuehren zu einem Wettlauf wie ein Nullsummenspiel; nichtpositionale Gueter (z.B. Ferien) sind weniger vergleichsabhaengig. Folge: Wohlfahrtsverlust.","a_short":"Gueter, bei denen die relative Position zur Referenzgruppe besonders zaehlt (z.B. Autos, Haeuser).","extra":{"erklaerung":"Gueter, bei denen die relative Position zur Referenzgruppe besonders zaehlt (z.B. Autos, Haeuser). Sie fuehren zu einem Wettlauf wie ein Nullsummenspiel; nichtpositionale Gueter (z.B. Ferien) sind weniger vergleichsabhaengig. Folge: Wohlfahrtsverlust.","beispiel":"(z. B. Autos, Haeuser)"},"hasInfo":true},{"id":185,"cat":"Gesellschaft II","q":"Nenne Warnhinweise fuer Pseudowissenschaft (Lilienfeld et al.).","a":"Fehlende Falsifizierbarkeit, fehlende Peer-Review-Publikationen, kein definierter Gueltigkeitsbereich, hypertechnische Sprache, aussergewoehnliche Erfolgsversprechen, Berufung auf Anekdoten, fehlender Bezug zu etablierter Forschung.","a_short":"Fehlende Falsifizierbarkeit, fehlende Peer-Review-Publikationen, kein definierter Gueltigkeitsbereich, hypertechnische Sprache, aussergewoehnliche Erfolgsversprechen, Berufung auf Anekdoten, fehlender Bezug zu etablierter Forschung.","extra":{},"hasInfo":false},{"id":186,"cat":"Gesellschaft II","q":"Was sind Boosts und wie unterscheiden sie sich von Nudges?","a":"Boosts (Hertwig & Gruene-Yanoff) klaeren Konsumenten ueber psychologische Tricks auf und staerken ihre Kompetenz und Eigenverantwortung. Nudges lenken das Verhalten, ohne die Kompetenz zu erhoehen.","a_short":"Boosts (Hertwig & Gruene-Yanoff) klaeren Konsumenten ueber psychologische Tricks auf und staerken ihre Kompetenz und Eigenverantwortung. Nudges lenken das Verhalten, ohne die Kompetenz zu erhoehen.","extra":{},"hasInfo":false},{"id":187,"cat":"Gesellschaft II","q":"Welche drei Niveaus der Moralentwicklung unterscheidet Kohlberg?","a":"Praekonventionell (egozentrisch: Gehorsam/Strafe, Tauschgerechtigkeit), konventionell (Regeln internalisiert: gute/r Junge/Maedchen, Recht und Ordnung), postkonventionell (universelle Prinzipien: Sozialvertrag, Gerechtigkeit/Menschenwuerde). Je zwei Stufen.","a_short":"Praekonventionell (egozentrisch: Gehorsam/Strafe, Tauschgerechtigkeit), konventionell (Regeln internalisiert: gute/r Junge/Maedchen, Recht und Ordnung), postkonventionell (universelle Prinzipien: Sozialvertrag, Gerechtigkeit/Menschenwuerde). Je zwei Stufen.","extra":{},"hasInfo":false},{"id":188,"cat":"Gesellschaft II","q":"Was illustriert das Trolley-Problem (Weiche vs. Schubsen)?","a":"Die Konsequenz ist gleich (ein Toter statt mehrere), doch die meisten stimmen der Weiche zu, lehnen aber das Schubsen ab. Konflikt zwischen utilitaristischem Abwaegen und deontologischer Intuition (einen Menschen nicht aktiv als Mittel benutzen).","a_short":"Die Konsequenz ist gleich (ein Toter statt mehrere), doch die meisten stimmen der Weiche zu, lehnen aber das Schubsen ab. Konflikt zwischen utilitaristischem Abwaegen und deontologischer Intuition (einen Menschen nicht aktiv als Mittel benutzen).","extra":{},"hasInfo":false},{"id":189,"cat":"Gesellschaft II","q":"Was ist das Moral-Machine-Experiment (Awad et al., 2018) und seine drei staerksten Praeferenzen?","a":"Rund 40 Mio Entscheidungen aus 233 Laendern zu Dilemmata autonomer Fahrzeuge (9 Faktoren, Conjoint-Analyse/AMCE). Drei staerkste globale Praeferenzen: Menschen vor Tieren, mehr Leben, junge Leben verschonen. Drei Kulturcluster (West/Ost/Sued).","a_short":"Rund 40 Mio Entscheidungen aus 233 Laendern zu Dilemmata autonomer Fahrzeuge (9 Faktoren, Conjoint-Analyse/AMCE). Drei staerkste globale Praeferenzen: Menschen vor Tieren, mehr Leben, junge Leben verschonen.","extra":{"definition":"Rund 40 Mio Entscheidungen aus 233 Laendern zu Dilemmata autonomer Fahrzeuge (9 Faktoren, Conjoint-Analyse/AMCE).","erklaerung":"Rund 40 Mio Entscheidungen aus 233 Laendern zu Dilemmata autonomer Fahrzeuge (9 Faktoren, Conjoint-Analyse/AMCE). Drei staerkste globale Praeferenzen: Menschen vor Tieren, mehr Leben, junge Leben verschonen. Drei Kulturcluster (West/Ost/Sued)."},"hasInfo":true},{"id":190,"cat":"Gesellschaft II","q":"Welchen ethischen Grundkonflikt macht Schirachs 'Terror' erfahrbar?","a":"Deontologische Ethik (die Menschenwuerde verbietet, Leben gegen Leben aufzurechnen) gegen utilitaristische Abwaegung (wenige opfern, um viele zu retten). Ein Pilot schiesst ein entfuehrtes Passagierflugzeug ab.","a_short":"Deontologische Ethik (die Menschenwuerde verbietet, Leben gegen Leben aufzurechnen) gegen utilitaristische Abwaegung (wenige opfern, um viele zu retten). Ein Pilot schiesst ein entfuehrtes Passagierflugzeug ab.","extra":{},"hasInfo":false},{"id":191,"cat":"Gesellschaft II","q":"Was kritisiert Gigerenzer am Umgang mit Risiko?","a":"Framing beeinflusst Urteile stark; Risikokompetenz heisst, Wahrscheinlichkeiten zu verstehen statt sich von Darstellung und Emotion leiten zu lassen. These: Medien und Politik erzeugen Panik statt Aufklaerung.","a_short":"Framing beeinflusst Urteile stark; Risikokompetenz heisst, Wahrscheinlichkeiten zu verstehen statt sich von Darstellung und Emotion leiten zu lassen. These: Medien und Politik erzeugen Panik statt Aufklaerung.","extra":{},"hasInfo":false},{"id":192,"cat":"Vertiefungen","q":"Was beschreibt die Prinzipal-Agent-Theorie und welche Agency-Kosten entstehen?","a":"Auftraggeber-Auftragnehmer-Beziehungen mit Interessendivergenz und Informationsasymmetrie. Agency-Kosten = Ueberwachungskosten (Prinzipal) + Signalisierungskosten (Agent) + Residualverlust.","a_short":"Auftraggeber-Auftragnehmer-Beziehungen mit Interessendivergenz und Informationsasymmetrie. Agency-Kosten = Ueberwachungskosten (Prinzipal) + Signalisierungskosten (Agent) + Residualverlust.","extra":{"definition":"Auftraggeber-Auftragnehmer-Beziehungen mit Interessendivergenz und Informationsasymmetrie."},"hasInfo":true},{"id":193,"cat":"Vertiefungen","q":"Welche drei Typen von Informationsasymmetrien unterscheidet das Prinzipal-Agent-Modell?","a":"Hidden characteristics (verborgene Eigenschaften -> adverse Selektion), hidden action (verborgene Handlung -> moralisches Risiko), hidden intention (verborgene Absicht -> Hold-up).","a_short":"Hidden characteristics (verborgene Eigenschaften -> adverse Selektion), hidden action (verborgene Handlung -> moralisches Risiko), hidden intention (verborgene Absicht -> Hold-up).","extra":{},"hasInfo":false},{"id":194,"cat":"Vertiefungen","q":"Welche Loesungsansaetze gegen Prinzipal-Agent-Probleme gibt es?","a":"Interessenangleichung (z.B. Aktienoptionen), Ueberwachung, Anreizsysteme, Signaling (Agent signalisiert Qualitaet), Screening (Prinzipal beschafft Infos), Self-Selection.","a_short":"Interessenangleichung (z.B. Aktienoptionen), Ueberwachung, Anreizsysteme, Signaling (Agent signalisiert Qualitaet), Screening (Prinzipal beschafft Infos), Self-Selection.","extra":{"beispiel":"(z. B. Aktienoptionen)"},"hasInfo":true},{"id":195,"cat":"Vertiefungen","q":"Welche vier Aussagentypen unterscheidet die Wissenschaftstheorie?","a":"Deskriptiv (beschreiben), explikativ (erklaeren; Hempel-Oppenheim, Falsifikation), normativ (bewerten, stuetzt sich auf Normen), praeskriptiv (fordern, Soll-Zustand). Merksatz: beschreiben/erklaeren/bewerten/fordern. (Klausur, Folie 20.)","a_short":"Deskriptiv (beschreiben), explikativ (erklaeren; Hempel-Oppenheim, Falsifikation), normativ (bewerten, stuetzt sich auf Normen), praeskriptiv (fordern, Soll-Zustand). Merksatz: beschreiben/erklaeren/bewerten/fordern. (Klausur, Folie 20.)","extra":{"merkhilfe":"beschreiben/erklaeren/bewerten/fordern. (Klausur, Folie 20.)","quelle":"(Klausur, Folie 20.); Folie 20"},"hasInfo":true},{"id":196,"cat":"Vertiefungen","q":"Was ist Modellplatonismus und was besagt das Box-Zitat?","a":"Modellplatonismus: Modelle durch Immunisierungsstrategien (z.B. Ceteris-paribus-Klauseln) vor dem Scheitern an der Realitaet schuetzen. George Box: 'Essentially, all models are wrong, but some are useful.'","a_short":"Modellplatonismus: Modelle durch Immunisierungsstrategien (z.B. Ceteris-paribus-Klauseln) vor dem Scheitern an der Realitaet schuetzen. George Box: 'Essentially, all models are wrong, but some are useful.'","extra":{"beispiel":"(z. B. Ceteris-paribus-Klauseln)"},"hasInfo":true},{"id":197,"cat":"Vertiefungen","q":"Was ist ein wissenschaftliches Paradigma (Kuhn)?","a":"Ein von vielen geteiltes Buendel aus Leitsaetzen, Fragestellungen, Modellen und Methoden, das festlegt, was beobachtet und gefragt und wie interpretiert wird. Beispiel konkurrierender Paradigmen: Keynes gegen Hayek.","a_short":"Ein von vielen geteiltes Buendel aus Leitsaetzen, Fragestellungen, Modellen und Methoden, das festlegt, was beobachtet und gefragt und wie interpretiert wird. Beispiel konkurrierender Paradigmen: Keynes gegen Hayek.","extra":{"definition":"Ein von vielen geteiltes Buendel aus Leitsaetzen, Fragestellungen, Modellen und Methoden, das festlegt, was beobachtet und gefragt und wie interpretiert wird."},"hasInfo":true},{"id":198,"cat":"Vertiefungen","q":"Was kennzeichnet Post Normal Science (Funtowicz & Ravetz)?","a":"Die Lage: facts uncertain, values in dispute, stakes high, decisions urgent. Statt blosser Faktenlieferung geht es darum, Optionen zu identifizieren und eine erweiterte Peer-Community einzubeziehen. (Klausurrelevant, Folie 15.)","a_short":"Die Lage: facts uncertain, values in dispute, stakes high, decisions urgent. Statt blosser Faktenlieferung geht es darum, Optionen zu identifizieren und eine erweiterte Peer-Community einzubeziehen.","extra":{"definition":"Die Lage: facts uncertain, values in dispute, stakes high, decisions urgent.","erklaerung":"Die Lage: facts uncertain, values in dispute, stakes high, decisions urgent. Statt blosser Faktenlieferung geht es darum, Optionen zu identifizieren und eine erweiterte Peer-Community einzubeziehen. (Klausurrelevant, Folie 15.)","quelle":"(Klausurrelevant, Folie 15.); Folie 15"},"hasInfo":true},{"id":199,"cat":"Vertiefungen","q":"Aus welchen drei Komponenten besteht ein Geschaeftsmodell (Staehler)?","a":"Value Proposition (Nutzenversprechen), Architektur der Wertschoepfung (wie der Nutzen erzeugt wird), Ertragsmodell (wie das Unternehmen Geld verdient). Definiert ueber den gestifteten Nutzen, nicht ueber Produkt oder Markt.","a_short":"Value Proposition (Nutzenversprechen), Architektur der Wertschoepfung (wie der Nutzen erzeugt wird), Ertragsmodell (wie das Unternehmen Geld verdient). Definiert ueber den gestifteten Nutzen, nicht ueber Produkt oder Markt.","extra":{},"hasInfo":false},{"id":200,"cat":"Vertiefungen","q":"Worin besteht der Working-Capital-Mechanismus im Aldi-Geschaeftsmodell?","a":"Aldi vereinnahmt den Umsatz sofort, zahlt Lieferanten aber erst nach rund 90 Tagen, wenn die Ware laengst verkauft ist. So wird Aldi zur Geldeinsammelstelle mit grossem Kapitalbestand (Working Capital), der weiter investiert wird.","a_short":"Aldi vereinnahmt den Umsatz sofort, zahlt Lieferanten aber erst nach rund 90 Tagen, wenn die Ware laengst verkauft ist. So wird Aldi zur Geldeinsammelstelle mit grossem Kapitalbestand (Working Capital), der weiter investiert wird.","extra":{"definition":"Aldi vereinnahmt den Umsatz sofort, zahlt Lieferanten aber erst nach rund 90 Tagen, wenn die Ware laengst verkauft ist."},"hasInfo":true},{"id":201,"cat":"Vertiefungen","q":"Was illustriert das Lily-Allen-Beispiel zur Plattformoekonomie?","a":"Streaming (Spotify) zahlt nur ca. 0,003 bis 0,005 Dollar pro Stream, sodass Millionen Hoerer wenig einbringen, waehrend eine Abo-Plattform (OnlyFans) mit wenigen Abonnenten Aehnliches erzielt. Plattformen monetarisieren Reichweite sehr unterschiedlich.","a_short":"Streaming (Spotify) zahlt nur ca. 0,003 bis 0,005 Dollar pro Stream, sodass Millionen Hoerer wenig einbringen, waehrend eine Abo-Plattform (OnlyFans) mit wenigen Abonnenten Aehnliches erzielt.","extra":{"erklaerung":"Streaming (Spotify) zahlt nur ca. 0,003 bis 0,005 Dollar pro Stream, sodass Millionen Hoerer wenig einbringen, waehrend eine Abo-Plattform (OnlyFans) mit wenigen Abonnenten Aehnliches erzielt. Plattformen monetarisieren Reichweite sehr unterschiedlich."},"hasInfo":true},{"id":202,"cat":"Vertiefungen","q":"Wie unterscheiden sich Legalitaet, Legitimitaet und Ethik (Fall Theranos)?","a":"Legalitaet = gesetzeskonform. Legitimitaet = von Stakeholdern und Gesellschaft als berechtigt akzeptiert. Ethik = moralische Bewertung des Handelns selbst. Ein Unternehmen kann legal handeln, ohne legitim oder ethisch zu sein.","a_short":"Legalitaet = gesetzeskonform. Legitimitaet = von Stakeholdern und Gesellschaft als berechtigt akzeptiert.","extra":{"erklaerung":"Legalitaet = gesetzeskonform. Legitimitaet = von Stakeholdern und Gesellschaft als berechtigt akzeptiert. Ethik = moralische Bewertung des Handelns selbst. Ein Unternehmen kann legal handeln, ohne legitim oder ethisch zu sein."},"hasInfo":true},{"id":203,"cat":"Vertiefungen","q":"Was ist der Washington Consensus?","a":"IWF/Weltbank-Reformpaket für Entwicklungsländer (1980/90er): Privatisierung + Liberalisierung + Haushaltskonsolidierung. Hayek-nah. \nKritik: Führte oft zu sozialen Verwerfungen, Währungskrisen und Wohlstandsverlust — besonders in Lateinamerika und Asien. Chinas Erfolg ohne Washington Consensus zeigt: Es gibt keine Einheitslösung.","a_short":"IWF/Weltbank-Reformpaket für Entwicklungsländer (1980/90er): Privatisierung + Liberalisierung + Haushaltskonsolidierung. Hayek-nah.","extra":{"definition":"IWF/Weltbank-Reformpaket für Entwicklungsländer (1980/90er): Privatisierung + Liberalisierung + Haushaltskonsolidierung.","erklaerung":"IWF/Weltbank-Reformpaket für Entwicklungsländer (1980/90er): Privatisierung + Liberalisierung + Haushaltskonsolidierung. Hayek-nah. \nKritik: Führte oft zu sozialen Verwerfungen, Währungskrisen und Wohlstandsverlust — besonders in Lateinamerika und Asien. Chinas Erfolg ohne Washington Consensus zeigt: Es gibt keine Einheitslösung."},"hasInfo":true},{"id":204,"cat":"Vertiefungen","q":"Kritische Stellungnahme: Hat weder Keynes noch Hayek vollständig Recht — warum?","a":"Keynes hat Recht: Märkte versagen (Externalitäten, Blasen, Informationsasymmetrien). Staatsnachfrage in tiefen Rezessionen nötig. Animal spirits machen Märkte irrational. \nHayek hat Recht: Preise bündeln Wissen unersetzlich. Staatliche Planung scheitert an Informationsproblemen. Moral Hazard bei Bailouts. Inflation schadet langfristig. \nSynthese: Institutionell eingebettete Marktwirtschaft braucht beides — Pragmatismus schlägt Dogmatismus.","a_short":"Keynes hat Recht: Märkte versagen (Externalitäten, Blasen, Informationsasymmetrien). Staatsnachfrage in tiefen Rezessionen nötig.","extra":{"erklaerung":"Keynes hat Recht: Märkte versagen (Externalitäten, Blasen, Informationsasymmetrien). Staatsnachfrage in tiefen Rezessionen nötig. Animal spirits machen Märkte irrational. \nHayek hat Recht: Preise bündeln Wissen unersetzlich. Staatliche Planung scheitert an Informationsproblemen. Moral Hazard bei Bailouts. Inflation schadet langfristig. \nSynthese: Institutionell eingebettete Marktwirtschaft braucht beides — Pragmatismus schlägt Dogmatismus."},"hasInfo":true},{"id":205,"cat":"Vertiefungen","q":"Was sind die 3 Hauptprobleme von Entwicklungsländern?","a":"1. Korruption — frisst Investitionen, schreckt ausländisches Kapital ab. \n2. Schwache Institutionen — keine Rechtssicherheit, keine Property Rights. \n3. Politische Instabilität — kurzer Planungshorizont, verhindert langfristige Investitionen. \nOhne diese Grundlagen scheitert jedes Entwicklungsmodell — ob keynesianisch oder hayek-nah.","a_short":"1. Korruption — frisst Investitionen, schreckt ausländisches Kapital ab. \n2. Schwache Institutionen — keine Rechtssicherheit, keine Property Rights. \n3. Politische Instabilität — kurzer Planungshorizont, verhindert langfristige Investitionen. \nOhne diese Grundlagen scheitert jedes Entwicklungsmodell — ob keynesianisch oder hayek-nah.","extra":{},"hasInfo":false},{"id":206,"cat":"Vertiefungen","q":"Was war die Asienkrise 1997 und was löste sie aus?","a":"Zu rasche Kapitalmarktliberalisierung in Thailand, Südkorea, Indonesien: kurzfristige Kapitalzuflüsse → Blasen → Vertrauensverlust → Kapitalflucht → Währungsabwertung → Bankenzusammenbrüche. IWF-Auflagen (Sparpolitik) verschlimmerten die Rezession laut vielen Ökonomen. \nLehre: Marktöffnung ohne starke Institutionen ist gefährlich.","a_short":"Zu rasche Kapitalmarktliberalisierung in Thailand, Südkorea, Indonesien: kurzfristige Kapitalzuflüsse → Blasen → Vertrauensverlust → Kapitalflucht → Währungsabwertung → Bankenzusammenbrüche. IWF-Auflagen (Sparpolitik) verschlimmerten die Rezession laut vielen Ökonomen.","extra":{"erklaerung":"Zu rasche Kapitalmarktliberalisierung in Thailand, Südkorea, Indonesien: kurzfristige Kapitalzuflüsse → Blasen → Vertrauensverlust → Kapitalflucht → Währungsabwertung → Bankenzusammenbrüche. IWF-Auflagen (Sparpolitik) verschlimmerten die Rezession laut vielen Ökonomen. \nLehre: Marktöffnung ohne starke Institutionen ist gefährlich."},"hasInfo":true},{"id":207,"cat":"Vertiefungen","q":"Was ist die AIIB und warum ist sie geopolitisch bedeutsam?","a":"Asian Infrastructure Investment Bank, 2015, China-initiiert. Infrastrukturfinanzierung als Alternative zur Weltbank — ohne Washington-Consensus-Auflagen. \nZeichen: China baut Gegeninstitution zum westlichen Bretton-Woods-System. Verbunden mit Belt and Road Initiative → bipolares Finanzsystem entsteht.","a_short":"Asian Infrastructure Investment Bank, 2015, China-initiiert. Infrastrukturfinanzierung als Alternative zur Weltbank — ohne Washington-Consensus-Auflagen.","extra":{"definition":"Asian Infrastructure Investment Bank, 2015, China-initiiert.","erklaerung":"Asian Infrastructure Investment Bank, 2015, China-initiiert. Infrastrukturfinanzierung als Alternative zur Weltbank — ohne Washington-Consensus-Auflagen. \nZeichen: China baut Gegeninstitution zum westlichen Bretton-Woods-System. Verbunden mit Belt and Road Initiative → bipolares Finanzsystem entsteht."},"hasInfo":true},{"id":208,"cat":"Vertiefungen","q":"Vergleich: Finanzkrisen damals vs. heute","a":"Damals (1990er): \n• Asienkrise ·\n• Mexikokrise ·\n• LTCM ·\n• physische Bank-Runs ·\n• Kapitalflucht · I\n• WF-Bailouts.\nHeute:\n• Digitale Bank-Runs via Social Media (SVB 2023) ·\n• höhere Staatsschulden ·\n• Inflation ·\n• Lieferkettenprobleme ·\n• geopolitische Risiken ·\n• Krypto-Blasen. \nGemeinsam:\n• Vertrauensverlust als Auslöser ·\n• \nglobale Ansteckung.","a_short":"Damals (1990er): \n• Asienkrise ·\n• Mexikokrise ·\n• LTCM ·\n• physische Bank-Runs ·\n• Kapitalflucht · I\n• WF-Bailouts.\nHeute:\n• Digitale Bank-Runs via Social Media (SVB 2023) ·\n• höhere Staatsschulden ·\n• Inflation ·\n• Lieferkettenprobleme ·\n• geopolitische Risiken ·\n• Krypto-Blasen. \nGemeinsam:\n• Vertrauensverlust als Auslöser ·\n• \nglobale Ansteckung.","extra":{},"hasInfo":false},{"id":209,"cat":"Vertiefungen","q":"Klausurfrage: Welche „New Rules of the Game\" braucht die Weltwirtschaft?","a":"Lernkurve aus Commanding Heights Teil 3: \n· Finanzmarktregulierung (Basel III, systemische Risikoaufsicht) \n· Eigentumsrechte weltweit stärken (de Soto) \n· IWF-Reform: weniger harte Auflagen, mehr Liquiditätsfazilitäten \n· Fairer Handel mit Entwicklungsaspekt \n· Klimaregeln (CO₂-Grenzausgleich, OECD-Mindeststeuer 15%) \nHerausforderung: Wer setzt Regeln in multipolarer Welt (USA, China, EU)?","a_short":"Lernkurve aus Commanding Heights Teil 3: \n· Finanzmarktregulierung (Basel III, systemische Risikoaufsicht) \n· Eigentumsrechte weltweit stärken (de Soto) \n· IWF-Reform: weniger harte Auflagen, mehr Liquiditätsfazilitäten \n· Fairer Handel mit Entwicklungsaspekt \n· Klimaregeln (CO₂-Grenzausgleich, OECD-Mindeststeuer 15%) \nHerausforderung: Wer setzt Regeln in multipolarer Welt (USA, China, EU)?","extra":{},"hasInfo":false},{"id":210,"cat":"Vertiefungen","q":"Was ist die Kernthese von Hayek?","a":"Preise bündeln dezentrales Wissen — der Markt reguliert sich langfristig selbst. Staatliche Eingriffe verzerren Preissignale und bedrohen Freiheit. Planwirtschaft kann in Diktatur münden (Road to Serfdom, 1944). Zu viel Staat = Gefahr.","a_short":"Preise bündeln dezentrales Wissen — der Markt reguliert sich langfristig selbst. Staatliche Eingriffe verzerren Preissignale und bedrohen Freiheit.","extra":{"definition":"Preise bündeln dezentrales Wissen — der Markt reguliert sich langfristig selbst.","erklaerung":"Preise bündeln dezentrales Wissen — der Markt reguliert sich langfristig selbst. Staatliche Eingriffe verzerren Preissignale und bedrohen Freiheit. Planwirtschaft kann in Diktatur münden (Road to Serfdom, 1944). Zu viel Staat = Gefahr."},"hasInfo":true},{"id":211,"cat":"Vertiefungen","q":"Welche heutige Politik ist keynesianisch, welche hayek-nah?","a":"Keynesianisch: \n• Corona-Konjunkturpakete ·\n• Kurzarbeitergeld ·\n• \nBankenrettungen 2008 ·\n• Mindestlohn ·\n• Energiepreisbremse ·\n• QE der EZB. Hayek-nah: Schuldenbremse (GG Art. 109) ·\n• EU-Stabilitätspakt ·\n• unabhängige Zentralbank ·\n• Privatisierungen ·\n• CO₂-Preis statt Subventionen.","a_short":"Keynesianisch: \n• Corona-Konjunkturpakete ·\n• Kurzarbeitergeld ·\n• \nBankenrettungen 2008 ·\n• Mindestlohn ·\n• Energiepreisbremse ·\n• QE der EZB. Hayek-nah: Schuldenbremse (GG Art. 109) ·\n• EU-Stabilitätspakt ·\n• unabhängige Zentralbank ·\n• Privatisierungen ·\n• CO₂-Preis statt Subventionen.","extra":{},"hasInfo":false},{"id":212,"cat":"Vertiefungen","q":"Klausurfrage: Erklären Sie, welche Wirtschaftspolitik Keynes und Hayek in einer tiefen Rezession empfehlen würden.","a":"Keynes:\n• Sofort expansive Fiskalpolitik — Staatsausgaben erhöhen, Steuern senken.\n• Zinssenkung der Zentralbank.\n• Kurzarbeit, öffentliche Investitionen.\n• Deflationsspirale verhindern. \nHayek: \n• Nicht eingreifen. Marktbereinigung zulassen.\n• Keine neuen Schulden.\n• Stabile Geldpolitik. Niedrigzinsen der Vergangenheit waren das eigentliche Problem.\n• Tatsächliche Politik 2008: Keynesianisch (TARP, Konjunkturpakete, QE).","a_short":"Keynes:\n• Sofort expansive Fiskalpolitik — Staatsausgaben erhöhen, Steuern senken.\n• Zinssenkung der Zentralbank.\n• Kurzarbeit, öffentliche Investitionen.\n• Deflationsspirale verhindern. \nHayek: \n• Nicht eingreifen. Marktbereinigung zulassen.\n• Keine neuen Schulden.\n• Stabile Geldpolitik. Niedrigzinsen der Vergangenheit waren das eigentliche Problem.\n• Tatsächliche Politik 2008: Keynesianisch (TARP, Konjunkturpakete, QE).","extra":{},"hasInfo":false},{"id":213,"cat":"Vertiefungen","q":"Was war Bretton Woods (1944)?","a":"Internationale Nachkriegsordnung: Feste Wechselkurse (Dollar als Leitwährung, goldgedeckt). Gründung von IWF (Krisenstabilisierung) und Weltbank (Entwicklung/Wiederaufbau). Keynesianisch geprägt — internationale Kooperation statt Protektionismus.
