<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WiPsy Lernplattform - Klausur SS 2026</title>
<style>
:root{
  --bg:#17120e; --bg2:#1f1813; --surface:#271e16; --surface2:#33271c;
  --border:#473524; --text:#f4ece1; --muted:#c4ab8c; --muted2:#8f7559;
  --accent:#f0883c; --accent2:#e06329; --good:#5cc08a; --mid:#f0b429; --hard:#ef7a45; --again:#e05c54;
  --shadow:0 10px 30px rgba(0,0,0,.45);
  --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:radial-gradient(1200px 700px at 80% -10%,#3a2415,transparent),
             radial-gradient(1000px 600px at -10% 110%,#2a1810,transparent),var(--bg);
  background-attachment:fixed;
  color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;
}
.wrap{max-width:1040px;margin:0 auto;padding:18px 16px 80px}
.hidden{display:none !important}
button{font-family:inherit;cursor:pointer;border:none;color:inherit}
.row{display:flex;align-items:center;gap:12px}
.spacer{flex:1}

/* HEADER */
header{position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);
  background:linear-gradient(180deg,rgba(15,19,32,.92),rgba(15,19,32,.7));
  border-bottom:1px solid var(--border)}
.head-inner{max-width:1040px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-weight:800;letter-spacing:.2px;font-size:18px;display:flex;align-items:center;gap:9px}
.logo .dot{width:11px;height:11px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 14px var(--accent)}
.head-stats{display:flex;gap:8px;flex-wrap:wrap}
.chip{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:5px 11px;font-size:12.5px;color:var(--muted);white-space:nowrap}
.chip b{color:var(--text)}
.btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 13px;font-size:14px;font-weight:600;transition:.15s}
.btn:hover{background:var(--surface2);border-color:#3a4d7a}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;box-shadow:0 6px 18px rgba(91,140,255,.35)}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 10px;font-size:13px}

/* HOME */
h1.page{font-size:22px;margin:18px 2px 6px}
.sub{color:var(--muted);font-size:14px;margin:0 2px 16px}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:6px 2px 18px}
.switch{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13.5px;color:var(--muted)}
.switch input{width:38px;height:21px;appearance:none;background:var(--border);border-radius:999px;position:relative;cursor:pointer;transition:.2s;flex:none}
.switch input:checked{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.switch input::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#fff;transition:.2s}
.switch input:checked::after{left:19px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px}
.cat{position:relative;background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--border);
  border-radius:var(--r);padding:16px 16px 14px;overflow:hidden;transition:.18s;text-align:left}
.cat:hover{transform:translateY(-3px);border-color:#3c4d7a;box-shadow:var(--shadow)}
.cat .bar-top{position:absolute;top:0;left:0;right:0;height:4px;background:var(--cc,var(--accent))}
.cat h3{font-size:16.5px;margin:6px 0 2px;display:flex;align-items:center;gap:8px}
.cat .cnt{color:var(--muted);font-size:13px;margin-bottom:12px}
.cat .due{color:var(--cc,var(--accent));font-weight:700}
.prog{height:8px;background:var(--surface2);border-radius:999px;overflow:hidden;margin-top:4px}
.prog>i{display:block;height:100%;background:var(--cc,var(--accent));border-radius:999px;transition:width .4s}
.cat .pct{font-size:12px;color:var(--muted2);margin-top:6px;display:flex;justify-content:space-between}
.cat .ico{width:30px;height:30px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;
  background:color-mix(in srgb,var(--cc) 22%,transparent);color:var(--cc);font-size:16px;font-weight:800;flex:none}

/* STUDY */
.study-top{display:flex;align-items:center;gap:12px;margin:6px 2px 14px;flex-wrap:wrap}
.study-top .name{font-weight:700;font-size:17px}
.sessbar{height:7px;background:var(--surface2);border-radius:999px;overflow:hidden;flex:1;min-width:120px}
.sessbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s}
.count{color:var(--muted);font-size:13.5px;white-space:nowrap}

.card{background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--border);
  border-radius:20px;box-shadow:var(--shadow);padding:26px 24px;min-height:300px;display:flex;flex-direction:column}
.card .tagrow{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.tag{font-size:11.5px;letter-spacing:.3px;text-transform:uppercase;font-weight:700;color:var(--cc,var(--accent));
  background:color-mix(in srgb,var(--cc) 16%,transparent);padding:4px 9px;border-radius:7px}
.qlabel,.alabel{font-size:11.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted2);font-weight:700;margin-bottom:6px}
.frage{font-size:21px;font-weight:650;line-height:1.4}
.divider{height:1px;background:var(--border);margin:20px 0}
.antwort{font-size:16.5px;white-space:pre-wrap;color:#dde3f5}
.reveal-hint{color:var(--muted2);font-size:13.5px;margin-top:auto;padding-top:18px;text-align:center}

.infobtn{margin-left:auto;width:34px;height:34px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);
  font-size:16px;font-weight:800;color:var(--accent);display:inline-flex;align-items:center;justify-content:center}
.infobtn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.infobtn[disabled]{opacity:.32;cursor:not-allowed}

.zusatz{margin-top:18px;border-top:1px dashed var(--border);padding-top:16px;display:grid;gap:13px}
.zfield{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.zfield .zk{font-size:11.5px;letter-spacing:.5px;text-transform:uppercase;font-weight:800;margin-bottom:5px}
.zfield .zv{font-size:15px;white-space:pre-wrap;color:#dde3f5}
.zk.def{color:#7cc4ff}.zk.erk{color:#9d8cff}.zk.bsp{color:#46cf9b}.zk.merk{color:#f0b429}.zk.qz{color:#9aa6c8}

.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px}
.rate{padding:14px 8px;border-radius:13px;font-weight:750;font-size:14.5px;display:flex;flex-direction:column;align-items:center;gap:3px;
  border:1px solid var(--border);background:var(--surface);transition:.14s}
.rate small{font-weight:600;font-size:11px;opacity:.7}
.rate:hover{transform:translateY(-2px)}
.rate.again{color:var(--again);border-color:color-mix(in srgb,var(--again) 45%,var(--border))}
.rate.hard{color:var(--hard);border-color:color-mix(in srgb,var(--hard) 45%,var(--border))}
.rate.mid{color:var(--mid);border-color:color-mix(in srgb,var(--mid) 45%,var(--border))}
.rate.easy{color:var(--good);border-color:color-mix(in srgb,var(--good) 45%,var(--border))}
.rate.again:hover{background:color-mix(in srgb,var(--again) 16%,var(--surface))}
.rate.hard:hover{background:color-mix(in srgb,var(--hard) 16%,var(--surface))}
.rate.mid:hover{background:color-mix(in srgb,var(--mid) 16%,var(--surface))}
.rate.easy:hover{background:color-mix(in srgb,var(--good) 16%,var(--surface))}

.bigbtn{display:block;width:100%;padding:15px;border-radius:14px;font-size:16px;font-weight:750;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 8px 22px rgba(91,140,255,.32)}

/* DONE / EMPTY */
.panel{background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--border);border-radius:20px;
  padding:34px 26px;text-align:center;box-shadow:var(--shadow)}
.panel .big{font-size:46px;margin-bottom:6px}
.panel h2{font-size:22px;margin-bottom:8px}
.panel p{color:var(--muted);margin-bottom:18px}
.statline{display:flex;justify-content:center;gap:26px;flex-wrap:wrap;margin:16px 0 22px}
.statline div{text-align:center}
.statline .n{font-size:26px;font-weight:800}
.statline .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:13px;margin-top:6px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:15px 16px}
.scard h4{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.scard .line{display:flex;justify-content:space-between;font-size:13.5px;padding:3px 0;color:var(--muted)}
.scard .line b{color:var(--text)}
.kpi{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0 20px}
.kpibox{flex:1;min-width:150px;background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--border);border-radius:16px;padding:16px}
.kpibox .n{font-size:30px;font-weight:850}
.kpibox .l{color:var(--muted);font-size:13px;margin-top:2px}

footer{color:var(--muted2);font-size:12px;text-align:center;margin-top:30px;line-height:1.7}
@media(max-width:560px){
  .frage{font-size:19px}.actions{grid-template-columns:repeat(2,1fr)}
  .card{padding:20px 16px}.wrap{padding:14px 12px 70px}
  .head-stats{display:none}
}

/* ===== ACTIVE RECALL ===== */
.ar-block .ico{font-size:12px;letter-spacing:.5px}
.ar-teile{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.ar-teil{display:flex;gap:12px;align-items:center;background:linear-gradient(180deg,var(--surface),var(--bg2));
  border:1px solid var(--border);border-left:4px solid var(--cc,var(--accent));border-radius:14px;padding:14px 16px;flex-wrap:wrap}
.ar-teil-main{flex:1;min-width:200px}
.ar-teil-title{font-weight:700;font-size:15.5px}
.ar-teil-meta{color:var(--muted);font-size:13px;margin-top:3px}
.ar-teil-actions{display:flex;gap:8px;flex-wrap:wrap}
.amp{font-weight:700;padding:1px 8px;border-radius:999px;font-size:12px}
.amp.green{color:var(--good);background:color-mix(in srgb,var(--good) 16%,transparent)}
.amp.yellow{color:var(--mid);background:color-mix(in srgb,var(--mid) 16%,transparent)}
.amp.red{color:var(--again);background:color-mix(in srgb,var(--again) 16%,transparent)}

.lerntext{background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--border);border-radius:18px;
  padding:24px 26px;box-shadow:var(--shadow);max-width:760px;margin:0 auto;font-size:16.5px;line-height:1.72}
.lerntext h4{font-size:17px;margin:20px 0 7px;color:var(--accent)}
.lerntext p{margin:0 0 12px;color:#ece3d6}
.lerntext .lz{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 13px;margin-bottom:12px;font-size:14px;color:var(--muted)}
.lerntext .lz b{color:var(--text)}

.ar-controls{position:sticky;bottom:0;display:flex;gap:10px;align-items:center;margin-top:16px;padding:14px 0;
  background:linear-gradient(0deg,var(--bg) 62%,transparent)}
.timer{font-variant-numeric:tabular-nums;font-weight:750;background:var(--surface2);border:1px solid var(--border);
  border-radius:999px;padding:6px 13px;font-size:14px;color:var(--accent)}

.recall-area{margin-top:6px}
.recall-hint{color:var(--muted);font-size:14px;margin-bottom:10px}
#arInput{width:100%;min-height:46vh;resize:vertical;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:16px 17px;color:var(--text);font-family:inherit;font-size:16px;line-height:1.6}
#arInput:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent)}

.res-top{display:flex;gap:22px;align-items:center;flex-wrap:wrap;background:linear-gradient(180deg,var(--surface),var(--bg2));
  border:1px solid var(--border);border-radius:18px;padding:22px 24px;box-shadow:var(--shadow)}
.ring{--p:0;width:118px;height:118px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
  background:conic-gradient(var(--rc,var(--accent)) calc(var(--p)*1%),var(--surface2) 0);transition:.4s}
.ring i{width:88px;height:88px;border-radius:50%;background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring b{font-size:26px;font-weight:850;line-height:1}
.ring small{font-size:11px;color:var(--muted);margin-top:2px}
.res-meta{flex:1;min-width:210px}
.res-meta .niv{font-size:19px;font-weight:800;margin-bottom:4px}
.res-meta .sub2{color:var(--muted);font-size:13.5px}
.res-counts{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.res-counts span{font-size:13px;color:var(--muted)}
.res-counts b{font-size:16px}
.dotg{color:var(--good)}.doty{color:var(--mid)}.dotr{color:var(--again)}

.miss-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(238px,1fr));gap:13px;margin-top:18px}
.miss-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;--cc:var(--accent)}
.miss-card h4{font-size:14px;margin-bottom:9px;display:flex;align-items:center;gap:7px;color:var(--text)}
.miss-card.klausur{border-color:color-mix(in srgb,var(--again) 45%,var(--border));--cc:var(--again)}
.miss-card ul{list-style:none;display:flex;flex-direction:column;gap:6px}
.miss-card li{font-size:13.5px;color:#ece3d6;padding-left:15px;position:relative}
.miss-card li:before{content:"\203a";position:absolute;left:0;color:var(--cc)}
.miss-card .none{color:var(--good);font-size:13px}
.kbadge{font-size:10.5px;font-weight:800;color:var(--again);border:1px solid color-mix(in srgb,var(--again) 50%,transparent);border-radius:5px;padding:0 4px;margin-left:6px}

.sec-h{font-size:16px;font-weight:750;margin:24px 2px 10px}
.concept-list{display:flex;flex-direction:column;gap:7px}
.concept-row{display:flex;gap:11px;align-items:flex-start;justify-content:space-between;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;padding:11px 13px;border-left:4px solid var(--border)}
.concept-row.green{border-left-color:var(--good)}
.concept-row.yellow{border-left-color:var(--mid)}
.concept-row.red{border-left-color:var(--again)}
.cr-main{flex:1;min-width:0}
.cr-top{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.kat{font-size:10.5px;font-weight:800;letter-spacing:.3px;padding:1px 6px;border-radius:5px;background:var(--surface2);color:var(--muted)}
.cr-begriff{font-weight:650;font-size:14.5px}
.cr-warum{color:var(--muted);font-size:12.5px;margin-top:3px}
.gw{font-size:11.5px;color:var(--muted2);font-weight:600}
.seg{display:flex;flex:none;border:1px solid var(--border);border-radius:9px;overflow:hidden}
.seg button{padding:6px 10px;font-size:12px;font-weight:700;background:var(--surface2);color:var(--muted);border-right:1px solid var(--border)}
.seg button:last-child{border-right:none}
.seg button.on.g{background:var(--good);color:#10261c}
.seg button.on.y{background:var(--mid);color:#2a1d05}
.seg button.on.r{background:var(--again);color:#fff}

.fehler-list{background:color-mix(in srgb,var(--again) 8%,var(--surface));border:1px solid color-mix(in srgb,var(--again) 30%,var(--border));
  border-radius:14px;padding:14px 18px;margin-top:16px}
.fehler-list h4{font-size:14.5px;margin-bottom:8px;color:var(--hard)}
.fehler-list ul{margin-left:18px}
.fehler-list li{font-size:13.5px;color:#ece3d6;margin-bottom:4px}

.res-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}
@media(max-width:560px){
  .lerntext{padding:18px 16px}.res-top{padding:16px}
  .concept-row{flex-direction:column}.seg{align-self:flex-start}
}
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <div class="logo"><span class="dot"></span>WiPsy Lernplattform</div>
    <div class="head-stats" id="headStats"></div>
    <div class="spacer"></div>
    <button class="btn sm ghost" id="navAR">Active Recall</button>
    <button class="btn sm ghost" id="navStats">Statistik</button>
    <button class="btn sm ghost" id="navHome">Start</button>
  </div>
</header>

<div class="wrap">
  <!-- HOME -->
  <section id="viewHome">
    <h1 class="page">Karteikarten nach Kategorie</h1>
    <p class="sub" id="homeSub"></p>
    <div class="toolbar">
      <button class="btn primary" id="studyAllDue">Alle fälligen Karten lernen</button>
      <label class="switch"><input type="checkbox" id="allMode"> Alle Karten üben (Zeitplan ignorieren)</label>
    </div>
    <div class="grid" id="catGrid"></div>
    <footer id="homeFoot"></footer>
  </section>

  <!-- STUDY -->
  <section id="viewStudy" class="hidden">
    <div class="study-top">
      <button class="btn sm" id="exitStudy">&larr; Zurück</button>
      <span class="name" id="studyName"></span>
      <div class="sessbar"><i id="sessFill"></i></div>
      <span class="count" id="sessCount"></span>
    </div>
    <div id="studyBody"></div>
  </section>

  <!-- STATS -->
  <section id="viewStats" class="hidden">
    <h1 class="page">Fortschritt &amp; Statistik</h1>
    <p class="sub">Lokal in deinem Browser gespeichert. Beim Teilen der Datei startet jede Person mit eigenem, frischem Fortschritt.</p>
    <div class="kpi" id="kpiBox"></div>
    <div class="stats-grid" id="statsGrid"></div>
    <div style="margin-top:22px" class="row">
      <button class="btn" id="resetBtn">Fortschritt zurücksetzen</button>
    </div>
    <footer id="statsFoot"></footer>
  </section>

  <!-- ACTIVE RECALL -->
  <section id="viewAR" class="hidden">
    <div id="arBody"></div>
  </section>
</div>

<script type="application/json" id="cards-data">[{"id":1,"cat":"Grundlagen & Methoden","q":"Was beschreibt Kahnemans System 1 / System 2 Modell?","a":"System 1 (schnell, automatisch): Intuitiv, emotional, unbewusst, fehleranfällig. Läuft immer im Hintergrund. Verantwortlich für die meisten alltäglichen Entscheidungen. \nSystem 2 (langsam, kontrolliert): Analytisch, bewusst, anstrengend. Wird aktiviert bei komplexen Problemen — aber oft \"faul\" und übernimmt Ergebnisse von System 1. \nAnwendung: Die meisten wirtschaftlichen Entscheidungen laufen über System 1 → deshalb so viele Biases.","a_short":"System 1 (schnell, automatisch): Intuitiv, emotional, unbewusst, fehleranfällig. Läuft immer im Hintergrund. Verantwortlich für die meisten alltäglichen Entscheidungen. \nSystem 2 (langsam, kontrolliert): Analytisch, bewusst, anstrengend. Wird aktiviert bei komplexen Problemen — aber oft \"faul\" und übernimmt Ergebnisse von System 1. \nAnwendung: Die meisten wirtschaftlichen Entscheidungen laufen über System 1 → deshalb so viele Biases.","extra":{"definition":"System 1 (schnell, automatisch): Intuitiv, emotional, unbewusst, fehleranfällig."},"hasInfo":true},{"id":2,"cat":"Grundlagen & Methoden","q":"Was ist ein Nudge und wie wird er in der Wirtschaft eingesetzt?","a":"Sanfter Schubs in eine bestimmte Richtung — ohne Verbote oder finanzielle Anreize. Nutzt Erkenntnisse aus System 1 und Verhaltensökonomie. \nBeispiele: \n· Gesundes Essen im Supermarkt auf Augenhöhe → mehr Kauf. \n· Opt-out statt Opt-in bei Organspende → höhere Spendenrate. \n· Energieverbrauch im Vergleich zu Nachbarn → Reduktion. Kritik: Manipulativ? Oder wohlmeinend paternalistisch?","a_short":"Sanfter Schubs in eine bestimmte Richtung — ohne Verbote oder finanzielle Anreize. Nutzt Erkenntnisse aus System 1 und Verhaltensökonomie.","extra":{"definition":"Sanfter Schubs in eine bestimmte Richtung — ohne Verbote oder finanzielle Anreize.","erklaerung":"Sanfter Schubs in eine bestimmte Richtung — ohne Verbote oder finanzielle Anreize. Nutzt Erkenntnisse aus System 1 und Verhaltensökonomie. \nBeispiele: \n· Gesundes Essen im Supermarkt auf Augenhöhe → mehr Kauf. \n· Opt-out statt Opt-in bei Organspende → höhere Spendenrate. \n· Energieverbrauch im Vergleich zu Nachbarn → Reduktion. Kritik: Manipulativ? Oder wohlmeinend paternalistisch?"},"hasInfo":true},{"id":3,"cat":"Grundlagen & Methoden","q":"Was war die Kernbotschaft der Hawthorne-Studien und warum sind sie für die Wirtschaftspsychologie bedeutsam?","a":"Ursprünglich wollte man zeigen, dass bessere Beleuchtung die Leistung erhöht. \nErgebnis: Die Leistung stieg unabhängig davon — allein weil die Arbeiter wussten, dass sie beobachtet wurden (Hawthorne-Effekt). \nBedeutung: Soziale Faktoren (Zugehörigkeit, Aufmerksamkeit, Anerkennung) sind ebenso wichtig wie physische Arbeitsbedingungen. → Geburtsstunde der Human-Relations-Bewegung.","a_short":"Ursprünglich wollte man zeigen, dass bessere Beleuchtung die Leistung erhöht. Ergebnis: Die Leistung stieg unabhängig davon — allein weil die Arbeiter wussten, dass sie beobachtet wurden (Hawthorne-Effekt).","extra":{"erklaerung":"Ursprünglich wollte man zeigen, dass bessere Beleuchtung die Leistung erhöht. \nErgebnis: Die Leistung stieg unabhängig davon — allein weil die Arbeiter wussten, dass sie beobachtet wurden (Hawthorne-Effekt). \nBedeutung: Soziale Faktoren (Zugehörigkeit, Aufmerksamkeit, Anerkennung) sind ebenso wichtig wie physische Arbeitsbedingungen. → Geburtsstunde der Human-Relations-Bewegung."},"hasInfo":true},{"id":4,"cat":"Grundlagen & Methoden","q":"Nenne und erkläre die Big Five Persönlichkeitsmerkmale","a":"OCEAN \nO – Offenheit (Openness): Neugier, Kreativität, Lernbereitschaft.\nC – Gewissenhaftigkeit (Conscientiousness): Zuverlässigkeit, Ordnung, Leistungsmotivation → stärkster Prädiktor für Berufserfolg. \nE – Extraversion: Geselligkeit, Dominanz, Gesprächigkeit → relevant für Führung & Vertrieb. \nA – Verträglichkeit (Agreeableness): Kooperationsbereitschaft, Empathie. \nN – Neurotizismus: Emotionale Instabilität, Ängstlichkeit → negativ für Stressresistenz. Empirisch am besten gestütztes Persönlichkeitsmodell.","a_short":"OCEAN \nO – Offenheit (Openness): Neugier, Kreativität, Lernbereitschaft.\nC – Gewissenhaftigkeit (Conscientiousness): Zuverlässigkeit, Ordnung, Leistungsmotivation → stärkster Prädiktor für Berufserfolg. \nE – Extraversion: Geselligkeit, Dominanz, Gesprächigkeit → relevant für Führung & Vertrieb. \nA – Verträglichkeit (Agreeableness): Kooperationsbereitschaft, Empathie. \nN – Neurotizismus: Emotionale Instabilität, Ängstlichkeit → negativ für Stressresistenz. Empirisch am besten gestütztes Persönlichkeitsmodell.","extra":{},"hasInfo":false},{"id":5,"cat":"Grundlagen & Methoden","q":"Unterschied zwischen Wirtschaftspsychologie und Betriebswirtschaftslehre (BWL)?","a":"BWL: Fokus auf rationalen Entscheidungen, Prozessen, Strukturen und Zielerreichung aus betriebswirtschaftlicher Sicht (Gewinnmaximierung). \nWirtschaftspsychologie: Fokus auf menschlichem Verhalten und Erleben — Menschen sind oft nicht rational. Erklärt Abweichungen vom ökonomischen Idealmodell (z. B. Biases, Emotionen, soziale Einflüsse). → Ergänzung, kein Widerspruch.","a_short":"BWL: Fokus auf rationalen Entscheidungen, Prozessen, Strukturen und Zielerreichung aus betriebswirtschaftlicher Sicht (Gewinnmaximierung). Wirtschaftspsychologie: Fokus auf menschlichem Verhalten und Erleben — Menschen sind oft nicht rational.","extra":{"erklaerung":"BWL: Fokus auf rationalen Entscheidungen, Prozessen, Strukturen und Zielerreichung aus betriebswirtschaftlicher Sicht (Gewinnmaximierung). \nWirtschaftspsychologie: Fokus auf menschlichem Verhalten und Erleben — Menschen sind oft nicht rational. Erklärt Abweichungen vom ökonomischen Idealmodell (z. B. Biases, Emotionen, soziale Einflüsse). → Ergänzung, kein Widerspruch.","beispiel":"(z. B. Biases, Emotionen, soziale Einflüsse)"},"hasInfo":true},{"id":6,"cat":"Grundlagen & Methoden","q":"Was sind kognitive Verzerrungen (Biases)? Nenne 4 wichtige Beispiele.","a":"Systematische Abweichungen vom rationalen Denken — entstehen durch mentale Abkürzungen (Heuristiken). \n1. Bestätigungsfehler (Confirmation Bias): Man sucht Informationen, die eigene Meinung bestätigen. \n2. Verfügbarkeitsheuristik: Was leicht erinnerbar ist, gilt als wahrscheinlicher. \n3. Verankerungseffekt (Anchoring): Erster genannter Wert beeinflusst alle weiteren Urteile. \n4. Optimismus-Bias: Überschätzung eigener Erfolgswahrscheinlichkeit (besonders bei Unternehmern).","a_short":"Systematische Abweichungen vom rationalen Denken — entstehen durch mentale Abkürzungen (Heuristiken). \n1. Bestätigungsfehler (Confirmation Bias): Man sucht Informationen, die eigene Meinung bestätigen. \n2. Verfügbarkeitsheuristik: Was leicht erinnerbar ist, gilt als wahrscheinlicher. \n3. Verankerungseffekt (Anchoring): Erster genannter Wert beeinflusst alle weiteren Urteile. \n4. Optimismus-Bias: Überschätzung eigener Erfolgswahrscheinlichkeit (besonders bei Unternehmern).","extra":{},"hasInfo":false},{"id":7,"cat":"Grundlagen & Methoden","q":"Welche ethischen Grundsätze gelten für wirtschaftspsychologisches Handeln?","a":"1. Informierte Einwilligung : Teilnehmer müssen über Studien aufgeklärt werden. \n2. Vertraulichkeit: Daten dürfen nicht ohne Einwilligung weitergegeben werden. \n3. Schadlosigkeit: Maßnahmen dürfen Personen nicht schaden. \n4. Wissenschaftliche Integrität : Nur empirisch belegte Maßnahmen empfehlen. \n5. Transparenz : Interessenkonflikte offenlegen. → Wirtschaftspsychologen tragen Verantwortung gegenüber Individuen UND Organisationen.","a_short":"1. Informierte Einwilligung : Teilnehmer müssen über Studien aufgeklärt werden. \n2. Vertraulichkeit: Daten dürfen nicht ohne Einwilligung weitergegeben werden. \n3. Schadlosigkeit: Maßnahmen dürfen Personen nicht schaden. \n4. Wissenschaftliche Integrität : Nur empirisch belegte Maßnahmen empfehlen. \n5. Transparenz : Interessenkonflikte offenlegen. → Wirtschaftspsychologen tragen Verantwortung gegenüber Individuen UND Organisationen.","extra":{},"hasInfo":false},{"id":8,"cat":"Grundlagen & Methoden","q":"Welches Big-Five-Merkmal sagt Berufserfolg am besten vorher und warum?","a":"Gewissenhaftigkeit (Conscientiousness) — der stärkste und konsistenteste Prädiktor über alle Berufe und Kulturen hinweg. \nWarum: Gewissenhafte Menschen setzen sich Ziele, halten sie ein, sind zuverlässig, arbeiten sorgfältig und zeigen Ausdauer bei Schwierigkeiten. Extraversion ist zusätzlich relevant für Führungs- und Verkaufsberufe, aber Gewissenhaftigkeit wirkt universell.","a_short":"Gewissenhaftigkeit (Conscientiousness) — der stärkste und konsistenteste Prädiktor über alle Berufe und Kulturen hinweg. Warum: Gewissenhafte Menschen setzen sich Ziele, halten sie ein, sind zuverlässig, arbeiten sorgfältig und zeigen Ausdauer bei Schwierigkeiten.","extra":{"erklaerung":"Gewissenhaftigkeit (Conscientiousness) — der stärkste und konsistenteste Prädiktor über alle Berufe und Kulturen hinweg. \nWarum: Gewissenhafte Menschen setzen sich Ziele, halten sie ein, sind zuverlässig, arbeiten sorgfältig und zeigen Ausdauer bei Schwierigkeiten. Extraversion ist zusätzlich relevant für Führungs- und Verkaufsberufe, aber Gewissenhaftigkeit wirkt universell."},"hasInfo":true},{"id":9,"cat":"Grundlagen & Methoden","q":"Welche Berufe sind laut Frey & Osborne Gewinner bzw. Verlierer der Computerisierung/KI?","a":"Verlierer (hohes Automatisierungsrisiko): Steuerberater, Taxifahrer, Kreditanalysten, Buchhalter, Kassierer → routiniert, regelbasiert. \nGewinner (niedriges Risiko): Therapeuten, Sozialarbeiter, Zahnärzte, Pädagogen, Kreative → erfordern soziale Intelligenz, Empathie, Kreativität, Urteilsvermögen. Fazit: Arbeit verschwindet nicht — sie verändert sich. Soziale und kognitive Kompetenzen werden wichtiger.","a_short":"Verlierer (hohes Automatisierungsrisiko): Steuerberater, Taxifahrer, Kreditanalysten, Buchhalter, Kassierer → routiniert, regelbasiert. \nGewinner (niedriges Risiko): Therapeuten, Sozialarbeiter, Zahnärzte, Pädagogen, Kreative → erfordern soziale Intelligenz, Empathie, Kreativität, Urteilsvermögen. Fazit: Arbeit verschwindet nicht — sie verändert sich. Soziale und kognitive Kompetenzen werden wichtiger.","extra":{},"hasInfo":false},{"id":10,"cat":"Grundlagen & Methoden","q":"Was sind Kognitionen, Emotionen und Motivationen? Kurzdefinitionen.","a":"Kognitionen: Gedanken, Überzeugungen, Wahrnehmungen, Einstellungen — alles was mit Denken und Wissen zu tun hat. Emotionen: Gefühlszustände (Freude, Angst, Ärger), die Verhalten beeinflussen und begleiten. \nMotivationen: Innere Antriebe, die Verhalten auslösen, richten und aufrechterhalten. → Alle drei beeinflussen wirtschaftliches Handeln.","a_short":"Kognitionen: Gedanken, Überzeugungen, Wahrnehmungen, Einstellungen — alles was mit Denken und Wissen zu tun hat. Emotionen: Gefühlszustände (Freude, Angst, Ärger), die Verhalten beeinflussen und begleiten.","extra":{"erklaerung":"Kognitionen: Gedanken, Überzeugungen, Wahrnehmungen, Einstellungen — alles was mit Denken und Wissen zu tun hat. Emotionen: Gefühlszustände (Freude, Angst, Ärger), die Verhalten beeinflussen und begleiten. \nMotivationen: Innere Antriebe, die Verhalten auslösen, richten und aufrechterhalten. → Alle drei beeinflussen wirtschaftliches Handeln."},"hasInfo":true},{"id":11,"cat":"Grundlagen & Methoden","q":"Was ist Selbstwirksamkeit (Bandura) und warum ist sie für die Wirtschaftspsychologie zentral?","a":"Überzeugung einer Person, eine Aufgabe erfolgreich bewältigen zu können. Hohe Selbstwirksamkeit: Mehr Ausdauer, Risikobereitschaft, bessere Leistung. Niedrige Selbstwirksamkeit: Vermeidung von Herausforderungen, schnellere Aufgabe. Relevanz: Zentral für Unternehmertum, Führung, Arbeitsmotivation und Stressbewältigung. Eine der am besten belegten Variablen in der angewandten Psychologie.","a_short":"Überzeugung einer Person, eine Aufgabe erfolgreich bewältigen zu können. Hohe Selbstwirksamkeit: Mehr Ausdauer, Risikobereitschaft, bessere Leistung.","extra":{"definition":"Überzeugung einer Person, eine Aufgabe erfolgreich bewältigen zu können.","erklaerung":"Überzeugung einer Person, eine Aufgabe erfolgreich bewältigen zu können. Hohe Selbstwirksamkeit: Mehr Ausdauer, Risikobereitschaft, bessere Leistung. Niedrige Selbstwirksamkeit: Vermeidung von Herausforderungen, schnellere Aufgabe. Relevanz: Zentral für Unternehmertum, Führung, Arbeitsmotivation und Stressbewältigung. Eine der am besten belegten Variablen in der angewandten Psychologie."},"hasInfo":true},{"id":12,"cat":"Grundlagen & Methoden","q":"Was besagt die Prospect Theory (Kahneman & Tversky, 1979)?","a":"Menschen bewerten Gewinne und Verluste relativ zu einem Referenzpunkt, nicht absolut. Kernbefund: Verluste wiegen psychologisch etwa doppelt so schwer wie gleichgroße Gewinne (Verlustaversion). Beispiel: \n100€ verlieren schmerzt mehr als 100€ gewinnen Freude bringt. Konsequenz für Praxis: Framing matters! „10% Fett\" vs. „90% fettfrei\" — gleicher Inhalt, verschiedene Wirkung.","a_short":"Menschen bewerten Gewinne und Verluste relativ zu einem Referenzpunkt, nicht absolut. Kernbefund: Verluste wiegen psychologisch etwa doppelt so schwer wie gleichgroße Gewinne (Verlustaversion).","extra":{"erklaerung":"Menschen bewerten Gewinne und Verluste relativ zu einem Referenzpunkt, nicht absolut. Kernbefund: Verluste wiegen psychologisch etwa doppelt so schwer wie gleichgroße Gewinne (Verlustaversion). Beispiel: \n100€ verlieren schmerzt mehr als 100€ gewinnen Freude bringt. Konsequenz für Praxis: Framing matters! „10% Fett\" vs. „90% fettfrei\" — gleicher Inhalt, verschiedene Wirkung.","beispiel":"100€ verlieren schmerzt mehr als 100€ gewinnen Freude bringt. Konsequenz für Praxis: Framing matters! „10% Fett\" vs. „90% fettfrei\" — gleicher Inhalt, verschiedene Wirkung."},"hasInfo":true},{"id":13,"cat":"Grundlagen & Methoden","q":"Wie entstand die Wirtschaftspsychologie historisch? Nenne 3 Meilensteine.","a":"1. Scientific Management (Taylor, ~1900): Erste systematische Analyse von Arbeitsprozessen — allerdings rein technisch, ohne Psychologie. \n2. Hawthorne-Studien (Mayo, 1924–1932): Entdeckung, dass soziale Faktoren die Leistung beeinflussen → Geburtsstunde der Arbeitspsychologie. \n3. Verhaltensökonomik (Kahneman & Tversky, ab 1970er): Nachweis systematischer kognitiver Verzerrungen → Nobelpreis 2002.","a_short":"1. Scientific Management (Taylor, ~1900): Erste systematische Analyse von Arbeitsprozessen — allerdings rein technisch, ohne Psychologie. \n2. Hawthorne-Studien (Mayo, 1924–1932): Entdeckung, dass soziale Faktoren die Leistung beeinflussen → Geburtsstunde der Arbeitspsychologie. \n3. Verhaltensökonomik (Kahneman & Tversky, ab 1970er): Nachweis systematischer kognitiver Verzerrungen → Nobelpreis 2002.","extra":{},"hasInfo":false},{"id":14,"cat":"Grundlagen & Methoden","q":"Warum irrte sich Keynes mit seiner Prognose der 15-Stunden-Woche?","a":"Keynes unterschätzte: \n1. Den psychologischen Wert von Arbeit (Identität, Sinn, Gemeinschaft). \n2. Die Entstehung neuer Konsumwünsche: mehr Wohlstand → mehr Bedürfnisse. \n3. Den Wertewandel: Arbeit als Selbstverwirklichung, nicht nur Notwendigkeit.\n4. Die Entstehung neuer Berufe durch Technologie. Zudem: Freizeit erzeugt eigene Probleme — Langeweile, Identitätsverlust, Sinnkrise.","a_short":"Keynes unterschätzte: \n1. Den psychologischen Wert von Arbeit (Identität, Sinn, Gemeinschaft). \n2. Die Entstehung neuer Konsumwünsche: mehr Wohlstand → mehr Bedürfnisse. \n3. Den Wertewandel: Arbeit als Selbstverwirklichung, nicht nur Notwendigkeit.\n4. Die Entstehung neuer Berufe durch Technologie. Zudem: Freizeit erzeugt eigene Probleme — Langeweile, Identitätsverlust, Sinnkrise.","extra":{},"hasInfo":false},{"id":15,"cat":"Grundlagen & Methoden","q":"Warum sind MBTI und DISG in der Wissenschaft abgelehnt, die Big Five aber akzeptiert?","a":"MBTI / DISG: Schlechte Reliabilität (Test-Retest: andere Ergebnisse nach Wochen), keine Vorhersagekraft für Berufserfolg, keine empirische Basis für die Kategorien, kommerziell motiviert. \nBig Five: Durch Faktorenanalyse aus Daten abgeleitet, interkulturell repliziert, valide, reliable Messinstrumente, gute Prädiktionskraft. \n→ In der Praxis trotzdem weit verbreitet: \"psychologischer Horoskop-Effekt\".","a_short":"MBTI / DISG: Schlechte Reliabilität (Test-Retest: andere Ergebnisse nach Wochen), keine Vorhersagekraft für Berufserfolg, keine empirische Basis für die Kategorien, kommerziell motiviert. Big Five: Durch Faktorenanalyse aus Daten abgeleitet, interkulturell repliziert, valide, reliable Messinstrumente, gute Prädiktionskraft.","extra":{"erklaerung":"MBTI / DISG: Schlechte Reliabilität (Test-Retest: andere Ergebnisse nach Wochen), keine Vorhersagekraft für Berufserfolg, keine empirische Basis für die Kategorien, kommerziell motiviert. \nBig Five: Durch Faktorenanalyse aus Daten abgeleitet, interkulturell repliziert, valide, reliable Messinstrumente, gute Prädiktionskraft. \n→ In der Praxis trotzdem weit verbreitet: \"psychologischer Horoskop-Effekt\"."},"hasInfo":true},{"id":16,"cat":"Grundlagen & Methoden","q":"Was ist der Unterschied zwischen Grundlagenforschung und angewandter Forschung in der Wirtschaftspsychologie?","a":"Grundlagenforschung: Erkenntnisgewinn um seiner selbst willen. \nZiel: Theorien und Gesetzmäßigkeiten verstehen. Kein direkter Praxisbezug erforderlich. \nAngewandte Forschung: Problemlösung in der Praxis. \nZiel: konkrete Verbesserungen in Organisationen, z. B. Stressreduktion, Teamentwicklung. Wirtschaftspsychologie ist überwiegend angewandt, fußt aber auf Grundlagenforschung.","a_short":"Grundlagenforschung: Erkenntnisgewinn um seiner selbst willen. Ziel: Theorien und Gesetzmäßigkeiten verstehen.","extra":{"definition":"Grundlagenforschung: Erkenntnisgewinn um seiner selbst willen.","erklaerung":"Grundlagenforschung: Erkenntnisgewinn um seiner selbst willen. \nZiel: Theorien und Gesetzmäßigkeiten verstehen. Kein direkter Praxisbezug erforderlich. \nAngewandte Forschung: Problemlösung in der Praxis. \nZiel: konkrete Verbesserungen in Organisationen, z. B. Stressreduktion, Teamentwicklung. Wirtschaftspsychologie ist überwiegend angewandt, fußt aber auf Grundlagenforschung."},"hasInfo":true},{"id":17,"cat":"Grundlagen & Methoden","q":"Was ist die Replikationskrise und was bedeutet sie für die Wirtschaftspsychologie?","a":"Viele klassische Studien (z. B. Priming-Effekte, Ego-Depletion) konnten in Replikationsstudien nicht bestätigt werden. \nUrsachen: Kleine Stichproben, p-Hacking, Publication Bias (nur positive Ergebnisse werden publiziert), mangelnde Transparenz.\nKonsequenz: Wirtschaftspsychologen müssen kritisch prüfen, ob eine Studie repliziert wurde, bevor sie Maßnahmen darauf gründen. Besonders problematisch bei \"populären\" Effekten aus Büchern wie Blink oder Outliers.","a_short":"Viele klassische Studien (z. B. Priming-Effekte, Ego-Depletion) konnten in Replikationsstudien nicht bestätigt werden. \nUrsachen: Kleine Stichproben, p-Hacking, Publication Bias (nur positive Ergebnisse werden publiziert), mangelnde Transparenz.\nKonsequenz: Wirtschaftspsychologen müssen kritisch prüfen, ob eine Studie repliziert wurde, bevor sie Maßnahmen darauf gründen. Besonders problematisch bei \"populären\" Effekten aus Büchern wie Blink oder Outliers.","extra":{"beispiel":"(z. B. Priming-Effekte, Ego-Depletion)"},"hasInfo":true},{"id":18,"cat":"Grundlagen & Methoden","q":"Was ist Work Happiness und welche drei Faktoren bestimmen es laut Work-Happiness-Report 2024?","a":"Arbeitsglück = subjektives Wohlbefinden bei der Arbeit. Gemessen mit der HappinessandWork-Skala (Rehwaldt & Kortsch). 3 gleich stark ausgeprägte Faktoren: 1. Sinnempfinden – 73% positiv 2. Selbstverwirklichung – 72% positiv 3. Gemeinschaft – 72% positiv Durchschnitt 2024: Ø 6,9 von 10. Nur <10% wirklich rundum glücklich. Ca. 24% unglücklich.","a_short":"Arbeitsglück = subjektives Wohlbefinden bei der Arbeit. Gemessen mit der HappinessandWork-Skala (Rehwaldt & Kortsch). 3 gleich stark ausgeprägte Faktoren: 1. Sinnempfinden – 73% positiv 2. Selbstverwirklichung – 72% positiv 3. Gemeinschaft – 72% positiv Durchschnitt 2024: Ø 6,9 von 10. Nur <10% wirklich rundum glücklich. Ca. 24% unglücklich.","extra":{"definition":"Arbeitsglück = subjektives Wohlbefinden bei der Arbeit."},"hasInfo":true},{"id":19,"cat":"Grundlagen & Methoden","q":"Was ist der Unterschied zwischen Korrelation und Kausalität?","a":"Korrelation: Zwei Variablen verändern sich gemeinsam — ohne Aussage über Ursache. \nBeispiel: Eiscremeverkauf und Ertrinkungsopfer korrelieren (beide durch Sommer bedingt). \nKausalität: Eine Variable verursacht die andere. Nur durch Experimente (mit Kontrollgruppe und Randomisierung) nachweisbar. \nMerksatz: Korrelation ≠ Kausalität. In der WiPsy-Praxis oft verwechselt!","a_short":"Korrelation: Zwei Variablen verändern sich gemeinsam — ohne Aussage über Ursache. Beispiel: Eiscremeverkauf und Ertrinkungsopfer korrelieren (beide durch Sommer bedingt).","extra":{"definition":"Korrelation: Zwei Variablen verändern sich gemeinsam — ohne Aussage über Ursache.","erklaerung":"Korrelation: Zwei Variablen verändern sich gemeinsam — ohne Aussage über Ursache. \nBeispiel: Eiscremeverkauf und Ertrinkungsopfer korrelieren (beide durch Sommer bedingt). \nKausalität: Eine Variable verursacht die andere. Nur durch Experimente (mit Kontrollgruppe und Randomisierung) nachweisbar. \nMerksatz: Korrelation ≠ Kausalität. In der WiPsy-Praxis oft verwechselt!","beispiel":"Eiscremeverkauf und Ertrinkungsopfer korrelieren (beide durch Sommer bedingt).","merkhilfe":"Korrelation ≠ Kausalität. In der WiPsy-Praxis oft verwechselt!"},"hasInfo":true},{"id":20,"cat":"Grundlagen & Methoden","q":"Was ist Scientific Management (Taylor) und wie wird es heute bewertet?","a":"Kernidee: Zerlegung von Arbeit in kleinste Einheiten, Optimierung durch Zeit- und Bewegungsstudien, Trennung von Planung und Ausführung → Effizienzsteigerung. \nHeutige Bewertung: ✅ Pionierarbeit für systematische Arbeitsanalyse. ❌ Reduziert Menschen auf Produktionsfaktoren, ignoriert psychologische Bedürfnisse (Motivation, Sinn, Autonomie). ❌ Führt zu Monotonie, Entfremdung und geringer Arbeitszufriedenheit.","a_short":"Kernidee: Zerlegung von Arbeit in kleinste Einheiten, Optimierung durch Zeit- und Bewegungsstudien, Trennung von Planung und Ausführung → Effizienzsteigerung. Heutige Bewertung: ✅ Pionierarbeit für systematische Arbeitsanalyse.","extra":{"definition":"Kernidee: Zerlegung von Arbeit in kleinste Einheiten, Optimierung durch Zeit- und Bewegungsstudien, Trennung von Planung und Ausführung → Effizienzsteigerung.","erklaerung":"Kernidee: Zerlegung von Arbeit in kleinste Einheiten, Optimierung durch Zeit- und Bewegungsstudien, Trennung von Planung und Ausführung → Effizienzsteigerung. \nHeutige Bewertung: ✅ Pionierarbeit für systematische Arbeitsanalyse. ❌ Reduziert Menschen auf Produktionsfaktoren, ignoriert psychologische Bedürfnisse (Motivation, Sinn, Autonomie). ❌ Führt zu Monotonie, Entfremdung und geringer Arbeitszufriedenheit."},"hasInfo":true},{"id":21,"cat":"Grundlagen & Methoden","q":"Kritische Stellungnahme: Ist Wirtschaftspsychologie eine echte Wissenschaft?","a":"Ja — mit Einschränkungen: Für:\nOrientiert sich an wissenschaftlichen Methoden (Gütekriterien, Empirie), replizierbare Befunde (z. B. Big Five, Prospect Theory), eigene Fachzeitschriften und Forschungsgemeinschaft. Einschränkungen: Replikationskrise betrifft auch WiPsy. Viele populäre Konzepte (MBTI, Maslow, Herzberg) sind empirisch schwach. Praxis-Bücher oft pseudowissenschaftlich. Fazit: Verantwortungsvolle WiPsy-Praxis erfordert kritisches Denken und Orientierung an empirisch gesicherten Befunden.","a_short":"Ja — mit Einschränkungen: Für: Orientiert sich an wissenschaftlichen Methoden (Gütekriterien, Empirie), replizierbare Befunde (z. B.","extra":{"erklaerung":"Ja — mit Einschränkungen: Für:\nOrientiert sich an wissenschaftlichen Methoden (Gütekriterien, Empirie), replizierbare Befunde (z. B. Big Five, Prospect Theory), eigene Fachzeitschriften und Forschungsgemeinschaft. Einschränkungen: Replikationskrise betrifft auch WiPsy. Viele populäre Konzepte (MBTI, Maslow, Herzberg) sind empirisch schwach. Praxis-Bücher oft pseudowissenschaftlich. Fazit: Verantwortungsvolle WiPsy-Praxis erfordert kritisches Denken und Orientierung an empirisch gesicherten Befunden.","beispiel":"(z. B. Big Five, Prospect Theory)"},"hasInfo":true},{"id":22,"cat":"Grundlagen & Methoden","q":"Was ist Wirtschaftspsychologie? (Definition)","a":"Wissenschaftliche Disziplin, die psychologische Theorien und Methoden nutzt, um wirtschaftliches Verhalten und Erleben von Menschen zu erklären, zu beschreiben und zu verbessern. \nSie untersucht: wie Menschen als Konsumenten, Arbeitnehmer, Führungskräfte, Unternehmer und gesellschaftliche Akteure handeln — und warum. Kernbegriff: Schnittstelle von Psychologie und Wirtschaft.","a_short":"Wissenschaftliche Disziplin, die psychologische Theorien und Methoden nutzt, um wirtschaftliches Verhalten und Erleben von Menschen zu erklären, zu beschreiben und zu verbessern. Sie untersucht: wie Menschen als Konsumenten, Arbeitnehmer, Führungskräfte, Unternehmer und gesellschaftliche Akteure handeln — und warum.","extra":{"definition":"Wissenschaftliche Disziplin, die psychologische Theorien und Methoden nutzt, um wirtschaftliches Verhalten und Erleben von Menschen zu erklären, zu beschreiben und zu verbessern.","erklaerung":"Wissenschaftliche Disziplin, die psychologische Theorien und Methoden nutzt, um wirtschaftliches Verhalten und Erleben von Menschen zu erklären, zu beschreiben und zu verbessern. \nSie untersucht: wie Menschen als Konsumenten, Arbeitnehmer, Führungskräfte, Unternehmer und gesellschaftliche Akteure handeln — und warum. Kernbegriff: Schnittstelle von Psychologie und Wirtschaft."},"hasInfo":true},{"id":23,"cat":"Grundlagen & Methoden","q":"Was ist der Unterschied zwischen intrinsischer und extrinsischer Motivation?","a":"intrinsisch: Motivation kommt von innen — Freude an der Tätigkeit selbst, Neugier, Sinnerfüllung. Nachhaltiger und stabiler. \nExtrinsisch: Motivation kommt von außen — Lohn, Prämien, Lob, Angst vor Strafe. Kann intrinsische Motivation verdrängen (Korrumpierungseffekt). \nWichtig für die Praxis: Rein extrinsische Anreize sind langfristig nicht ausreichend.","a_short":"intrinsisch: Motivation kommt von innen — Freude an der Tätigkeit selbst, Neugier, Sinnerfüllung. Nachhaltiger und stabiler.","extra":{"definition":"intrinsisch: Motivation kommt von innen — Freude an der Tätigkeit selbst, Neugier, Sinnerfüllung.","erklaerung":"intrinsisch: Motivation kommt von innen — Freude an der Tätigkeit selbst, Neugier, Sinnerfüllung. Nachhaltiger und stabiler. \nExtrinsisch: Motivation kommt von außen — Lohn, Prämien, Lob, Angst vor Strafe. Kann intrinsische Motivation verdrängen (Korrumpierungseffekt). \nWichtig für die Praxis: Rein extrinsische Anreize sind langfristig nicht ausreichend."},"hasInfo":true},{"id":24,"cat":"Grundlagen & Methoden","q":"Welche Hauptthemen behandelt Wirtschaftspsychologie I nach Fichter?","a":"• Arbeit – Arbeitsanalyse, Motivation, Stress, Sicherheit, Gruppenarbeit, Unternehmertum, Selbstmanagement\n• \nOrganisation – Strukturen, Führung, Organisationskultur, Wandel\n• \nPersonal – Auswahl, Beurteilung, Entwicklung, Vergütung\n• \nFinanzpsychologie – Entscheidungsverhalten, Biases\n• \nGesellschaft – Sozialisation, Normen, gesellschaftlicher Wandel\n• \nEntwicklung – Lebensspanne, berufliche Entwicklung","a_short":"• Arbeit – Arbeitsanalyse, Motivation, Stress, Sicherheit, Gruppenarbeit, Unternehmertum, Selbstmanagement\n• \nOrganisation – Strukturen, Führung, Organisationskultur, Wandel\n• \nPersonal – Auswahl, Beurteilung, Entwicklung, Vergütung\n• \nFinanzpsychologie – Entscheidungsverhalten, Biases\n• \nGesellschaft – Sozialisation, Normen, gesellschaftlicher Wandel\n• \nEntwicklung – Lebensspanne, berufliche Entwicklung","extra":{},"hasInfo":false},{"id":25,"cat":"Grundlagen & Methoden","q":"Was beschreibt das Phänomen des \"total verrückten Arbeitsmarkts\" (Handelsblatt 2026)?","a":"Paradox: Unternehmen klagen über Fachkräftemangel — gleichzeitig finden hochqualifizierte Menschen keinen Job. \nMögliche Ursachen: \n· Mismatch zwischen gesuchten und vorhandenen Qualifikationen. \n· Überqualifikation wird als Risiko gesehen. \n· Babyboomer-Renteneintritt schafft Stellen, aber verändert Bedarfsprofile.\n· KI verändert schnell, welche Qualifikationen gebraucht werden. → Klassisches wirtschaftspsychologisches Thema: Wahrnehmung, Entscheidung, Bias in der Personalauswahl.","a_short":"Paradox: Unternehmen klagen über Fachkräftemangel — gleichzeitig finden hochqualifizierte Menschen keinen Job. Mögliche Ursachen: · Mismatch zwischen gesuchten und vorhandenen Qualifikationen.","extra":{"definition":"Paradox: Unternehmen klagen über Fachkräftemangel — gleichzeitig finden hochqualifizierte Menschen keinen Job.","erklaerung":"Paradox: Unternehmen klagen über Fachkräftemangel — gleichzeitig finden hochqualifizierte Menschen keinen Job. \nMögliche Ursachen: \n· Mismatch zwischen gesuchten und vorhandenen Qualifikationen. \n· Überqualifikation wird als Risiko gesehen. \n· Babyboomer-Renteneintritt schafft Stellen, aber verändert Bedarfsprofile.\n· KI verändert schnell, welche Qualifikationen gebraucht werden. → Klassisches wirtschaftspsychologisches Thema: Wahrnehmung, Entscheidung, Bias in der Personalauswahl."},"hasInfo":true},{"id":26,"cat":"Grundlagen & Methoden","q":"Was kennzeichnet das Experiment als Forschungsmethode?","a":"Der Versuchsleiter veraendert gezielt eine Situation (unabhaengige Variable UV) und untersucht die Konsequenzen (abhaengige Variable AV). Nur das Experiment weist kausale Zusammenhaenge zweifelsfrei nach; Randomisierung schuetzt vor Stoervariablen.","a_short":"Der Versuchsleiter veraendert gezielt eine Situation (unabhaengige Variable UV) und untersucht die Konsequenzen (abhaengige Variable AV). Nur das Experiment weist kausale Zusammenhaenge zweifelsfrei nach; Randomisierung schuetzt vor Stoervariablen.","extra":{"definition":"Der Versuchsleiter veraendert gezielt eine Situation (unabhaengige Variable UV) und untersucht die Konsequenzen (abhaengige Variable AV)."},"hasInfo":true},{"id":27,"cat":"Grundlagen & Methoden","q":"Nenne die neun Schritte des typischen Forschungsprozesses.","a":"Themenfindung, Literaturrecherche, Fragestellung, Hypothesen ableiten, Operationalisierung, Datenerhebung, Datenauswertung, Diskussion, Verwertung.","a_short":"Themenfindung, Literaturrecherche, Fragestellung, Hypothesen ableiten, Operationalisierung, Datenerhebung, Datenauswertung, Diskussion, Verwertung.","extra":{},"hasInfo":false},{"id":28,"cat":"Grundlagen & Methoden","q":"Worin unterscheiden sich quantitative und qualitative Forschung?","a":"Quantitativ: numerische Daten, deduktiv, variablenorientiert, Hypothesen pruefen. Qualitativ: verbale Aeusserungen, induktiv, einzelfallorientiert, Hypothesen generieren. Mixed-Methods kombiniert beide; die Fragestellung leitet die Methode.","a_short":"Quantitativ: numerische Daten, deduktiv, variablenorientiert, Hypothesen pruefen. Qualitativ: verbale Aeusserungen, induktiv, einzelfallorientiert, Hypothesen generieren.","extra":{"erklaerung":"Quantitativ: numerische Daten, deduktiv, variablenorientiert, Hypothesen pruefen. Qualitativ: verbale Aeusserungen, induktiv, einzelfallorientiert, Hypothesen generieren. Mixed-Methods kombiniert beide; die Fragestellung leitet die Methode."},"hasInfo":true},{"id":29,"cat":"Grundlagen & Methoden","q":"Was bedeutet Operationalisierung?","a":"Die Festlegung, wie ein (psychologisches) Konstrukt gemessen werden soll, z.B. Intelligenz ueber die Anzahl richtig geloester Testaufgaben.","a_short":"Die Festlegung, wie ein (psychologisches) Konstrukt gemessen werden soll, z.B. Intelligenz ueber die Anzahl richtig geloester Testaufgaben.","extra":{},"hasInfo":false},{"id":30,"cat":"Grundlagen & Methoden","q":"Worin unterscheiden sich Signifikanz und Effektstaerke?","a":"Signifikanz (mind. 95%, Irrtumswahrscheinlichkeit hoechstens 5%) sagt, dass ein Ergebnis nicht bloss zufaellig ist; bei grossen Stichproben werden auch winzige Effekte signifikant. Die Effektstaerke (Cohen) zeigt, ob ein Effekt bedeutsam gross ist. Signifikanz ist nicht gleich Bedeutsamkeit.","a_short":"Signifikanz (mind. 95%, Irrtumswahrscheinlichkeit hoechstens 5%) sagt, dass ein Ergebnis nicht bloss zufaellig ist; bei grossen Stichproben werden auch winzige Effekte signifikant.","extra":{"erklaerung":"Signifikanz (mind. 95%, Irrtumswahrscheinlichkeit hoechstens 5%) sagt, dass ein Ergebnis nicht bloss zufaellig ist; bei grossen Stichproben werden auch winzige Effekte signifikant. Die Effektstaerke (Cohen) zeigt, ob ein Effekt bedeutsam gross ist. Signifikanz ist nicht gleich Bedeutsamkeit."},"hasInfo":true},{"id":31,"cat":"Grundlagen & Methoden","q":"Was ist eine Metaanalyse und was der Publication Bias?","a":"Metaanalyse rechnet die Kennwerte vieler Studien zusammen, um einen Effekt genauer zu bestimmen. Publication Bias: meist werden nur Studien mit signifikanten Ergebnissen publiziert, was den Forschungsstand verzerrt.","a_short":"Metaanalyse rechnet die Kennwerte vieler Studien zusammen, um einen Effekt genauer zu bestimmen. Publication Bias: meist werden nur Studien mit signifikanten Ergebnissen publiziert, was den Forschungsstand verzerrt.","extra":{"definition":"Metaanalyse rechnet die Kennwerte vieler Studien zusammen, um einen Effekt genauer zu bestimmen."},"hasInfo":true},{"id":32,"cat":"Grundlagen & Methoden","q":"Was bedeuten die drei Guetekriterien Validitaet, Reliabilitaet und Objektivitaet?","a":"Validitaet: wird gemessen, was gemessen werden soll? Reliabilitaet: liefert die Wiederholung dasselbe Ergebnis? Objektivitaet: unabhaengig davon, wer durchfuehrt und auswertet? (Bonuskapitel, garantierte Klausurfrage.)","a_short":"Validitaet: wird gemessen, was gemessen werden soll? Reliabilitaet: liefert die Wiederholung dasselbe Ergebnis?","extra":{"erklaerung":"Validitaet: wird gemessen, was gemessen werden soll? Reliabilitaet: liefert die Wiederholung dasselbe Ergebnis? Objektivitaet: unabhaengig davon, wer durchfuehrt und auswertet? (Bonuskapitel, garantierte Klausurfrage.)","quelle":"(Bonuskapitel, garantierte Klausurfrage.)"},"hasInfo":true},{"id":33,"cat":"Grundlagen & Methoden","q":"Warum ist Korrelation nicht gleich Kausalitaet?","a":"Korrelation heisst nur, dass sich zwei Variablen gemeinsam veraendern (z.B. Eisverkauf und Ertrinken, beide durch den Sommer bedingt). Kausalitaet (eine verursacht die andere) ist nur durch Experimente mit Kontrollgruppe und Randomisierung nachweisbar.","a_short":"Korrelation heisst nur, dass sich zwei Variablen gemeinsam veraendern (z.B. Eisverkauf und Ertrinken, beide durch den Sommer bedingt).","extra":{"erklaerung":"Korrelation heisst nur, dass sich zwei Variablen gemeinsam veraendern (z.B. Eisverkauf und Ertrinken, beide durch den Sommer bedingt). Kausalitaet (eine verursacht die andere) ist nur durch Experimente mit Kontrollgruppe und Randomisierung nachweisbar.","beispiel":"(z. B. Eisverkauf und Ertrinken, beide durch den Sommer bedingt)"},"hasInfo":true},{"id":34,"cat":"Grundlagen & Methoden","q":"Was ist bei der Befragung als haeufigster Methode zu beachten?","a":"Fragen einfach, klar und nicht suggestiv formulieren (Gefahr der sozialen Erwuenschtheit). Die Stichprobe sollte moeglichst repraesentativ sein, also die Merkmale der Grundgesamtheit widerspiegeln.","a_short":"Fragen einfach, klar und nicht suggestiv formulieren (Gefahr der sozialen Erwuenschtheit). Die Stichprobe sollte moeglichst repraesentativ sein, also die Merkmale der Grundgesamtheit widerspiegeln.","extra":{"definition":"Fragen einfach, klar und nicht suggestiv formulieren (Gefahr der sozialen Erwuenschtheit)."},"hasInfo":true},{"id":35,"cat":"Konsum, Markt & Werbung","q":"Nenne die sieben Konsummotive nach Trommsdorff und Teichert.","a":"1. Oekonomik/Sparsamkeit, 2. Prestige/Anerkennung, 3. Konformitaet, 4. Lust/Erregung/Neugier, 5. Sex/Erotik, 6. Angst/Risikoneigung, 7. Konsistenz/Dissonanzvermeidung.","a_short":"1. Oekonomik/Sparsamkeit, 2. Prestige/Anerkennung, 3. Konformitaet, 4. Lust/Erregung/Neugier, 5. Sex/Erotik, 6. Angst/Risikoneigung, 7. Konsistenz/Dissonanzvermeidung.","extra":{},"hasInfo":false},{"id":36,"cat":"Konsum, Markt & Werbung","q":"Was beschreibt die Means-End-Kette (Walker & Olson)?","a":"Den Zusammenhang von Produkteigenschaften -> Nutzen/Funktionen -> Werte/Ziele (Konsummotive). Beispiel: Deodorant (Eigenschaft) -> weniger Geruch (Nutzen) -> beliebt sein (Ziel).","a_short":"Den Zusammenhang von Produkteigenschaften -> Nutzen/Funktionen -> Werte/Ziele (Konsummotive). Beispiel: Deodorant (Eigenschaft) -> weniger Geruch (Nutzen) -> beliebt sein (Ziel).","extra":{"definition":"Den Zusammenhang von Produkteigenschaften -> Nutzen/Funktionen -> Werte/Ziele (Konsummotive).","beispiel":"Deodorant (Eigenschaft) -> weniger Geruch (Nutzen) -> beliebt sein (Ziel)."},"hasInfo":true},{"id":37,"cat":"Konsum, Markt & Werbung","q":"Wozu dient die Laddering-Methode (Reynolds & Gutman)?","a":"Identifikation der Means-End-Kette durch wiederholtes Nachfragen 'Warum ist Ihnen das wichtig?' (kognitive Leiter). Ergebnis ist eine hierarchische Wertekarte.","a_short":"Identifikation der Means-End-Kette durch wiederholtes Nachfragen 'Warum ist Ihnen das wichtig?' (kognitive Leiter). Ergebnis ist eine hierarchische Wertekarte.","extra":{},"hasInfo":false},{"id":38,"cat":"Konsum, Markt & Werbung","q":"Welche drei Phasen durchlaeuft eine Kaufentscheidung (Betsch et al.)?","a":"Praeselektional (Situation erkennen, Optionen und Infos suchen), selektional (bewerten und entscheiden), postselektional (Kauf ausfuehren, Erfahrung sammeln -> Zufriedenheit oder Reue).","a_short":"Praeselektional (Situation erkennen, Optionen und Infos suchen), selektional (bewerten und entscheiden), postselektional (Kauf ausfuehren, Erfahrung sammeln -> Zufriedenheit oder Reue).","extra":{},"hasInfo":false},{"id":39,"cat":"Konsum, Markt & Werbung","q":"Welche vier Typen von Kaufentscheidungen unterscheidet Felser?","a":"Impulskauf (spontan, emotional), Gewohnheitskauf (markentreu, Autopilot), extensiver Kauf (hohes Involvement, alle Phasen), limitierter Kauf (Faustregeln unter Zeit- oder Wissensmangel).","a_short":"Impulskauf (spontan, emotional), Gewohnheitskauf (markentreu, Autopilot), extensiver Kauf (hohes Involvement, alle Phasen), limitierter Kauf (Faustregeln unter Zeit- oder Wissensmangel).","extra":{},"hasInfo":false},{"id":40,"cat":"Konsum, Markt & Werbung","q":"Was bedeutet Satisficing (Herbert Simon)?","a":"Nicht die objektiv beste, sondern eine 'gut genug' erscheinende Alternative waehlen, sobald die festgelegten Mindestanforderungen erfuellt sind.","a_short":"Nicht die objektiv beste, sondern eine 'gut genug' erscheinende Alternative waehlen, sobald die festgelegten Mindestanforderungen erfuellt sind.","extra":{"definition":"Nicht die objektiv beste, sondern eine 'gut genug' erscheinende Alternative waehlen, sobald die festgelegten Mindestanforderungen erfuellt sind."},"hasInfo":true},{"id":41,"cat":"Konsum, Markt & Werbung","q":"Was besagt das Konzept der Preisschwellen?","a":"Konsumenten kennen genaue Preise selten. Es gibt obere (zu teuer) und untere (Qualitaetszweifel) absolute Schwellen, dazwischen relative Schwellen. Preisaenderungen innerhalb einer Stufe beeinflussen den Absatz kaum (Stufenmuster statt Kurve).","a_short":"Konsumenten kennen genaue Preise selten. Es gibt obere (zu teuer) und untere (Qualitaetszweifel) absolute Schwellen, dazwischen relative Schwellen.","extra":{"erklaerung":"Konsumenten kennen genaue Preise selten. Es gibt obere (zu teuer) und untere (Qualitaetszweifel) absolute Schwellen, dazwischen relative Schwellen. Preisaenderungen innerhalb einer Stufe beeinflussen den Absatz kaum (Stufenmuster statt Kurve)."},"hasInfo":true},{"id":42,"cat":"Konsum, Markt & Werbung","q":"Was ist der Veblen-Effekt?","a":"Bei Statusguetern kann der Absatz mit steigendem Preis steigen, weil hohe Preise Exklusivitaet und sozialen Status signalisieren; zu tiefe Preise schaden dem Absatz. Variante: Geltungskonsum (Veblen, 1899).","a_short":"Bei Statusguetern kann der Absatz mit steigendem Preis steigen, weil hohe Preise Exklusivitaet und sozialen Status signalisieren; zu tiefe Preise schaden dem Absatz. Variante: Geltungskonsum (Veblen, 1899).","extra":{"definition":"Bei Statusguetern kann der Absatz mit steigendem Preis steigen, weil hohe Preise Exklusivitaet und sozialen Status signalisieren; zu tiefe Preise schaden dem Absatz."},"hasInfo":true},{"id":43,"cat":"Konsum, Markt & Werbung","q":"Was ist der Ankereffekt bei der Preiswahrnehmung?","a":"Bei geringer Preiskenntnis orientiert man sich an willkuerlichen Vorgaben. Ein hoeheres Startgebot fuehrt z.B. zu einem hoeheren Endpreis (Galinsky & Mussweiler).","a_short":"Bei geringer Preiskenntnis orientiert man sich an willkuerlichen Vorgaben. Ein hoeheres Startgebot fuehrt z.B. zu einem hoeheren Endpreis (Galinsky & Mussweiler).","extra":{"definition":"Bei geringer Preiskenntnis orientiert man sich an willkuerlichen Vorgaben."},"hasInfo":true},{"id":44,"cat":"Konsum, Markt & Werbung","q":"Was ist der Pain of Paying (Prelec & Loewenstein)?","a":"Barzahlung loest mehr negative Gefuehle aus als Karte oder Flatrate, die Konsum und Bezahlung entkoppeln. Das kann zu mehr Konsum und Verschuldung fuehren.","a_short":"Barzahlung loest mehr negative Gefuehle aus als Karte oder Flatrate, die Konsum und Bezahlung entkoppeln. Das kann zu mehr Konsum und Verschuldung fuehren.","extra":{"definition":"Barzahlung loest mehr negative Gefuehle aus als Karte oder Flatrate, die Konsum und Bezahlung entkoppeln."},"hasInfo":true},{"id":45,"cat":"Konsum, Markt & Werbung","q":"Was besagt das Diskonfirmationsparadigma der Kundenzufriedenheit?","a":"Zufriedenheit entsteht, wenn die Ist-Leistung die Erwartung (Soll) erreicht (Konfirmation) oder uebertrifft (positive Diskonfirmation); bleibt sie darunter, entsteht Unzufriedenheit.","a_short":"Zufriedenheit entsteht, wenn die Ist-Leistung die Erwartung (Soll) erreicht (Konfirmation) oder uebertrifft (positive Diskonfirmation); bleibt sie darunter, entsteht Unzufriedenheit.","extra":{},"hasInfo":false},{"id":46,"cat":"Konsum, Markt & Werbung","q":"Welche drei Merkmalsarten unterscheidet das Kano-Modell?","a":"Basismerkmale (selbstverstaendlich, = Hygienefaktoren), Leistungsmerkmale (erwartet, koennen Zufriedenheit und Unzufriedenheit ausloesen), Begeisterungsmerkmale (unerwartet, = Motivatoren). Angelehnt an Herzbergs Zwei-Faktoren-Theorie.","a_short":"Basismerkmale (selbstverstaendlich, = Hygienefaktoren), Leistungsmerkmale (erwartet, koennen Zufriedenheit und Unzufriedenheit ausloesen), Begeisterungsmerkmale (unerwartet, = Motivatoren). Angelehnt an Herzbergs Zwei-Faktoren-Theorie.","extra":{},"hasInfo":false},{"id":47,"cat":"Konsum, Markt & Werbung","q":"Wofuer steht das AIDA-Stufenmodell und wie wird es bewertet?","a":"Attention, Interest, Desire, Action. Gilt als ueberholt: zu starr, kaum realitaetsgerecht, empirisch nicht bestaetigt.","a_short":"Attention, Interest, Desire, Action. Gilt als ueberholt: zu starr, kaum realitaetsgerecht, empirisch nicht bestaetigt.","extra":{"definition":"Attention, Interest, Desire, Action."},"hasInfo":true},{"id":48,"cat":"Konsum, Markt & Werbung","q":"Welche zwei Verarbeitungsrouten unterscheidet das Elaboration-Likelihood-Model (Petty & Cacioppo)?","a":"Zentrale Route (sorgfaeltig, bewusst, starke Argumente noetig) und periphere Route (oberflaechlich, heuristische Hinweisreize wie Prominente). Welche Route greift, haengt von Motivation und Faehigkeit ab.","a_short":"Zentrale Route (sorgfaeltig, bewusst, starke Argumente noetig) und periphere Route (oberflaechlich, heuristische Hinweisreize wie Prominente). Welche Route greift, haengt von Motivation und Faehigkeit ab.","extra":{},"hasInfo":false},{"id":49,"cat":"Konsum, Markt & Werbung","q":"Was ist der Mere-Exposure-Effekt (Zajonc)?","a":"Blosse wiederholte Exposition, etwa eines Markennamens, fuehrt zu positiverer Bewertung und beguenstigt spaeter die Markenwahl.","a_short":"Blosse wiederholte Exposition, etwa eines Markennamens, fuehrt zu positiverer Bewertung und beguenstigt spaeter die Markenwahl.","extra":{"definition":"Blosse wiederholte Exposition, etwa eines Markennamens, fuehrt zu positiverer Bewertung und beguenstigt spaeter die Markenwahl."},"hasInfo":true},{"id":50,"cat":"Konsum, Markt & Werbung","q":"Wie misst das Gap-Modell / SERVQUAL die Dienstleistungsqualitaet?","a":"Ueber die Luecke (Gap) zwischen Erwartung und erbrachter Leistung (Diskonfirmationsparadigma). SERVQUAL hat fuenf Dimensionen: Souveraenitaet, Einfuehlung, Entgegenkommen, Zuverlaessigkeit, Materielles.","a_short":"Ueber die Luecke (Gap) zwischen Erwartung und erbrachter Leistung (Diskonfirmationsparadigma). SERVQUAL hat fuenf Dimensionen: Souveraenitaet, Einfuehlung, Entgegenkommen, Zuverlaessigkeit, Materielles.","extra":{},"hasInfo":false},{"id":51,"cat":"Konsum, Markt & Werbung","q":"Was ist ein Image und welche Funktion hat es?","a":"Ein sozial geteiltes Vorstellungsbild von einem Meinungsgegenstand (Marke, Person, Institution); kann anders als Prestige auch negativ sein. Funktion: Vereinfachung und Orientierung. Wir urteilen oft anhand von Images statt Fakten, auch Experten.","a_short":"Ein sozial geteiltes Vorstellungsbild von einem Meinungsgegenstand (Marke, Person, Institution); kann anders als Prestige auch negativ sein. Funktion: Vereinfachung und Orientierung.","extra":{"definition":"Ein sozial geteiltes Vorstellungsbild von einem Meinungsgegenstand (Marke, Person, Institution); kann anders als Prestige auch negativ sein.","erklaerung":"Ein sozial geteiltes Vorstellungsbild von einem Meinungsgegenstand (Marke, Person, Institution); kann anders als Prestige auch negativ sein. Funktion: Vereinfachung und Orientierung. Wir urteilen oft anhand von Images statt Fakten, auch Experten."},"hasInfo":true},{"id":52,"cat":"Konsum, Markt & Werbung","q":"Wofuer stehen die Positionierungsschlagworte USP, KISS, FIRST, VOICE?","a":"USP (Unique Selling Proposition, Alleinstellungsmerkmal), KISS (keep it short and simple), FIRST (als Erster am Markt), VOICE (hoher Werbeaufwand, Lautstaerke). Nach Ries & Trout.","a_short":"USP (Unique Selling Proposition, Alleinstellungsmerkmal), KISS (keep it short and simple), FIRST (als Erster am Markt), VOICE (hoher Werbeaufwand, Lautstaerke). Nach Ries & Trout.","extra":{},"hasInfo":false},{"id":53,"cat":"Arbeit","q":"Nenne die vier Kriterien der Arbeitsgestaltung nach Hacker und Richter (1980).","a":"Ausführbarkeit, Schädigungslosigkeit, Beeinträchtigungsfreiheit und Persönlichkeitsförderlichkeit.","a_short":"Ausführbarkeit, Schädigungslosigkeit, Beeinträchtigungsfreiheit und Persönlichkeitsförderlichkeit.","extra":{},"hasInfo":false},{"id":54,"cat":"Arbeit","q":"Warum ist 'menschliches Fehlverhalten' für die Arbeitssicherheit zentraler als technisches Versagen?","a":"Die meisten Unfälle resultieren aus Unachtsamkeit, Fehleinschätzungen oder riskantem Verhalten, nicht aus Materialfehlern.","a_short":"Die meisten Unfälle resultieren aus Unachtsamkeit, Fehleinschätzungen oder riskantem Verhalten, nicht aus Materialfehlern.","extra":{},"hasInfo":false},{"id":55,"cat":"Arbeit","q":"Erkläre den 'Sucker-Effect' in der Gruppenarbeit.","a":"Mitarbeiter reduzieren ihre Leistung, um nicht von vermeintlichen Trittbrettfahrern ausgenutzt zu werden.","a_short":"Mitarbeiter reduzieren ihre Leistung, um nicht von vermeintlichen Trittbrettfahrern ausgenutzt zu werden.","extra":{},"hasInfo":false},{"id":56,"cat":"Arbeit","q":"Was unterscheidet 'Unternehmensführung' von 'Personalführung'?","a":"Unternehmensführung steuert Prozesse und Ziele; Personalführung beeinflusst das Verhalten von Menschen zur Zielerreichung.","a_short":"Unternehmensführung steuert Prozesse und Ziele; Personalführung beeinflusst das Verhalten von Menschen zur Zielerreichung.","extra":{},"hasInfo":false},{"id":57,"cat":"Arbeit","q":"Was ist der 'Organizational Culture Inventory' (OCI)?","a":"Ein Fragebogen zur Messung von Verhaltensnormen in einer Organisation (konstruktiv, passiv-defensiv, aggressiv-defensiv).","a_short":"Ein Fragebogen zur Messung von Verhaltensnormen in einer Organisation (konstruktiv, passiv-defensiv, aggressiv-defensiv).","extra":{"definition":"Ein Fragebogen zur Messung von Verhaltensnormen in einer Organisation (konstruktiv, passiv-defensiv, aggressiv-defensiv)."},"hasInfo":true},{"id":58,"cat":"Arbeit","q":"Erkläre das Modell der 'Ressourcenkonservierung' nach Hobfoll.","a":"Menschen erleben Stress, wenn wertvolle Ressourcen (Wissen, Geld, Beziehungen) bedroht sind oder verloren gehen.","a_short":"Menschen erleben Stress, wenn wertvolle Ressourcen (Wissen, Geld, Beziehungen) bedroht sind oder verloren gehen.","extra":{},"hasInfo":false},{"id":59,"cat":"Arbeit","q":"Nenne die drei Ebenen der Organisationskultur nach Schein.","a":"Artefakte, Werte und grundlegende Annahmen.","a_short":"Artefakte, Werte und grundlegende Annahmen.","extra":{},"hasInfo":false},{"id":60,"cat":"Arbeit","q":"Was sind 'Hygienefaktoren' im Kontext der Zwei-Faktoren-Theorie?","a":"Kontextfaktoren wie Lohn oder Arbeitsplatzsicherheit, die Unzufriedenheit verhindern, aber keine echte Zufriedenheit erzeugen.","a_short":"Kontextfaktoren wie Lohn oder Arbeitsplatzsicherheit, die Unzufriedenheit verhindern, aber keine echte Zufriedenheit erzeugen.","extra":{},"hasInfo":false},{"id":61,"cat":"Arbeit","q":"Was beschreibt der Begriff 'Flow' nach Csikszentmihalyi?","a":"Ein Zustand optimaler Aktivierung bei der Bearbeitung einer Aufgabe, die genau den Fähigkeiten entspricht.","a_short":"Ein Zustand optimaler Aktivierung bei der Bearbeitung einer Aufgabe, die genau den Fähigkeiten entspricht.","extra":{"definition":"Ein Zustand optimaler Aktivierung bei der Bearbeitung einer Aufgabe, die genau den Fähigkeiten entspricht."},"hasInfo":true},{"id":62,"cat":"Arbeit","q":"Warum ist Lohn laut wirtschaftspsychologischer Analyse nicht der einzige Grund für Arbeit?","a":"Menschen streben natürlich nach Leistung, Kreativität, sozialer Einbettung und dem Erleben von Selbstwirksamkeit.","a_short":"Menschen streben natürlich nach Leistung, Kreativität, sozialer Einbettung und dem Erleben von Selbstwirksamkeit.","extra":{},"hasInfo":false},{"id":63,"cat":"Arbeit","q":"Was unterscheidet menschliche Organisationen fundamental von biologischen Systemen wie Ameisenhaufen?","a":"Sie folgen keinem fest programmierten Muster und müssen daher aktiv gestaltet werden.","a_short":"Sie folgen keinem fest programmierten Muster und müssen daher aktiv gestaltet werden.","extra":{},"hasInfo":false},{"id":64,"cat":"Arbeit","q":"Warum kann 'Überoptimismus' für Unternehmer ambivalent sein?","a":"Er hilft beim Start, Hürden zu ignorieren, führt aber später oft zu riskanten Fehlentscheidungen.","a_short":"Er hilft beim Start, Hürden zu ignorieren, führt aber später oft zu riskanten Fehlentscheidungen.","extra":{},"hasInfo":false},{"id":65,"cat":"Arbeit","q":"Wie erweitert der 'Work Design Questionnaire' (WDQ) die klassische Arbeitsanalyse?","a":"Er erfasst neben motivationalen Merkmalen auch soziale und kontextuelle Aspekte wie Ergonomie.","a_short":"Er erfasst neben motivationalen Merkmalen auch soziale und kontextuelle Aspekte wie Ergonomie.","extra":{},"hasInfo":false},{"id":66,"cat":"Arbeit","q":"Welches Ziel verfolgt die 'Arbeitsgestaltung'?","a":"Die Optimierung der Arbeit, damit sie produktiv und ohne gesundheitliche Schädigung ausgeführt werden kann.","a_short":"Die Optimierung der Arbeit, damit sie produktiv und ohne gesundheitliche Schädigung ausgeführt werden kann.","extra":{},"hasInfo":false},{"id":67,"cat":"Arbeit","q":"Nenne zwei Risiken von Home-Office für Arbeitnehmer.","a":"Soziale Isolation und Benachteiligung in der betrieblichen Kommunikation.","a_short":"Soziale Isolation und Benachteiligung in der betrieblichen Kommunikation.","extra":{},"hasInfo":false},{"id":68,"cat":"Arbeit","q":"Was beschreibt das 'Organisationsklima'?","a":"Die gemeinsam erlebte Stimmung und die täglichen Umgangsformen in einer Organisation.","a_short":"Die gemeinsam erlebte Stimmung und die täglichen Umgangsformen in einer Organisation.","extra":{"definition":"Die gemeinsam erlebte Stimmung und die täglichen Umgangsformen in einer Organisation."},"hasInfo":true},{"id":69,"cat":"Arbeit","q":"Was ist die Kernidee der 'verhaltensorientierten Führungsansätze'?","a":"Führungserfolg resultiert aus erlernbaren Verhaltensmustern oder Führungsstilen.","a_short":"Führungserfolg resultiert aus erlernbaren Verhaltensmustern oder Führungsstilen.","extra":{"definition":"Führungserfolg resultiert aus erlernbaren Verhaltensmustern oder Führungsstilen."},"hasInfo":true},{"id":70,"cat":"Arbeit","q":"Welche sieben Kriterien definiert die Norm DIN EN ISO 9241 für gut gestaltete Aufgaben?","a":"Benutzerorientierung, Vielseitigkeit, Ganzheitlichkeit, Bedeutsamkeit, Handlungsspielraum, soziale Rückmeldung und Entwicklungsmöglichkeit.","a_short":"Benutzerorientierung, Vielseitigkeit, Ganzheitlichkeit, Bedeutsamkeit, Handlungsspielraum, soziale Rückmeldung und Entwicklungsmöglichkeit.","extra":{},"hasInfo":false},{"id":71,"cat":"Arbeit","q":"Erkläre die Kernaussage der Zwei-Faktoren-Theorie von Herzberg.","a":"Zufriedenheit und Unzufriedenheit sind zwei unabhängige Dimensionen, die durch unterschiedliche Faktoren beeinflusst werden.","a_short":"Zufriedenheit und Unzufriedenheit sind zwei unabhängige Dimensionen, die durch unterschiedliche Faktoren beeinflusst werden.","extra":{},"hasInfo":false},{"id":72,"cat":"Arbeit","q":"Was ist ein 'Incident Reporting-System'?","a":"Ein System zur vertraulichen Meldung gefährlicher Vorfälle, um daraus zu lernen und Unfälle proaktiv zu verhindern.","a_short":"Ein System zur vertraulichen Meldung gefährlicher Vorfälle, um daraus zu lernen und Unfälle proaktiv zu verhindern.","extra":{"definition":"Ein System zur vertraulichen Meldung gefährlicher Vorfälle, um daraus zu lernen und Unfälle proaktiv zu verhindern."},"hasInfo":true},{"id":73,"cat":"Arbeit","q":"Was sind 'Motivatoren' im Kontext der Zwei-Faktoren-Theorie?","a":"Inhaltliche Faktoren wie Anerkennung oder Verantwortung, die direkt die Zufriedenheit erhöhen.","a_short":"Inhaltliche Faktoren wie Anerkennung oder Verantwortung, die direkt die Zufriedenheit erhöhen.","extra":{},"hasInfo":false},{"id":74,"cat":"Arbeit","q":"Definiere 'Organisationskultur'.","a":"Ein System von Regeln, Normen und Werten, das sich über lange Zeit in einer Organisation etabliert hat.","a_short":"Ein System von Regeln, Normen und Werten, das sich über lange Zeit in einer Organisation etabliert hat.","extra":{"definition":"Ein System von Regeln, Normen und Werten, das sich über lange Zeit in einer Organisation etabliert hat."},"hasInfo":true},{"id":75,"cat":"Arbeit","q":"Erkläre das Konzept des 'Job Rotation'.","a":"Mitarbeiter tauschen ihre Aufgaben untereinander für einen bestimmten Zeitraum, um Monotonie vorzubeugen.","a_short":"Mitarbeiter tauschen ihre Aufgaben untereinander für einen bestimmten Zeitraum, um Monotonie vorzubeugen.","extra":{},"hasInfo":false},{"id":76,"cat":"Arbeit","q":"Was versteht man unter 'problembezogenem Coping'?","a":"Die aktive Suche nach Lösungen für Belastungsfaktoren oder die Anpassung des eigenen Arbeitsverhaltens.","a_short":"Die aktive Suche nach Lösungen für Belastungsfaktoren oder die Anpassung des eigenen Arbeitsverhaltens.","extra":{"definition":"Die aktive Suche nach Lösungen für Belastungsfaktoren oder die Anpassung des eigenen Arbeitsverhaltens."},"hasInfo":true},{"id":77,"cat":"Arbeit","q":"Was besagt der 'eigenschaftsorientierte Ansatz' der Führung?","a":"Erfolgreiche Führung hängt primär von stabilen Persönlichkeitsmerkmalen der Führungskraft ab (Great-Man-Theorie).","a_short":"Erfolgreiche Führung hängt primär von stabilen Persönlichkeitsmerkmalen der Führungskraft ab (Great-Man-Theorie).","extra":{},"hasInfo":false},{"id":78,"cat":"Arbeit","q":"Was ist der erste Schritt im 8-Stufen-Modell von Kotter?","a":"Ein Gefühl der Dringlichkeit für den Wandel erzeugen.","a_short":"Ein Gefühl der Dringlichkeit für den Wandel erzeugen.","extra":{"definition":"Ein Gefühl der Dringlichkeit für den Wandel erzeugen."},"hasInfo":true},{"id":79,"cat":"Arbeit","q":"Warum ist 'Strukturwandel' ein Treiber für Selbstmanagement?","a":"Der Übergang zur Dienstleistungsgesellschaft erfordert mehr Eigenverantwortung bei weniger klar strukturierten Aufgaben.","a_short":"Der Übergang zur Dienstleistungsgesellschaft erfordert mehr Eigenverantwortung bei weniger klar strukturierten Aufgaben.","extra":{},"hasInfo":false},{"id":80,"cat":"Arbeit","q":"Unterscheide 'Stressoren' von 'Beanspruchungen'.","a":"Stressoren sind objektive äußere Einflüsse (z. B. Lärm); Beanspruchungen sind die subjektiven Folgen (z. B. Müdigkeit).","a_short":"Stressoren sind objektive äußere Einflüsse (z. B. Lärm); Beanspruchungen sind die subjektiven Folgen (z. B. Müdigkeit).","extra":{"beispiel":"(z. B. Lärm)"},"hasInfo":true},{"id":81,"cat":"Arbeit","q":"Was ist der Unterschied zwischen 'Job Enlargement' und 'Job Enrichment'?","a":"Enlargement erweitert das Aufgabenfeld quantitativ (mehr Aufgaben), Enrichment qualitativ (anspruchsvollere Aufgaben).","a_short":"Enlargement erweitert das Aufgabenfeld quantitativ (mehr Aufgaben), Enrichment qualitativ (anspruchsvollere Aufgaben).","extra":{"definition":"Enlargement erweitert das Aufgabenfeld quantitativ (mehr Aufgaben), Enrichment qualitativ (anspruchsvollere Aufgaben)."},"hasInfo":true},{"id":82,"cat":"Arbeit","q":"Welche Merkmale müssen Ziele nach der Zielsetzungstheorie von Locke und Latham haben?","a":"Sie müssen schwierig (herausfordernd), aber machbar sowie klar spezifiziert sein.","a_short":"Sie müssen schwierig (herausfordernd), aber machbar sowie klar spezifiziert sein.","extra":{},"hasInfo":false},{"id":83,"cat":"Arbeit","q":"Definiere 'Job Crafting'.","a":"Die eigenständige Ausgestaltung und Modellierung der Arbeit durch den Stelleninhaber selbst.","a_short":"Die eigenständige Ausgestaltung und Modellierung der Arbeit durch den Stelleninhaber selbst.","extra":{"definition":"Die eigenständige Ausgestaltung und Modellierung der Arbeit durch den Stelleninhaber selbst."},"hasInfo":true},{"id":84,"cat":"Arbeit","q":"Was besagt die 'Planning Fallacy' (Planungsfehler)?","a":"Die Tendenz, die für eine Aufgabe benötigte Zeit systematisch zu unterschätzen.","a_short":"Die Tendenz, die für eine Aufgabe benötigte Zeit systematisch zu unterschätzen.","extra":{},"hasInfo":false},{"id":85,"cat":"Arbeit","q":"Was ist der Unterschied zwischen Verhaltensprävention und Verhältnisprävention?","a":"Verhaltensprävention setzt beim Individuum an (z. B. Training), Verhältnisprävention bei den Bedingungen (z. B. Ergonomie).","a_short":"Verhaltensprävention setzt beim Individuum an (z. B. Training), Verhältnisprävention bei den Bedingungen (z. B. Ergonomie).","extra":{"beispiel":"(z. B. Training)"},"hasInfo":true},{"id":86,"cat":"Arbeit","q":"Nenne die drei Phasen des Wandels nach Kurt Lewin.","a":"Auflockerung (Unfreezing), Überleitung (Moving) und Verfestigung (Refreezing).","a_short":"Auflockerung (Unfreezing), Überleitung (Moving) und Verfestigung (Refreezing).","extra":{},"hasInfo":false},{"id":87,"cat":"Arbeit","q":"Was ist das Hauptproblem nicht-wissenschaftlicher 'Erfolgsbestseller' zum Selbstmanagement?","a":"Sie basieren oft auf unhaltbaren Heilsversprechen ohne empirische Überprüfung oder theoretische Fundierung.","a_short":"Sie basieren oft auf unhaltbaren Heilsversprechen ohne empirische Überprüfung oder theoretische Fundierung.","extra":{"definition":"Sie basieren oft auf unhaltbaren Heilsversprechen ohne empirische Überprüfung oder theoretische Fundierung."},"hasInfo":true},{"id":88,"cat":"Arbeit","q":"Was ist 'Groupthink'?","a":"Groupthink (Janis, 1972): In stark kohäsiven Gruppen unterdrückt das Streben nach Einmütigkeit abweichende Meinungen und kritisches Denken, was zu fehlerhaften Entscheidungen führt. Nicht zu verwechseln mit Aschs Konformitätsexperiment (Anpassung an eine offensichtlich falsche Mehrheit).","a_short":"Groupthink (Janis, 1972): In stark kohäsiven Gruppen unterdrückt das Streben nach Einmütigkeit abweichende Meinungen und kritisches Denken, was zu fehlerhaften Entscheidungen führt. Nicht zu verwechseln mit Aschs Konformitätsexperiment (Anpassung an eine offensichtlich falsche Mehrheit).","extra":{"definition":"Groupthink (Janis, 1972): In stark kohäsiven Gruppen unterdrückt das Streben nach Einmütigkeit abweichende Meinungen und kritisches Denken, was zu fehlerhaften Entscheidungen führt."},"hasInfo":true},{"id":89,"cat":"Arbeit","q":"Nenne drei psychologische Merkmale, die den Erfolg von Unternehmern begünstigen.","a":"Selbstwirksamkeitserwartung, Leistungsmotivation und Eigeninitiative.","a_short":"Selbstwirksamkeitserwartung, Leistungsmotivation und Eigeninitiative.","extra":{},"hasInfo":false},{"id":90,"cat":"Arbeit","q":"Warum ist Arbeitszufriedenheit für die Gesellschaft stabilisierend?","a":"Sie fördert die Akzeptanz des wirtschaftlichen Systems und reduziert Fehlzeiten sowie Fluktuation.","a_short":"Sie fördert die Akzeptanz des wirtschaftlichen Systems und reduziert Fehlzeiten sowie Fluktuation.","extra":{},"hasInfo":false},{"id":91,"cat":"Arbeit","q":"Nenne die drei Hauptmerkmale von Burnout.","a":"Emotionale Erschöpfung, Depersonalisation (Zynismus) und reduzierte Leistungsfähigkeit.","a_short":"Emotionale Erschöpfung, Depersonalisation (Zynismus) und reduzierte Leistungsfähigkeit.","extra":{},"hasInfo":false},{"id":92,"cat":"Arbeit","q":"Wie wird 'Selbstmanagement' definiert?","a":"Alle Bemühungen einer Person, das eigene Verhalten zielgerichtet zu beeinflussen.","a_short":
