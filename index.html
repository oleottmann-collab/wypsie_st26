<script>
/* ===== DATEN ===== */
const DATA = JSON.parse(document.getElementById('cards-data').textContent);
const BUILD = "2026-06-14 · 267 Karten + Active Recall (28 Lerntexte)";
const CATS = [
 {name:"Grundlagen & Methoden", c:"#f0a23c", icon:"G"},
 {name:"Konsum, Markt & Werbung", c:"#e9b949", icon:"K"},
 {name:"Arbeit", c:"#e0883a", icon:"A"},
 {name:"Organisation", c:"#d7733e", icon:"O"},
 {name:"Personal", c:"#e0654a", icon:"P"},
 {name:"Finanzpsychologie", c:"#f0b429", icon:"F"},
 {name:"Gesellschaft", c:"#cf8a4a", icon:"G"},
 {name:"Gesellschaft II", c:"#d99a55", icon:"II"},
 {name:"Vertiefungen", c:"#dd6f3a", icon:"V"},
];
const catColor = n => (CATS.find(c=>c.name===n)||{}).c || "#5b8cff";

/* ===== ZUSTAND (Spaced Repetition, localStorage) ===== */
const LS_KEY="wipsy_sr_v2";
const DAY=86400000;
let STATE=load();
function load(){ try{return JSON.parse(localStorage.getItem(LS_KEY))||{};}catch(e){return {};} }
function save(){ try{localStorage.setItem(LS_KEY,JSON.stringify(STATE));}catch(e){} }
function cs(id){ if(!STATE[id]) STATE[id]={box:0,due:0,reps:0,lapses:0,w:0,s:0,m:0,e:0}; return STATE[id]; }
function isDue(id){ const s=STATE[id]; if(!s||s.reps===0) return true; return s.due<=Date.now(); }
function isLearned(id){ const s=STATE[id]; return !!s && s.reps>0; }
function intervalForBox(b){ const map={1:1,2:2,3:4,4:8,5:16}; return (map[b]||32)*DAY; }
function applyRating(id,g){
  const s=cs(id); s.reps++; s[g]=(s[g]||0)+1;
  if(g==='w'){ s.box=0; s.due=Date.now(); s.lapses++; }
  else{
    if(g==='s') s.box=Math.max(1,s.box);
    else if(g==='m') s.box=s.box+1;
    else s.box=s.box+2;
    if(s.box>6) s.box=6;
    s.due=Date.now()+intervalForBox(s.box);
  }
  save();
}

/* ===== STATISTIK ===== */
function statsFor(list){
  let learned=0,open=0,due=0,corr=0,total=0;
  for(const card of list){
    const id=card.id, s=STATE[id];
    if(isLearned(id)) learned++; else open++;
    if(isDue(id)) due++;
    if(s){ const r=(s.s||0)+(s.m||0)+(s.e||0); corr+=r; total+=r+(s.w||0); }
  }
  const quote = total>0 ? Math.round(corr/total*100) : null;
  return {n:list.length,learned,open,due,quote,total};
}
const byCat = name => DATA.filter(c=>c.cat===name);

/* ===== VIEWS ===== */
const V={home:document.getElementById('viewHome'),study:document.getElementById('viewStudy'),stats:document.getElementById('viewStats'),ar:document.getElementById('viewAR')};
function show(v){ for(const k in V) V[k].classList.toggle('hidden',k!==v); window.scrollTo(0,0); }

function renderHead(){
  const g=statsFor(DATA);
  document.getElementById('headStats').innerHTML=
    `<span class="chip">Gelernt <b>${g.learned}</b>/${g.n}</span>`+
    `<span class="chip">Heute fällig <b>${g.due}</b></span>`+
    `<span class="chip">Erfolgsquote <b>${g.quote===null?'–':g.quote+'%'}</b></span>`;
}

function renderHome(){
  renderHead();
  const g=statsFor(DATA);
  document.getElementById('homeSub').textContent=
    `${DATA.length} Karten in ${CATS.length} Kategorien • Klausur 22.07.2026 • ${g.due} Karten jetzt fällig`;
  const grid=document.getElementById('catGrid'); grid.innerHTML='';
  for(const cat of CATS){
    const list=byCat(cat.name); if(!list.length) continue;
    const s=statsFor(list);
    const pct = s.n? Math.round(s.learned/s.n*100):0;
    const el=document.createElement('button');
    el.className='cat'; el.style.setProperty('--cc',cat.c);
    el.innerHTML=`<span class="bar-top"></span>
      <h3><span class="ico">${cat.icon}</span>${cat.name}</h3>
      <div class="cnt">${s.n} Karten · <span class="due">${s.due} fällig</span></div>
      <div class="prog"><i style="width:${pct}%"></i></div>
      <div class="pct"><span>${s.learned} gelernt · ${s.open} offen</span><span>${pct}%</span></div>`;
    el.onclick=()=>startSession(cat.name);
    grid.appendChild(el);
  }
  document.getElementById('homeFoot').innerHTML=
    `Eine Datei, keine Installation, keine Internetverbindung nötig. Fortschritt wird lokal gespeichert.<br>Build ${BUILD}`;
}

/* ===== STUDY SESSION ===== */
let SESS=null;
function buildQueue(catName){
  let pool = catName? byCat(catName) : DATA.slice();
  const all=document.getElementById('allMode').checked;
  let q = all ? pool.slice() : pool.filter(c=>isDue(c.id));
  // due/new first already; shuffle for variety
  for(let i=q.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[q[i],q[j]]=[q[j],q[i]];}
  return q;
}
function startSession(catName){
  const q=buildQueue(catName);
  SESS={cat:catName,queue:q.map(c=>c.id),total:q.length,done:0,revealed:false,showInfo:false};
  document.getElementById('studyName').textContent=catName||'Alle Kategorien';
  show('study'); renderCard();
}
function startAllDue(){ startSession(null); }

function renderSessBar(){
  const pct=SESS.total? Math.round(SESS.done/SESS.total*100):0;
  document.getElementById('sessFill').style.width=pct+'%';
  document.getElementById('sessCount').textContent=`${SESS.done} / ${SESS.total}`;
}
function renderCard(){
  renderSessBar();
  const body=document.getElementById('studyBody');
  if(!SESS.queue.length){ return renderDone(); }
  const id=SESS.queue[0];
  const card=DATA.find(c=>c.id===id);
  const cc=catColor(card.cat);
  const hasInfo=card.hasInfo;
  body.style.setProperty('--cc',cc);
  let html=`<div class="card" style="--cc:${cc}">
    <div class="tagrow"><span class="tag">${card.cat}</span>
      <button class="infobtn" id="infoBtn" ${hasInfo?'':'disabled'} title="Zusatzwissen (i)">i</button></div>
    <div class="qlabel">Frage</div>
    <div class="frage">${esc(card.q)}</div>`;
  if(SESS.revealed){
    html+=`<div class="divider"></div><div class="alabel">Antwort</div>
      <div class="antwort">${esc(card.a_short||card.a)}</div>`;
    if(SESS.showInfo && hasInfo) html+=zusatzHTML(card);
    html+=`<div class="actions">
      <button class="rate again" data-g="w">Wiederholen<small>1</small></button>
      <button class="rate hard" data-g="s">Schwer<small>2</small></button>
      <button class="rate mid" data-g="m">Mittel<small>3</small></button>
      <button class="rate easy" data-g="e">Einfach<small>4</small></button></div>`;
  }else{
    html+=`<div class="reveal-hint">Tippen oder Leertaste, um die Antwort zu zeigen</div>`;
  }
  html+=`</div>`;
  body.innerHTML=html;

  if(!SESS.revealed){
    body.querySelector('.card').onclick=(e)=>{ if(e.target.id==='infoBtn')return; reveal(); };
  }
  const ib=document.getElementById('infoBtn');
  if(ib && hasInfo) ib.onclick=(e)=>{e.stopPropagation(); SESS.showInfo=!SESS.showInfo; if(!SESS.revealed)reveal(); else renderCard();};
  body.querySelectorAll('.rate').forEach(b=> b.onclick=()=>rate(b.dataset.g));
}
function zusatzHTML(card){
  const x=card.extra||{}; let h=`<div class="zusatz">`;
  const f=(cls,label,key)=> x[key]?`<div class="zfield"><div class="zk ${cls}">${label}</div><div class="zv">${esc(x[key])}</div></div>`:'';
  h+=f('def','Definition','definition');
  h+=f('erk','Erklärung','erklaerung');
  h+=f('bsp','Beispiel','beispiel');
  h+=f('merk','Merkhilfe','merkhilfe');
  h+=f('qz','Quelle / Klausurhinweis','quelle');
  h+=`</div>`; return h;
}
function reveal(){ if(SESS.revealed)return; SESS.revealed=true; renderCard(); }
function rate(g){
  const id=SESS.queue.shift();
  applyRating(id,g);
  if(g==='w'){ const pos=Math.min(SESS.queue.length,4); SESS.queue.splice(pos,0,id); }
  else { SESS.done++; }
  SESS.revealed=false; SESS.showInfo=false;
  renderCard(); renderHead();
}
function renderDone(){
  const list = SESS.cat? byCat(SESS.cat):DATA;
  const s=statsFor(list);
  document.getElementById('studyBody').innerHTML=
   `<div class="panel"><div class="big">✓</div><h2>Runde geschafft</h2>
    <p>${SESS.cat||'Alle Kategorien'} · ${SESS.total} Karten in dieser Sitzung bearbeitet.</p>
    <div class="statline">
      <div><div class="n">${s.learned}</div><div class="l">gelernt</div></div>
      <div><div class="n">${s.open}</div><div class="l">offen</div></div>
      <div><div class="n">${s.quote===null?'–':s.quote+'%'}</div><div class="l">Erfolgsquote</div></div>
      <div><div class="n">${s.due}</div><div class="l">noch fällig</div></div>
    </div>
    <button class="bigbtn" id="againBtn">Weiter lernen</button>
    <div style="margin-top:12px"><button class="btn ghost" id="homeBtn2">Zur Startseite</button></div></div>`;
  document.getElementById('againBtn').onclick=()=>startSession(SESS.cat);
  document.getElementById('homeBtn2').onclick=()=>{renderHome();show('home');};
}

/* ===== STATS VIEW ===== */
function renderStats(){
  const g=statsFor(DATA);
  document.getElementById('kpiBox').innerHTML=
   `<div class="kpibox"><div class="n">${g.learned}</div><div class="l">Karten gelernt</div></div>
    <div class="kpibox"><div class="n">${g.open}</div><div class="l">Karten offen</div></div>
    <div class="kpibox"><div class="n">${g.quote===null?'–':g.quote+'%'}</div><div class="l">Erfolgsquote</div></div>
    <div class="kpibox"><div class="n">${g.due}</div><div class="l">heute fällig</div></div>`;
  const grid=document.getElementById('statsGrid'); grid.innerHTML='';
  for(const cat of CATS){
    const list=byCat(cat.name); if(!list.length) continue;
    const s=statsFor(list);
    const el=document.createElement('div'); el.className='scard';
    el.innerHTML=`<h4><span class="cat-ico" style="color:${cat.c}">●</span>${cat.name}</h4>
      <div class="line"><span>Gelernt</span><b>${s.learned} / ${s.n}</b></div>
      <div class="line"><span>Offen</span><b>${s.open}</b></div>
      <div class="line"><span>Heute fällig</span><b>${s.due}</b></div>
      <div class="line"><span>Erfolgsquote</span><b>${s.quote===null?'–':s.quote+'%'}</b></div>
      <div class="prog" style="--cc:${cat.c};margin-top:9px"><i style="width:${s.n?Math.round(s.learned/s.n*100):0}%;background:${cat.c}"></i></div>`;
    grid.appendChild(el);
  }
  document.getElementById('statsFoot').innerHTML=
    `Erfolgsquote = Anteil der Bewertungen „Schwer/Mittel/Einfach" an allen Bewertungen (Gegenstück: „Wiederholen").`;
}

/* ===== HELFER ===== */
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ===== NAV / EVENTS ===== */
document.getElementById('navHome').onclick=()=>{renderHome();show('home');};
document.getElementById('navStats').onclick=()=>{renderStats();show('stats');};
document.getElementById('navAR').onclick=()=>{stopTimerClock();renderARHome();};
document.getElementById('exitStudy').onclick=()=>{renderHome();show('home');};
document.getElementById('studyAllDue').onclick=startAllDue;
document.getElementById('resetBtn').onclick=()=>{
  if(confirm('Gesamten Lernfortschritt wirklich löschen? Das kann nicht rückgängig gemacht werden.')){
    STATE={}; save(); renderStats(); renderHead();
  }
};
document.addEventListener('keydown',e=>{
  if(V.study.classList.contains('hidden'))return;
  if(!SESS||!SESS.queue.length)return;
  if(e.code==='Space'){e.preventDefault(); if(!SESS.revealed)reveal();}
  else if(e.key==='i'||e.key==='I'){const c=DATA.find(x=>x.id===SESS.queue[0]); if(c&&c.hasInfo){SESS.showInfo=!SESS.showInfo; if(!SESS.revealed)reveal(); else renderCard();}}
  else if(SESS.revealed && ['1','2','3','4'].includes(e.key)){rate({'1':'w','2':'s','3':'m','4':'e'}[e.key]);}
});

/* ===== ACTIVE RECALL (Blurting) ===== */
const AR = JSON.parse(document.getElementById('ar-data').textContent);
const AR_KEY = "wipsy_ar_v1";
let ARST = (()=>{ try{return JSON.parse(localStorage.getItem(AR_KEY))||{};}catch(e){return{};} })();
function arSave(){ try{localStorage.setItem(AR_KEY,JSON.stringify(ARST));}catch(e){} }
function arRes(bi,ti){ return (ARST[bi]&&ARST[bi][ti])||null; }
function arSetRes(bi,ti,o){ if(!ARST[bi])ARST[bi]={}; ARST[bi][ti]=o; arSave(); }

function arNorm(s){ return (s||'').normalize('NFKD').replace(/[\u0300-\u036f]/g,'').toLowerCase(); }
function arAuto(text,r){
  const t=arNorm(text); let hit=0;
  for(const term of r.terms){ if(term && term.length>=3 && t.includes(arNorm(term))) hit++; }
  if(!hit) return 'red';
  return (hit/r.terms.length>=0.5)?'green':'yellow';
}
const AR_W={green:1,yellow:0.5,red:0};
function arQuote(raster,states){
  let got=0,max=0;
  raster.forEach((r,i)=>{ max+=r.gew; got+=r.gew*AR_W[states[i]]; });
  return max?Math.round(got/max*100):0;
}
function arNiveau(q){
  if(q>=85) return {l:'Sehr gut bis Klausurniveau',b:'green'};
  if(q>=70) return {l:'Gutes Niveau',b:'yellow'};
  if(q>=50) return {l:'Mindestniveau bestanden',b:'yellow'};
  return {l:'Erneut lesen',b:'red'};
}

/* Timer */
let arTimerInt=null, arTimerStart=null;
function arFmt(s){ return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
function updTimer(){ const el=document.getElementById('arTimer'); if(!el||arTimerStart==null)return;
  el.textContent=arFmt(Math.floor((Date.now()-arTimerStart)/1000)); }
function startTimerClock(){ if(arTimerInt)clearInterval(arTimerInt); arTimerInt=setInterval(updTimer,1000); updTimer(); }
function stopTimerClock(){ if(arTimerInt){clearInterval(arTimerInt);arTimerInt=null;} }

/* Entwurfstexte je Teil (bleiben beim Hin- und Herwechseln erhalten) */
const arDraft={};
const dkey=(bi,ti)=>bi+'_'+ti;
let ARSESS=null;
const arBody=()=>document.getElementById('arBody');
const arShort=lbl=>lbl.split('·')[0].trim();

/* Uebersicht aller Bloecke */
function renderARHome(){
  stopTimerClock(); arTimerStart=null; show('ar');
  let h=`<h1 class="page">Active Recall · Blurting</h1>
   <p class="sub">Lies einen Lerntext, blende ihn aus und schreibe aus dem Gedaechtnis alles auf, woran du dich erinnerst. Danach gleichst du gegen das Bewertungsraster ab: Erinnerungsquote, Ampel und gezielt die Luecken.</p>
   <div class="grid">`;
  AR.forEach((b,bi)=>{
    const done=b.teile.filter((t,ti)=>arRes(bi,ti)).length;
    let best=null; b.teile.forEach((t,ti)=>{const r=arRes(bi,ti); if(r&&(best===null||r.quote>best))best=r.quote;});
    h+=`<button class="cat ar-block" style="--cc:${b.color}" data-bi="${bi}"><span class="bar-top"></span>
      <h3><span class="ico">AR</span>${esc(b.label)}</h3>
      <div class="cnt">${b.teile.length} Lerntexte · <span class="due">${done} bearbeitet</span></div>
      <div class="pct"><span>${best===null?'noch nicht getestet':'beste Quote '+best+'%'}</span><span>${best===null?'':best+'%'}</span></div></button>`;
  });
  h+=`</div><footer>Active Recall ergaenzt die Karteikarten. Auswertung laeuft vollstaendig offline ueber einen gewichteten Stichwort-Abgleich gegen das Bewertungsraster. Fortschritt wird lokal gespeichert.</footer>`;
  arBody().innerHTML=h;
  arBody().querySelectorAll('.ar-block').forEach(b=>b.onclick=()=>openARBlock(+b.dataset.bi));
}

/* Teile eines Blocks */
function openARBlock(bi){
  stopTimerClock(); arTimerStart=null; const b=AR[bi]; show('ar');
  let h=`<div class="study-top"><button class="btn sm" id="arBack">← Uebersicht</button><span class="name">${esc(b.label)}</span></div>
    <div class="ar-teile">`;
  b.teile.forEach((t,ti)=>{
    const r=arRes(bi,ti); const amp=r?arNiveau(r.quote).b:'';
    h+=`<div class="ar-teil" style="--cc:${b.color}"><div class="ar-teil-main">
        <div class="ar-teil-title">Teil ${ti+1}: ${esc(t.title)}</div>
        <div class="ar-teil-meta">${t.raster.length} Konzepte · Lesezeit ${esc(t.lesezeit||'kurz')}${r?` · <span class="amp ${amp}">letzte Quote ${r.quote}%</span>`:''}</div></div>
      <div class="ar-teil-actions">
        <button class="btn sm primary" data-ti="${ti}" data-act="read">Lerntext lesen</button>
        <button class="btn sm" data-ti="${ti}" data-act="blurt">Direkt blurten</button></div></div>`;
  });
  h+=`</div>`;
  arBody().innerHTML=h;
  document.getElementById('arBack').onclick=renderARHome;
  arBody().querySelectorAll('button[data-act]').forEach(btn=>btn.onclick=()=>{
    const ti=+btn.dataset.ti;
    if(btn.dataset.act==='read') openLerntext(bi,ti); else startBlurt(bi,ti);
  });
}

/* Lerntext anzeigen (Lesephase) */
function lerntextHTML(t){
  let h=`<div class="lerntext">`;
  if(t.lernziel) h+=`<div class="lz"><b>Lernziel:</b> ${esc(t.lernziel)}</div>`;
  if(t.konzepte) h+=`<div class="lz"><b>Behandelte Konzepte:</b> ${esc(t.konzepte)}</div>`;
  t.sections.forEach(s=>{ if(s.h)h+=`<h4>${esc(s.h)}</h4>`; (s.body||[]).forEach(p=>h+=`<p>${esc(p)}</p>`); });
  return h+`</div>`;
}
function openLerntext(bi,ti){
  stopTimerClock(); arTimerStart=null; const b=AR[bi],t=b.teile[ti]; show('ar');
  let h=`<div class="study-top"><button class="btn sm" id="arBack">← ${esc(arShort(b.label))}</button><span class="name">Teil ${ti+1}: ${esc(t.title)}</span></div>`;
  h+=lerntextHTML(t);
  h+=`<div class="ar-controls"><span class="timer hidden" id="arTimer">00:00</span><div class="spacer"></div>
      <button class="btn" id="arTimerBtn">Timer starten</button>
      <button class="btn primary" id="arHideBtn">Text ausblenden und schreiben</button></div>`;
  arBody().innerHTML=h;
  document.getElementById('arBack').onclick=()=>openARBlock(bi);
  document.getElementById('arTimerBtn').onclick=()=>{
    if(arTimerStart==null)arTimerStart=Date.now();
    document.getElementById('arTimer').classList.remove('hidden');
    document.getElementById('arTimerBtn').classList.add('hidden');
    startTimerClock();
  };
  document.getElementById('arHideBtn').onclick=()=>startBlurt(bi,ti);
  window.scrollTo(0,0);
}

/* Schreibphase */
function startBlurt(bi,ti){
  const b=AR[bi],t=b.teile[ti]; show('ar');
  if(arTimerStart==null)arTimerStart=Date.now();
  const draft=arDraft[dkey(bi,ti)]||'';
  let h=`<div class="study-top"><button class="btn sm" id="arBack">← ${esc(arShort(b.label))}</button><span class="name">Blurting · Teil ${ti+1}</span><div class="spacer"></div><span class="timer" id="arTimer">00:00</span></div>`;
  h+=`<div class="recall-area">
      <div class="recall-hint">Schreibe frei aus dem Gedaechtnis. ${t.raster.length} Konzepte stecken im Raster. Nutze ganze Saetze mit Begriffen, Zusammenhaengen und Beispielen.</div>
      <textarea id="arInput" placeholder="Alles, woran du dich erinnerst ...">${esc(draft)}</textarea></div>`;
  h+=`<div class="ar-controls"><button class="btn ghost" id="arShowText">Lerntext nochmal zeigen</button><div class="spacer"></div>
      <button class="btn primary" id="arEval">Auswertung</button></div>`;
  arBody().innerHTML=h;
  startTimerClock();
  const ta=document.getElementById('arInput'); ta.focus();
  ta.oninput=()=>{ arDraft[dkey(bi,ti)]=ta.value; };
  document.getElementById('arBack').onclick=()=>{ stopTimerClock(); openARBlock(bi); };
  document.getElementById('arShowText').onclick=()=>openLerntextKeep(bi,ti);
  document.getElementById('arEval').onclick=()=>{ stopTimerClock(); evaluateBlurt(bi,ti); };
  window.scrollTo(0,0);
}
/* Lerntext aus der Schreibphase nochmal zeigen, Timer und Entwurf bleiben */
function openLerntextKeep(bi,ti){
  const b=AR[bi],t=b.teile[ti]; show('ar');
  let h=`<div class="study-top"><button class="btn sm" id="arBack">← zurueck zum Schreiben</button><span class="name">Teil ${ti+1}: ${esc(t.title)}</span><div class="spacer"></div><span class="timer" id="arTimer">00:00</span></div>`;
  h+=lerntextHTML(t);
  h+=`<div class="ar-controls"><div class="spacer"></div><button class="btn primary" id="arHideBtn">Weiter schreiben</button></div>`;
  arBody().innerHTML=h;
  startTimerClock();
  document.getElementById('arBack').onclick=()=>startBlurt(bi,ti);
  document.getElementById('arHideBtn').onclick=()=>startBlurt(bi,ti);
  window.scrollTo(0,0);
}

/* Auswertung */
function evaluateBlurt(bi,ti){
  const t=AR[bi].teile[ti];
  const txt=arDraft[dkey(bi,ti)]||'';
  const states=t.raster.map(r=>arAuto(txt,r));
  const elapsed=arTimerStart!=null?Math.floor((Date.now()-arTimerStart)/1000):null;
  ARSESS={bi,ti,states,elapsed};
  renderResults();
}
function arRC(b){ return b==='green'?'var(--good)':b==='yellow'?'var(--mid)':'var(--again)'; }

function renderResults(){
  const {bi,ti,states,elapsed}=ARSESS;
  const b=AR[bi],t=b.teile[ti],R=t.raster;
  const q=arQuote(R,states), nv=arNiveau(q), rc=arRC(nv.b);
  const cnt={green:0,yellow:0,red:0}; states.forEach(s=>cnt[s]++);
  arSetRes(bi,ti,{quote:q,niveau:nv.l,ts:Date.now()});
  const tstr=elapsed!=null?` · ${Math.floor(elapsed/60)} min ${elapsed%60} s`:'';
  show('ar');
  let h=`<div class="study-top"><button class="btn sm" id="arBack">← ${esc(arShort(b.label))}</button><span class="name">Auswertung · Teil ${ti+1}</span></div>`;
  h+=`<div class="res-top">
    <div class="ring" style="--p:${q};--rc:${rc}"><i><b id="qNum">${q}%</b><small>Erinnerung</small></i></div>
    <div class="res-meta"><div class="niv" id="nivTxt" style="color:${rc}">${nv.l}</div>
      <div class="sub2">${esc(t.title)} ${tstr}</div>
      <div class="res-counts">
        <span class="dotg">● <b id="cG">${cnt.green}</b> erinnert</span>
        <span class="doty">● <b id="cY">${cnt.yellow}</b> angerissen</span>
        <span class="dotr">● <b id="cR">${cnt.red}</b> fehlt</span></div>
      <div class="sub2" style="margin-top:9px">Der Abgleich erkennt Stichwoerter, nicht den Sinn. Pruefe unten jedes Konzept und korrigiere die Ampel. Die Quote rechnet live mit.</div>
    </div></div>`;
  h+=`<div class="miss-grid" id="missGrid"></div>`;
  if(t.fehler&&t.fehler.length){
    h+=`<div class="fehler-list"><h4>Typische Fehler in diesem Teil</h4><ul>`;
    t.fehler.forEach(f=>h+=`<li>${esc(f)}</li>`); h+=`</ul></div>`;
  }
  h+=`<div class="sec-h">Alle Konzepte · Einschaetzung anpassen</div><div class="concept-list" id="cList"></div>`;
  h+=`<div class="res-actions">
    <button class="btn primary" id="relearnBtn">Nur fehlende Inhalte erneut lernen</button>
    <button class="btn" id="reReadBtn">Lerntext erneut lesen</button>
    <button class="btn" id="reBlurtBtn">Nochmal blurten</button>
    <button class="btn ghost" id="arBack2">Zur Blockuebersicht</button></div>`;
  arBody().innerHTML=h;
  renderConceptList(); renderMissGroups();
  document.getElementById('arBack').onclick=()=>openARBlock(bi);
  document.getElementById('arBack2').onclick=()=>openARBlock(bi);
  document.getElementById('relearnBtn').onclick=renderRelearn;
  document.getElementById('reReadBtn').onclick=()=>{ arTimerStart=null; openLerntext(bi,ti); };
  document.getElementById('reBlurtBtn').onclick=()=>{ arDraft[dkey(bi,ti)]=''; arTimerStart=null; startBlurt(bi,ti); };
  window.scrollTo(0,0);
}

function renderConceptList(){
  const {bi,ti,states}=ARSESS; const R=AR[bi].teile[ti].raster;
  const el=document.getElementById('cList'); el.innerHTML='';
  R.forEach((r,i)=>{
    const row=document.createElement('div'); row.className='concept-row '+states[i];
    const k=r.ktag?`<span class="kbadge">[${r.ktag}]</span>`:'';
    row.innerHTML=`<div class="cr-main"><div class="cr-top"><span class="kat">${r.kat}</span><span class="cr-begriff">${esc(r.begriff)}</span>${k}<span class="gw">${r.gew} P.</span></div>
      <div class="cr-warum">${esc(r.warum)}</div></div>
      <div class="seg" data-i="${i}">
        <button class="g${states[i]==='green'?' on':''}" data-s="green">Erinnert</button>
        <button class="y${states[i]==='yellow'?' on':''}" data-s="yellow">Angerissen</button>
        <button class="r${states[i]==='red'?' on':''}" data-s="red">Fehlt</button></div>`;
    el.appendChild(row);
  });
  el.querySelectorAll('.seg').forEach(seg=>seg.querySelectorAll('button').forEach(btn=>btn.onclick=()=>{
    ARSESS.states[+seg.dataset.i]=btn.dataset.s; recomputeRes();
  }));
}

function recomputeRes(){
  const {bi,ti,states}=ARSESS; const R=AR[bi].teile[ti].raster;
  const q=arQuote(R,states), nv=arNiveau(q), rc=arRC(nv.b);
  document.getElementById('qNum').textContent=q+'%';
  const ring=document.querySelector('.ring'); ring.style.setProperty('--p',q); ring.style.setProperty('--rc',rc);
  const nt=document.getElementById('nivTxt'); nt.textContent=nv.l; nt.style.color=rc;
  const cnt={green:0,yellow:0,red:0}; states.forEach(s=>cnt[s]++);
  document.getElementById('cG').textContent=cnt.green;
  document.getElementById('cY').textContent=cnt.yellow;
  document.getElementById('cR').textContent=cnt.red;
  document.querySelectorAll('#cList .concept-row').forEach((row,i)=>{
    row.className='concept-row '+states[i];
    row.querySelectorAll('.seg button').forEach(btn=>btn.classList.toggle('on',btn.dataset.s===states[i]));
  });
  renderMissGroups();
  arSetRes(bi,ti,{quote:q,niveau:nv.l,ts:Date.now()});
}

function renderMissGroups(){
  const {bi,ti,states}=ARSESS; const R=AR[bi].teile[ti].raster;
  const g={PB:[],PK:[],PZ:[],KLA:[]};
  R.forEach((r,i)=>{ if(states[i]!=='red')return;
    if(r.kat==='KD'||r.ktag) g.KLA.push(r);
    if(r.kat==='PB') g.PB.push(r); else if(r.kat==='PK') g.PK.push(r); else if(r.kat==='PZ') g.PZ.push(r);
  });
  const card=(title,arr,kl)=>{
    let h=`<div class="miss-card${kl?' klausur':''}"><h4>${title} <span class="gw">(${arr.length})</span></h4>`;
    if(!arr.length) h+=`<div class="none">● alles erinnert</div>`;
    else { h+=`<ul>`; arr.forEach(r=>h+=`<li>${esc(r.begriff)}${r.ktag?`<span class="kbadge">[${r.ktag}]</span>`:''}</li>`); h+=`</ul>`; }
    return h+`</div>`;
  };
  document.getElementById('missGrid').innerHTML=
    card('Fehlende Schluesselbegriffe',g.PB,false)+
    card('Fehlende Konzepte',g.PK,false)+
    card('Fehlende Zusammenhaenge',g.PZ,false)+
    card('Klausurrelevante Luecken',g.KLA,true);
}

function renderRelearn(){
  const {bi,ti,states}=ARSESS; const b=AR[bi],t=b.teile[ti],R=t.raster;
  const miss=R.map((r,i)=>({r,st:states[i]})).filter(x=>x.st!=='green');
  let h=`<div class="study-top"><button class="btn sm" id="arBack">← Auswertung</button><span class="name">Erneut lernen · Teil ${ti+1}</span></div>`;
  if(!miss.length){
    h+=`<div class="panel"><div class="big">✓</div><h2>Nichts offen</h2><p>Du hast alle Konzepte dieses Teils erinnert.</p></div>`;
  } else {
    h+=`<p class="sub">${miss.length} Konzepte sind noch offen (gelb oder rot). Lies sie gezielt, dann blurte erneut.</p><div class="concept-list">`;
    miss.forEach(({r,st})=>{
      h+=`<div class="concept-row ${st}"><div class="cr-main"><div class="cr-top"><span class="kat">${r.kat}</span><span class="cr-begriff">${esc(r.begriff)}</span>${r.ktag?`<span class="kbadge">[${r.ktag}]</span>`:''}<span class="gw">${r.gew} P.</span></div><div class="cr-warum">${esc(r.warum)}</div></div></div>`;
    });
    h+=`</div>`;
  }
  h+=`<div class="res-actions"><button class="btn primary" id="reReadBtn">Ganzen Lerntext lesen</button><button class="btn" id="reBlurtBtn">Erneut blurten</button><button class="btn ghost" id="backRes">Zurueck zur Auswertung</button></div>`;
  arBody().innerHTML=h;
  document.getElementById('arBack').onclick=renderResults;
  document.getElementById('backRes').onclick=renderResults;
  document.getElementById('reReadBtn').onclick=()=>{ arTimerStart=null; openLerntext(bi,ti); };
  document.getElementById('reBlurtBtn').onclick=()=>{ arDraft[dkey(bi,ti)]=''; arTimerStart=null; startBlurt(bi,ti); };
  window.scrollTo(0,0);
}

/* ===== START ===== */
renderHome(); show('home');
</script>
