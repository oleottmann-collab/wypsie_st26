      "h": "Gruppenarbeit: Regelfall, nicht Wundermittel",
      "body": [
       "Der Mensch ist seit jeher ein soziales Wesen, und genau genommen ist die isolierte Einzelarbeit der Sonderfall, ein Erbe der Industrialisierung, die Arbeit in kleinste, monoton abzuleistende Teile zerlegte. Die Wiederentdeckung der Gruppenarbeit begann mit den Hawthorne-Studien und mit Untersuchungen des Tavistock-Instituts, die zeigten, dass Arbeitsgruppen zufriedener, sicherer und effizienter waren. Daraus entstand die Sicht der Arbeit als soziotechnisches System, in dem technische und soziale Faktoren zusammenwirken, und es folgte ein regelrechter Hype um teilautonome Arbeitsgruppen, den Kritiker später als Managementmode verspotteten.",
       "Heute sieht man es nüchterner: In der Produktion ist Gruppenarbeit der Einzelarbeit überlegen, sofern die Voraussetzungen stimmen, in Management und Verwaltung ist sie umstritten. Um zu verstehen, warum, teilt man Vor- und Nachteile in zwei Bereiche. Bei der Informationsverarbeitung kann eine Gruppe mehr Wissen aufnehmen, aber das Wissen kann auch verpuffen, berühmtes Beispiel ist das Brainstorming, bei dem die Gruppe oft schlechter ist als die Summe der Einzelnen. Manchmal verhindert die Gruppe sogar die richtige Lösung, denn wenn nur eine Person sie kennt, setzt sie sich meist nicht durch. Im Extremfall kippt das in Gruppendenken, also die nachteilige Anpassung der eigenen Meinung an die erwartete Gruppenmeinung, begünstigt durch Abschottung, Homogenität und das Streben nach Einmütigkeit.",
       "Bei der Motivation ist die Bilanz ähnlich zwiespältig. Gruppenarbeit macht oft mehr Spaß und befriedigt soziale Bedürfnisse, aber es drohen drei Motivationsverluste, die du genau auseinanderhalten musst. Trittbrettfahren ist das bewusste Sich-weniger-Anstrengen. Soziales Faulenzen ist der unbewusste Leistungsabfall, einfach weil andere da sind. Der Sucker-Effect ist subtiler: Wer glaubt, andere seien Trittbrettfahrer, senkt die eigene Leistung, um nicht der Dumme zu sein, der ausgebeutet wird. Bei komplexen Aufgaben gilt eine Gruppe von etwa fünf Personen als günstig, weil sich die Beiträge dann gut abstimmen lassen.",
       "Daraus folgt eine ernüchternde Einsicht, die Allen und Hecht als Romantik des Teams bezeichnet haben: Die Leistungsfähigkeit von Teams wird oft sozialromantisch überhöht, der wahre Nutzen ist häufig sozio-emotional, nicht leistungsbezogen, und gerade in Verwaltung und Management werden zu oft Teams gebildet. Das heißt nicht, dass Teams schlecht sind, aber sie sind kein Selbstläufer. Man kann nachhelfen, über Teamdesign, also die kluge Zusammensetzung, und über Teambuilding, also die Entwicklung durch Gespräche und gemeinsame Aktivitäten. Eine zufällig zusammenarbeitende Gruppe ist eben noch kein Team.",

      "h": "Unternehmertum: keine Gene, aber Verzerrungen",

       "Wechseln wir die Perspektive vom Team zur einzelnen Unternehmerin. Zuerst die Begriffe: Unternehmertum bezeichnet die Einstellung, innovativ und ökonomisch klug neue Geschäftsmöglichkeiten zu finden und zu nutzen, Selbstständigkeit dagegen den unabhängigen Erwerbsstatus. Beide gehen oft Hand in Hand. Die alte Frage, ob es eine angeborene Unternehmerpersönlichkeit gibt, wurde lange verneint, und auch heute gilt: Die Big Five allein genügen nicht. Metaanalysen von Frese und Gielnik zeigen aber eine Reihe begünstigender Merkmale, etwa Selbstwirksamkeit, Leistungsmotivation, Eigeninitiative, Stresstoleranz und eine internale Kontrollüberzeugung.",
       "Statt nur auf Eigenschaften zu schauen, lohnt sich der Blick auf drei unternehmerische Konzepte. Unternehmerische Findigkeit ist die Fähigkeit, Chancen zu entdecken, ohne gezielt gesucht zu haben, sie hängt von Kreativität und Intelligenz ab. Unternehmerische Orientierung ist ein Stück Unternehmenskultur, nämlich autonomes, proaktives und innovatives Handeln mit Risikofreude. Und der Business Plan ist nur scheinbar unpsychologisch, denn aktive Handlungsplanung hängt positiv mit Erfolg zusammen, allerdings nur, wenn der Gründer ihn selbst aufstellt und nicht ein Berater.",

      "h": "Selbstmanagement: gegen die eigene Zeitblindheit",
      "body": [
       "Die moderne Arbeitswelt gibt uns mehr Freiheit und Autonomie, aber die Kehrseite ist, dass wir uns immer öfter selbst führen müssen, statt Anweisungen zu folgen. Selbstmanagement ist definiert als alle Bemühungen, das eigene Verhalten zielgerichtet zu beeinflussen, mit Schwerpunkt auf dem Umgang mit Zeit. Es ruht, anders als viele Ratgeber, auf der Lerntheorie und der kognitiven Verhaltenstherapie. Praktisch läuft es so ab, dass man zuerst das Problem konkret identifiziert, sein Verhalten beobachtet, dann ein Ziel definiert, das nach der Zielsetzungstheorie SMART sein sollte, also spezifisch, messbar, ausführbar, relevant und terminierbar, und schließlich mit Belohnung und Stimuluskontrolle arbeitet, etwa das Handy außer Sichtweite legt. Die wichtigste Transfertechnik ist schlicht die Wiederholung, denn Zielverfolgung wird mit Übung zur Gewohnheit.",

      "h": "Ein Rahmen für die Organisation: AGIL, Grundmodell und 7-S",
      "body": [
       "Block 3 hat zwei Gesichter. Die eine Hälfte ist klassische Organisationspsychologie, also Kultur, Wandel und Führung, die andere ist die finanzielle Wertorientierung mit Kennzahlen wie dem Economic Profit. Beide hängen über eine Leitidee zusammen: Eine Organisation soll so gestaltet und geführt werden, dass sie Wert schafft, wirtschaftlich wie sozial. Beginnen wir mit dem weitesten Rahmen, dem AGIL-Modell von Talcott Parsons, das ausdrücklich als klausurrelevant markiert ist. Es besagt, dass jedes soziale System vier Grundfunktionen erfüllen muss. Adaptation steht für Anpassung und Ressourcenbeschaffung, getragen von Ökonomie und Unternehmen. Goal Attainment steht für Zielerreichung und Steuerung, getragen von Politik und Recht. Integration steht für den sozialen Zusammenhalt, getragen von Schule und Ausbildung. Und Latent Structure Maintenance steht für den Erhalt von Strukturen und Werten, getragen von Wissenschaft, Religion und Kunst. Das Modell ordnet das Unternehmen in einen gesamtgesellschaftlichen Funktionszusammenhang ein. Merke dir die vier Buchstaben samt der tragenden Institutionen, das ist ein gesetzter Punkt.",
       "Eine Stufe konkreter steht das Grundmodell der wertorientierten Unternehmensführung. Es denkt in drei verschachtelten Ebenen, der Makroebene der Gesellschaft, der Mesoebene des Unternehmens und der Mikroebene des Individuums, und auf jeder Ebene wirken vier Organisationselemente: Kultur, Sozialisation, Politik und Ressourcen. Das Unternehmen sitzt also eingeklemmt zwischen den externen Erwartungen von außen und den internen Ansprüchen von innen. Der Leitsatz dazu lautet structure follows strategy, die Struktur folgt also der Strategie. Wie man Strategie dann mit der Organisation umsetzt, beschreibt das McKinsey-7-S-Modell mit seinen sieben Elementen Strategy, Structure, Systems, den Shared Values im Zentrum, Skills, Staff und Style. Verwechsle dieses 7-S-Modell nicht mit dem Michigan-Modell aus Block 4.",
       "Zur Struktur selbst gehört die Unterscheidung von Aufbau- und Ablauforganisation. Die Aufbauorganisation ist die statische Frage, wer wofür zuständig ist, mit den drei Grundstrukturen Hierarchie, Matrix und vollständige Vernetzung. Die Ablauforganisation ist die dynamische Frage nach der Reihenfolge der Prozesse. Und schließlich braucht ein Unternehmen eine Vision. Sie wird nach vier Kriterien beurteilt, sie soll richtungsweisend, plausibel, anspornend und prägnant sein, und Saint-Exupéry hat ihr Wesen im Bild der Sehnsucht nach dem endlosen Meer gefasst. Verwechsle die Vision nicht mit dem Slogan: Die Vision ist die interne Sehnsucht, etwa Nikes Crush Adidas, der Slogan die externe Werbebotschaft, Nikes Just do it."

      "h": "Wandel gestalten: OE gegen Change Management",
      "body": [
       "Organisationen müssen sich verändern, und dafür gibt es zwei Schulen, deren Unterschied du sicher beherrschen solltest. Die Organisationsentwicklung, kurz OE, ist die planvolle, langfristige Weiterentwicklung einer Organisation, die die Betroffenen direkt beteiligt, humanistisch ausgerichtet ist, das Wohlbefinden ernst nimmt und sowohl von oben als auch von unten getragen wird, meist ausgelöst von internen Anstößen. Sie ist eher Prozessberatung als Inhaltsberatung. Das Change Management dagegen setzt auf externe Berater, orientiert sich an ökonomischen Kennzahlen wie Kosten und Produktivität, ist projektgetrieben und läuft top-down, oft ausgelöst von externem Druck, mit der größeren Gefahr wenig sozialverträglicher Maßnahmen. Merke: OE beteiligt und ist langfristig-humanistisch, Change Management ist ökonomisch-projektgetrieben und radikaler.",
       "Den Ablauf von Wandel beschreiben zwei Modelle, die du nicht vermischen solltest. Lewins Phasenmodell ist deskriptiv und kennt drei Phasen: das Unfreezing, also das Auftauen und Aufbrechen alter Strukturen, das Moving als eigentliche Veränderung und das Refreezing als Verfestigung. Gerade das Auftauen ist laut Notiz zentral, denn ohne es verpufft jede Veränderung. Kotters Modell ist managementorientiert und kennt acht Stufen, deren Reihenfolge gern vertauscht wird: erstens Dringlichkeit erzeugen, zweitens eine Führungskoalition bilden, drittens eine Vision entwickeln, viertens sie kommunizieren, fünftens Hindernisse beseitigen, sechstens kurzfristige Erfolge definieren, siebtens diese konsolidieren und weiter anstoßen, achtens die Veränderung in der Kultur verankern. In der Praxis kombiniert man beide: Lewins Auftauen entspricht Kotters ersten vier Stufen, das Moving den Stufen fünf und sechs, das Refreezing den Stufen sieben und acht."

      "h": "Die drei Financial Statements",
      "body": [
       "Jetzt zur finanziellen Seite, die im Seminar vertieft wurde. Ein Unternehmen wird über drei Financial Statements abgebildet. Das Income Statement, also die Gewinn-und-Verlust-Rechnung, ist das Geschichtsbuch über einen Zeitraum und stellt Erlöse gegen Kosten. Die Balance Sheet, die Bilanz, ist ein Snapshot zum Stichtag und zeigt Ressourcen und Ansprüche, wobei die Aktiva den Passiva entsprechen. Das Cash Flow Statement zeigt Herkunft und Verwendung der liquiden Mittel und ist die Grundlage jeder Unternehmensbewertung. Das Income Statement liest sich von der Top-Line zur Bottom-Line: Vom Nettoumsatz zieht man die Herstellkosten ab und erhält den Bruttogewinn, nach Abzug der Verwaltungs- und Vertriebskosten das EBITDA, nach den Abschreibungen das EBIT, nach dem Zinsergebnis das EBT und nach Steuern schließlich das Net Income. Der einbehaltene Teil wandert als Gewinnrücklage ins Eigenkapital der Bilanz. Für die Klausur genügt es, das EBIT grob erklären zu können und die Bilanzgrundidee zu kennen, dass die Aktiva den Passiva entsprechen."

      "h": "Woran man gute Verfahren misst: Gütekriterien",
      "body": [
       "Jedes Auswahlverfahren muss sich an den drei Hauptgütekriterien messen lassen, die du schon aus den Forschungsmethoden in Block 1 kennst. Die Objektivität bedeutet, dass das Ergebnis unabhängig davon ist, wer den Test durchführt und auswertet. Die Reliabilität bedeutet, dass eine Wiederholung dasselbe Ergebnis liefert, sie ist also die Zuverlässigkeit. Die Validität bedeutet, dass der Test wirklich misst, was er messen soll. Den wichtigsten Merksatz präg dir ein: Ein Test kann reliabel sein, ohne valide zu sein, also zuverlässig das Falsche messen. Für die Eignungsdiagnostik kommen zwei Spezialformen hinzu. Die prognostische Validität ist die Vorhersagekraft für den künftigen Berufserfolg, ausgedrückt als Korrelation r, und sie ist das zentrale Bewertungskriterium aller Auswahlverfahren. Die inkrementelle Validität ist der Zuwachs an Vorhersagekraft, den man durch die Kombination mehrerer Verfahren gewinnt. Der einschlägige Standard heißt DIN 33430."

    "title": "Die psychologische Seite der Wirtschaftslage",
    "lernziel": "Verstehen, warum Konjunktur und Arbeitslosigkeit nicht nur ökonomische, sondern vor allem psychologische Phänomene sind, und wie Erwartungen, Stimmungen und der Wegfall der latenten Arbeitsfunktionen das Geschehen erklären.",
    "konzepte": "Konjunktur und ihre Indikatoren, Erwartungsbildung, Stimmungen und emotionale Ansteckung, Grenzen der Prognose, Folgen und Moderatoren der Arbeitslosigkeit, latente Funktionen der Arbeit, Attributionen, antizipierte Arbeitslosigkeit, unbezahlte Arbeit und Volunteering.",
    "lesezeit": "etwa 12 bis 14 Minuten",
    "sections": [
     {
      "h": "",
      "body": [
       "Stell dir vor, du führst ein Unternehmen, das Küchen verkauft. Niemand kauft eine neue Küche, weil die Zinsen gefallen sind oder weil das Bruttoinlandprodukt im letzten Quartal um ein halbes Prozent gewachsen ist. Die Leute kaufen, wenn sie sich sicher fühlen, wenn sie glauben, dass es ihnen auch nächstes Jahr noch gut gehen wird. Genau hier beginnt das Kapitel Gesellschaft. Nach den Kapiteln zu Konsum, Arbeit, Organisation, Personal und Geld weitet sich der Blick auf die großen volkswirtschaftlichen Themen: Konjunktur, Arbeitslosigkeit, unbezahlte Arbeit, Regulierung, Globalisierung und Nachhaltigkeit. Der rote Faden ist eine einzige, fast trotzige Behauptung: Für das Verständnis dieser Themen ist die Psychologie mindestens so wichtig wie die Ökonomie. Wer das einmal verinnerlicht hat, liest Wirtschaftsnachrichten anders."

     {
      "h": "Konjunktur ist eine Erwartung, kein Thermometer",
      "body": [
       "Konjunktur meint zunächst nichts Geheimnisvolles, sondern die Lage einer Volkswirtschaft, gemessen an der Auslastung der Produktion, an Nachfrage, Beschäftigung und Zinsen. Sie verläuft zyklisch, in Auf- und Abschwüngen. Unternehmen wollen unbedingt wissen, wie es in den nächsten Monaten weitergeht, weil ihre Umsätze davon abhängen. Die Nachfrage nach Prognosen ist so groß, dass sogar völlig unsichere Vorhersagen, etwa für das übernächste Jahr, gekauft werden. Das ist ein erstes Warnsignal: Wo eine Information so begehrt ist, wird sie auch dann verkauft, wenn sie kaum etwas taugt.",
       "Gemessen wird die Konjunktur mit Indikatoren, und man unterscheidet sie danach, auf welche Zeit sie zielen. Nachlaufende Indikatoren beschreiben die Vergangenheit, gleichlaufende die Gegenwart, vorlaufende die Zukunft. Psychologisch spannend sind die vorlaufenden, die Frühindikatoren, denn sie versuchen das zu erfassen, was noch gar nicht passiert ist. Und woraus speisen sie sich? Vor allem aus Befragungen. Die beiden wichtigsten sind die Konsumentenstimmung und die Erwartungen der Unternehmen. Für die Stimmung der Verbraucher gibt es seit den 1950er Jahren in den USA den Index of Consumer Sentiment, kurz ICS, der aus fünf Fragen berechnet wird: Wie war die Wirtschaftslage im letzten Jahr, wie wird sie im nächsten sein, wie steht der eigene Haushalt jetzt und künftig da, und ist es gerade ratsam, größere Anschaffungen zu tätigen. Vergleichbares wird in Deutschland und Österreich im Auftrag der EU erhoben, in der Schweiz durch das Staatssekretariat für Wirtschaft. Die Erwartungen der Unternehmen messen in Deutschland das ifo-Institut in München mit seinem Geschäftsklimaindex, in der Schweiz die KOF der ETH Zürich, in Österreich das WIFO. Du musst dir nicht alle Kürzel merken, aber die Logik solltest du behalten: Stimmung der Konsumenten und Erwartungen der Firmen sind die zwei Säulen der Frühindikatoren.",
       "Diese Indikatoren decken sich kurzfristig recht gut mit den Verkaufszahlen langlebiger Güter wie Autos und Immobilien. Aber, und das ist der entscheidende Punkt, sie können den Konjunkturverlauf nicht erklären, und auf mittlere bis lange Sicht sind sie schlicht unzuverlässig. Sie zeigen an, sie prognostizieren nicht."
      ]
     },
     {
      "h": "Warum sich die Zukunft nicht vorhersagen lässt",
      "body": [
       "Jetzt kommt der Kern, und es lohnt sich, hier langsam zu lesen. Entscheidend für die Konjunktur sind die individuellen Zukunftserwartungen von Konsumenten und Unternehmern. Viele Ökonomen glauben, man könne diese Erwartungen verlässlich steuern, etwa indem die Zentralbank die Zinsen senkt, sodass sich Sparen weniger lohnt und die Leute mehr ausgeben. Die Realität ist widerspenstiger. In den 2010er Jahren hatten die deutschen Haushalte trotz extrem tiefer Zinsen eine hohe Sparquote. Warum? Weil tiefe Zinsen eben nicht nur bedeuten, dass Sparen weniger bringt, sondern auch, dass die künftigen Renten niedriger ausfallen werden. Wer das im Hinterkopf hat, entwickelt eher pessimistische Erwartungen und spart mehr, nicht weniger. Ein und dasselbe ökonomische Signal kann also in entgegengesetzte Richtungen wirken, je nachdem, was die Menschen daraus schließen.",
       "Der eigentliche Grund, weshalb Konjunkturprognosen so schwer sind, liegt aber noch tiefer: Menschen beeinflussen sich in ihren Erwartungen gegenseitig. Erwartungen entstehen aus eigenen Erfahrungen, aus den Erfahrungen anderer, aus Nachrichten in den Medien, aus dem Vertrauen in Politiker und Institutionen, und vor allem aus den Erwartungen der Mitmenschen. Eine deutsche Studie für die Jahre 2001 bis 2008 zeigte, dass eine längere Dominanz negativer Wirtschaftsnachrichten in den Medien zu pessimistischen Erwartungen führte. Wenn aber Erwartungen sich gegenseitig anstecken, dann können sich Signale selbst verstärken, und der Auslöser eines Umschwungs kann lächerlich klein sein, etwa der Konkurs eines Traditionsbetriebs. Selbst bei gewichtigen Anlässen wie einem Krieg oder einem unerwarteten Wahlausgang bestimmen soziale Einflüsse den genauen Zeitpunkt. Man kann nicht sauber begründen, warum die Zinsen für Interbankkredite in den USA ausgerechnet am 9. August 2007 sprunghaft stiegen. Die Finanzkrise hätte ebenso gut früher oder später beginnen können.",
       "Dazu kommt die Rolle der Stimmungen. Ein hübsches Konzept ist die stimmungskongruente Informationsaufnahme: Wer guter Stimmung ist, nimmt bevorzugt positive Informationen auf und erinnert sie auch besser, wer schlechter Stimmung ist, das Gegenteil. Das erklärt, warum Auf- und Abschwünge eine gewisse Beharrlichkeit haben, warum sie also nicht sofort kippen. Gut erforscht ist außerdem die emotionale Ansteckung, die emotional contagion: Stimmungen springen über Stimme, Gestik und Mimik auf andere über, bewusst und unbewusst. Dass sich Stimmungen schon auf Kleinkinder übertragen, deutet darauf hin, dass dieser Mechanismus nicht erlernt, sondern angeboren ist. Vermutet werden sogenannte Spiegelneurone, also Nervenzellen, die beim bloßen Betrachten einer Handlung dasselbe Aktivitätsmuster zeigen wie beim eigenen Tun. Aber Vorsicht, und das ist ein typischer Denkfehler: Man kann die Konjunktur nicht einfach mit Stimmungen erklären, wenn man die Stimmung an genau denselben Verhaltensweisen misst wie die Konjunktur, etwa an den Konsumausgaben. Dann dreht man sich im Kreis. Die Stimmung müsste unabhängig von ihren Folgen erfasst werden, und das gelingt bis heute kaum.",
       "Wenn du dir aus diesem Abschnitt eine einzige Einsicht mitnimmst, dann diese: Die Konjunktur lässt sich langfristig prinzipiell nicht vorhersagen. Der Grund ist elegant. Wüssten wir heute sicher, dass die Aktienkurse in drei Monaten steigen, dann würden alle sofort kaufen, und die Kurse stiegen schon heute. Eine verlässliche Vorhersage würde sich selbst zunichtemachen. Was die Wirtschaftspsychologie leisten kann, ist nicht die Prophezeiung, sondern das Verständnis der Mechanismen, und damit die Korrektur allzu simpler Vorstellungen. Genau an dieser Stelle notierte der Dozent einen Gedanken zu Keynes, den du dir für die Klausur merken solltest: dass es auch der übernächsten Generation gut gehen soll und dass langfristige Wohlstandssicherung Innovation und Entwicklung braucht. Das schlägt die Brücke zum Nachhaltigkeitsgedanken, der dich im zweiten Teil erwartet.",
       ". . ."
      ]

     {
      "h": "Arbeitslosigkeit trifft die Seele, nicht nur das Konto",
      "body": [
       "Der dunkelste Punkt eines Abschwungs ist die Arbeitslosigkeit, und hier wird die Psychologie sehr konkret. Arbeitslosigkeit ist regelmäßig eine der größten Sorgen der Bevölkerung, und das aus gutem Grund. Metaanalysen zeigen, dass unter Arbeitslosen im Mittel 34 Prozent mit nennenswerten psychischen Problemen kämpfen, gegenüber 16 Prozent bei Erwerbstätigen. Befragungen zur Lebenszufriedenheit ergeben übereinstimmend, dass keine andere Ursache die Zufriedenheit so stark senkt wie Arbeitslosigkeit. Und der Zusammenhang ist nicht bloß Korrelation: Längsschnittstudien, die dieselben Menschen über die Zeit verfolgen, zeigen, dass der Jobverlust das Befinden verschlechtert und der Wiedereinstieg es verbessert. Die Arbeitslosigkeit ist also die Ursache, nicht nur ein Begleitumstand.",
       "Die spannende Frage ist das Warum. Man könnte naiv vermuten, es liege am Geld, an den geringeren Konsummöglichkeiten. Das ist erstaunlicherweise nicht der Hauptgrund. Entscheidend ist der Verlust dessen, was Marie Jahoda die latenten Funktionen der Erwerbsarbeit nannte. Arbeit gibt uns mehr als Lohn. Sie legt uns eine feste Zeitstruktur auf, sie weitet unsere sozialen Erfahrungen über die Familie hinaus, sie lässt uns an kollektiven Zielen und Anstrengungen teilnehmen, sie weist uns Status und Identität zu, und sie bietet eine regelmäßige Tätigkeit, die viele Menschen durchaus wollen. Fällt all das weg, entsteht ein Mangel, der mit dem fehlenden Gehalt allein nicht zu erklären ist. Diese fünf latenten Funktionen sind ein klassischer Prüfungsinhalt, und du verstehst sie am besten, wenn du dir vorstellst, was dir an einem dauerhaft strukturlosen, kontaktlosen Tag fehlen würde.",
       "Arbeitslosigkeit trifft aber nicht alle gleich hart. Kirchler hat die Moderatoren zusammengetragen, also die Faktoren, die den Schweregrad mitbestimmen. Die Dauer spielt eine Rolle, wobei sich das Befinden zunächst verschlechtert und sich nach etwa neun Monaten oft auf niedrigem Niveau stabilisiert. Wer der Arbeit subjektiv wenig Bedeutung beimisst, leidet weniger. Wichtig ist, wie jemand die Ursache attribuiert, dazu gleich mehr. Persönlichkeitsmerkmale wirken mit, vor allem die Kontrollüberzeugung, also der Glaube, bald wieder eine passende Stelle zu finden. Das Alter zählt, ebenso sinnvolle Aktivitäten, die den Alltag strukturieren, frühere Erfahrungen mit Arbeitslosigkeit und die soziale und emotionale Unterstützung aus dem Umfeld. Eine Metaanalyse fand, dass Männer stärker leiden als Frauen und dass der Partnerschaftsstatus keinen Einfluss hat, während Religiosität und Hobbys helfen. Wiswede hält die Kontrollüberzeugung für den wohl entscheidenden Moderator, und das ist intuitiv einleuchtend: Wer glaubt, die Lage in der Hand zu haben, zerbricht nicht so leicht daran.",
       "Bei den Attributionen lohnt ein genauer Blick, weil das Ergebnis auf den ersten Blick paradox wirkt. Man kann Arbeitslosigkeit als vorübergehend oder dauerhaft deuten und als selbstverschuldet, also internal, oder als strukturell bedingt, also external. Internal wären mangelnde Motivation oder Flexibilität, external etwa fortschreitende Rationalisierung oder engstirnige Vorgesetzte. Nun zeigt eine deutsche Studie, dass gerade die internal attribuierenden Arbeitslosen schneller wieder eine Stelle finden. Das klingt zunächst hart, ergibt aber Sinn: Wer die Ursache bei sich selbst sucht, sieht auch bei sich den Hebel und wird aktiv, während jemand, der alles auf äußere Mächte schiebt, eher resigniert. Eng verwandt ist die antizipierte Arbeitslosigkeit, also die bloße Angst vor dem Jobverlust. Borg unterscheidet hier affektive Befürchtungen, das diffuse Bangen, von kognitiven Bedenken, dem nüchternen Abwägen. Schon diese Unsicherheit senkt Leistung und Einstellung zur Arbeit, weil Betroffene sich innerlich zurückziehen, um einen möglichen Verlust besser zu verkraften.",
       ". . ."
      ]

     {
      "h": "Die unsichtbare Wirtschaft: unbezahlte Arbeit und Volunteering",
      "body": [
       "Zum Schluss dieses Teils ein blinder Fleck der öffentlichen Debatte. Wenn wir von der Wirtschaft reden, meinen wir meist den formellen Sektor mit bezahlten, besteuerten Jobs. Der ist aber nur ein Ausschnitt. Unbezahlte Arbeit umfasst alle Tätigkeiten, die nicht entlohnt werden, obwohl sie es grundsätzlich könnten: Hausarbeit, Kinderbetreuung, Eigenarbeit am Haus, Nachbarschaftshilfe, Gemeinschaftsgärten. Der Oberbegriff dafür ist Selbstversorgungswirtschaft. Verwechsle das nicht mit der Schattenwirtschaft im engeren Sinn, die illegale Dinge meint, also Schwarzarbeit, Schmuggel, Drogenhandel. Die Zahlen sind verblüffend: In Deutschland wurden 2013 rund 89 Milliarden Stunden unbezahlt gearbeitet, mehr als die 66 Milliarden Stunden Erwerbsarbeit. Diese Leistung taucht im Bruttoinlandprodukt nicht auf, obwohl sie wesentlich zum Wohlstand beiträgt. Das BIP ist also ein lückenhaftes Maß für das, was eine Gesellschaft tatsächlich leistet.",
       "Ein besonders interessanter Teil davon ist die Freiwilligenarbeit, das Volunteering. Sie passiert nicht spontan, sondern ist Ergebnis einer bewussten Entscheidung, und genau deshalb fragt man nach den Motiven. Clary und Kollegen nennen sechs psychologische Funktionen, die je nach Person unterschiedlich stark wirken. Man engagiert sich aus Werten wie Nächstenliebe, aus dem Wunsch nach Erfahrung und dem Einsatz brachliegender Fähigkeiten, für den eigenen Selbstwert und das persönliche Wachstum, für die Karriere, zur sozialen Anpassung, also um Beziehungen zu pflegen, und zum Schutz, um etwa Schuldgefühle zu mindern oder eigene Probleme zu bearbeiten. Meist liegen mehrere Motive gleichzeitig vor. Was die Aufgaben selbst attraktiv macht, ist an erster Stelle ihre Sinnhaftigkeit, dann die Autonomie, also genau die Merkmale, die in der bezahlten Arbeit oft hinter die reine Existenzsicherung zurücktreten. Organisiert ein Unternehmen solche Einsätze, spricht man von Corporate Volunteering.",
       "Damit hast du die erste Hälfte von Block 6 beisammen. Präge dir für die Klausur drei Dinge besonders ein: erstens, dass Erwartungen ansteckend sind und Konjunkturprognosen deshalb scheitern; zweitens die fünf latenten Funktionen der Arbeit, die erklären, warum Arbeitslosigkeit so tief trifft; und drittens den Unterschied zwischen Selbstversorgungswirtschaft und Schattenwirtschaft. Im zweiten Teil geht es darum, wie der Staat Verhalten lenkt, und warum das bei kollektiven Problemen wie dem Klima an Grenzen stößt."
      ]

     {
      "h": "Vier Wege, Märkte zu lenken",
      "body": [
       "Regulierung meint alle staatlichen Maßnahmen, die dafür sorgen, dass Märkte im Sinne politischer und gesellschaftlicher Ziele funktionieren. Dafür gibt es vier Werkzeugkästen. Der erste sind schlichte Gebote und Verbote. Der zweite sind marktwirtschaftliche Instrumente, etwa Lenkungssteuern auf Alkohol, Tabak oder Energie, die ein Verhalten verteuern, ohne es zu verbieten. Der dritte ist die Lenkung des Verhaltens über psychologische Einsichten. Und der vierte, eine Zuspitzung des dritten, ist der libertäre Paternalismus. In den letzten Jahren sind vor allem die letzten beiden populär geworden. Viele Regierungen haben eigene Verwaltungseinheiten geschaffen, um Regulierung mit psychologischem Wissen so zu verfeinern, dass man Ziele mit möglichst wenigen Verboten erreicht. Ausgelöst haben das der Rechtswissenschaftler Cass Sunstein und der Verhaltensökonom Richard Thaler, die die Begriffe libertarian paternalism und Nudge, also Stupser, geprägt haben.",
       "Den Begriff libertärer oder sanfter Paternalismus solltest du wörtlich draufhaben, denn der Dozent hat ihn eigens hervorgehoben. Er bezeichnet einen Ansatz, der die Entscheidungen von Individuen zu deren eigenem Vorteil in bestimmte Richtungen lenkt, ohne die Wahlfreiheit einzuschränken. Das Wort paternalistisch steckt drin, weil jemand entscheidet, was gut für dich ist; das Wort libertär, weil du jederzeit anders könntest. Ein Nudge schubst, er zwingt nicht."

     {
      "h": "Warum Stupsen überhaupt wirkt",
      "body": [
       "Damit du nicht nur weißt, dass Nudges wirken, sondern auch warum, hat Sunstein die zugrunde liegenden Erkenntnisse vier Themenbereichen zugeordnet. Erstens die Trägheit und das Aufschieben. Wir verschieben unangenehme Dinge, und das schadet Gesundheit, Finanzen oder politischer Beteiligung. Vorgegebene Standards und einfache Handlungsanweisungen helfen; die Aufforderung, sich impfen zu lassen, wirkt besser, wenn gleich mitgeteilt wird, wann und wo. Zweitens die Darstellung, das Framing, und die Salienz. Wie eine Information präsentiert wird, verändert das Verhalten. Der Hinweis auf einen Geldverlust beim Kauf ineffizienter Geräte wirkt stärker als der Hinweis auf einen Gewinn bei sparsamen, und ein Joghurt mit 80 Prozent fettfrei verkauft sich besser als einer mit 20 Prozent Fett, obwohl es dasselbe ist. Drittens die sozialen Einflüsse. Was wir für die Norm in unserer Gemeinschaft halten, lenkt uns stark, gerade in unsicheren Situationen, und Kooperation beruht auf Fairness und der Erwartung, dass andere ebenfalls mitziehen. Viertens unsere Schwierigkeiten mit Wahrscheinlichkeiten. Menschen neigen zu unrealistischem Optimismus, schätzen das eigene Risiko zu niedrig ein und konzentrieren sich, besonders unter starken Emotionen, auf das Ergebnis statt auf dessen Wahrscheinlichkeit.",
       "Aus diesen vier Einsichten ergeben sich vier besonders wirksame Werkzeuge, und auch diese Liste ist Prüfungsstoff. Erstens Deklarationspflichten, die informierte Entscheidungen ermöglichen, etwa die Warnbilder auf Zigarettenpackungen oder die Energieetiketten auf Geräten. Zweitens vorgegebene Standardoptionen, die Defaults, und hier kommt das eindrücklichste Beispiel des ganzen Kapitels: die Organspende. In Ländern mit einer Widerspruchslösung, dem Opt-out, bei dem Zustimmung angenommen wird, solange niemand aktiv widerspricht, sind über 90 Prozent zur Spende bereit. In Ländern mit einer Zustimmungslösung, dem Opt-in, wie in Deutschland, der Schweiz und den USA, geben in den USA nur 28 Prozent ihre Organe explizit frei. Dieselben Menschen, dieselbe Grundeinstellung, völlig andere Ergebnisse, nur weil die Voreinstellung anders ist. Drittens die Erhöhung der Salienz: In den USA senkt eine separat ausgewiesene Alkoholsteuer den Konsum stärker, als wenn sie schon im Preis steckt, weil sie sichtbarer ist. Viertens die Unterstützung sozialer Normen, indem man auf das Verhalten der Mehrheit hinweist. Hier lauert aber eine Falle, die du dir merken solltest: Lenkt man die Aufmerksamkeit auf ein verbreitetes Fehlverhalten, etwa indem man betont, wie viele Menschen Steuern hinterziehen oder im Park Müll liegen lassen, kann man dieses Verhalten sogar verstärken, weil es dann normal erscheint."

     {
      "h": "Wo das sanfte Stupsen an Grenzen stößt",
      "body": [
       "Nun der kritische Teil, und der ist mindestens so wichtig wie die Werkzeuge selbst. Nudges sind populär und können viel Schaden vermeiden, wo Urteilsfehler und Selbstkontrollprobleme zu schlechten Entscheidungen führen. Aber sie sind kein Allheilmittel. Kalorienangaben auf Speisekarten in New York und Informationen zum Stromverbrauch in Großbritannien blieben enttäuschend wirkungslos. Vor allem bei sozialen Dilemmata, bei denen individuelle Fehlentscheidungen öffentliche Kosten verursachen, sind verbindliche Lenkungsabgaben oft die bessere Wahl als unverbindliche Stupser.",
       "Hier hilft eine feine, aber wichtige Unterscheidung, die das Lehrbuch als Exkurs führt. Was man gemeinhin sanften Paternalismus nennt, zerfällt eigentlich in zwei Dinge. Der sanfte Paternalismus im engeren Sinn lenkt die Menschen zu ihrem eigenen Vorteil, etwa mit Warnhinweisen auf Zigaretten oder der Vorschrift, dass Schulkantinen Süßigkeiten nicht zuvorderst präsentieren. Die sanfte Wohltätigkeit dagegen lenkt das Verhalten zum Vorteil der Allgemeinheit, ohne es einzufordern, etwa die angenommene Spendenbereitschaft oder die automatische Lieferung von teurerem Ökostrom an alle, die nicht widersprechen. Diese zweite Variante ist heikler, denn sie lädt zum Trittbrettfahren ein: Die ökonomisch Cleveren steigen aus und profitieren auf Kosten der schlecht Informierten, der Trägen und derjenigen, die ihren fairen Beitrag leisten wollen. Genau deshalb gilt: Wo öffentliche Güter im Spiel sind, sind verbindliche Regeln oft fairer und manchmal unvermeidbar.",

      "h": "Globalisierung verändert nicht nur Märkte, sondern Identitäten",
      "body": [
       "Globalisierung ist nichts Neues, sie läuft seit Jahrhunderten, hat sich aber durch billige Kommunikation und billigen Transport stark beschleunigt. Die Zahl der Mobilfunkverträge stieg von 738 Millionen im Jahr 2000 auf 7 Milliarden 2015, die der Internetnutzer von 400 Millionen auf 3,2 Milliarden. Wirtschaftlich führt das zu globaler Arbeitsteilung und globalem Wettbewerb. Unternehmen sind nicht mehr an einen Standort gebunden und optimieren ihre Kosten über viele Länder, sodass auch Arbeitskräfte und ganze Standorte in den Wettbewerb geraten. Textilarbeiterinnen in der Türkei konkurrieren mit solchen in Bangladesch. Das verbilligt Konsumgüter und steigert den materiellen Wohlstand, hat aber Schattenseiten: Volkswirtschaften verlieren Gestaltungsspielraum, es entsteht Druck, Steuern sowie Sozial- und Umweltstandards niedrig zu halten, und internationale Konzerne lassen sich schwer besteuern. Solange die Globalisierung der Standards der Globalisierung der Märkte hinterherhinkt, gibt es gute Gründe für Globalisierungskritik.",
       "Psychologisch am interessantesten ist aber eine andere Konsequenz. Nach Arnett verändert die Globalisierung die Identitäten der Menschen, und er nennt vier Folgen. Erstens entstehen bikulturelle Identitäten: Viele Jugendliche wachsen mit einem globalen Bewusstsein auf, halten aber privat an ihrer lokalen Identität fest, was Beweglichkeit bringt, aber auch innere Spannungen. Zweitens kommt es zu Identitätskonflikten, wenn die Anpassung misslingt; das Vertrauen in die eigene Kultur geht verloren, die globale bleibt unerreichbar, und besonders dort, wo die Unterschiede groß sind, steigen die Raten von Depression, Suizid, Drogenkonsum und Gewalt unter jungen Menschen. Drittens gibt es selbstgewählte Kulturen: Identität beruht weniger auf vorgegebenen Rollen als auf eigenen Entscheidungen, und manche schließen sich Gruppen an, die mehr Sinn und Struktur bieten, oft religiös-fundamentalistisch, manchmal aber auch säkular wie die Heavy-Metal-Szene. Viertens dehnt sich die Phase des beginnenden Erwachsenseins aus, das emerging adulthood, in der junge Leute Ausbildungen, Beziehungen und Weltbilder ausprobieren. Diese vier Konsequenzen sind ein typischer Prüfungsblock. Der zentrale Satz, an dem du sie aufhängst, lautet: Globalisierung ist nicht nur ein ökonomischer, sondern ein Identitätsprozess.",

     {
      "h": "Nachhaltigkeit ist im Kern ein Kooperationsproblem",
      "body": [
       "Damit sind wir beim letzten und vielleicht wichtigsten Thema. Nachhaltigkeit heißt, die Bedürfnisse der Gegenwart zu befriedigen, ohne die Möglichkeiten künftiger Generationen zu beeinträchtigen; so lautet die vielzitierte Definition der WCED von 1987. Diesen Satz solltest du sinngemäß wiedergeben können. Doch warum verhalten wir uns so oft nicht nachhaltig? Die Antwort des Kapitels ist klar: wegen sozialer Dilemmata, also Konflikten zwischen Eigennutz und Gemeinnutz. Für den Einzelnen ist es oft rational, die Folgen des eigenen Handelns für andere, für die Umwelt oder für künftige Generationen zu ignorieren. Es lohnt sich, den Abfall auf die Straße zu werfen, solange nur wenige das tun. Würden es alle tun, litten alle. Aus kollektiver Sicht braucht es also Regeln. Unter Ökonomen dominiert die Ansicht, Nachhaltigkeit erreiche man am besten durch geänderte Regeln, vor allem durch Anreize wie eine CO2-Abgabe. Viele Psychologen halten dagegen, es brauche vor allem eine Änderung der sozialen Normen. Wer recht hat, hängt von den Bedingungen ab.",
       "Um das zu klären, haben Verhaltensökonomen unzählige Experimente gemacht, die Public good games. Dabei legen Personen einen Teil ihres Startkapitals in eine gemeinsame Kasse, deren Inhalt anschließend verdoppelt und gleichmäßig verteilt wird. Die reine ökonomische Theorie sagt voraus, dass niemand etwas einzahlt, weil sich Trittbrettfahren immer lohnt. Die Realität sieht anders aus: Die Beiträge liegen im Mittel zwischen 40 und 60 Prozent. Sie sinken bei mehrmaliger Wiederholung, bleiben aber über null; sie sind höher mit festen als mit zufälligen Partnern; sie steigen, wenn man sich sehen oder miteinander reden kann; und sie steigen, wenn man unkooperative Mitspieler bestrafen darf, selbst wenn das den Bestrafenden etwas kostet. Daraus folgt eine schöne Erkenntnis: Die meisten Menschen sind weder reine Egoisten noch bedingungslose Heilige, sondern bedingt kooperativ. Sie kooperieren, sofern die anderen es auch tun. Diese Norm der Gegenseitigkeit, die Reziprozität, ist der Schlüssel zum ganzen Thema. Kooperation gelingt in überschaubaren, nicht anonymen Situationen leicht, zwischen einem Landwirt und einem Imker etwa, in anonymen Märkten dagegen kaum, sodass es dort verbindliche Regeln braucht.",
       "Genau dieses Dilemma macht das Seminar mit einem Spiel erfahrbar. Vier Gruppen entscheiden sich in jeder Runde geheim für Strategie X oder Y, ohne miteinander zu reden. Wählen alle vier X, verlieren alle 10 Euro. Bei drei X und einem Y verliert jedes X 10 Euro, das eine Y gewinnt 30. Bei zwei zu zwei gewinnen die X je 20 und die Y verlieren je 20. Bei einem X und drei Y gewinnt das X 30, die Y verlieren je 10. Wählen alle Y, gewinnen alle 10. Strategie X ist also die Defektion, der Eigennutz, Strategie Y die Kooperation. Individuell lohnt sich X in fast jeder gemischten Konstellation, kollektiv ist aber das gemeinsame Y optimal, während das gemeinsame X allen schadet. Es ist ein N-Personen-Gefangenendilemma. Gespielt werden zehn Runden mit Startkapital, und in einzelnen Runden verfünf- oder verzehnfachen Bonusmultiplikatoren den Einsatz, was die Versuchung zur Defektion am Ende stark erhöht. Das Seminar nennt als Anwendung das Scheitern von Klimaverhandlungen am Gefangenendilemma und schließt mit dem Verweis auf eine Wirtschaft, die sich an der Natur orientiert. Du siehst sofort, dass dieses Spiel exakt die Befunde der Public good games illustriert.",
       "Dass das nicht nur Laborspielerei ist, zeigt eine Studie von Bechtel und Scheve. Sie befragten je 2000 Menschen in Deutschland, Frankreich, Großbritannien und den USA, welche Merkmale einer globalen Klimavereinbarung ihre Unterstützung beeinflussen. Eine Rolle spielten die Kosten, die Anzahl der mitmachenden Länder, deren Emissionsanteil, die Höhe der Sanktionen und die Art der Kontrolle. Den stärksten Effekt neben den Kosten hatte die Anzahl der kooperierenden Länder. Mit anderen Worten: Reziprozität wirkt auch im ganz Großen. Viele Menschen sind bereit, ihren Teil beizutragen, wenn ihre Regierung sicherstellt, dass die anderen Länder ebenfalls liefern. Die Psychologie unterstützt die Kooperationsbereitschaft, aber die Koordination braucht formale Regeln und notfalls Sanktionen.",
       "Bleibt die Frage, woran nachhaltiges Verhalten im Alltag scheitert. Auf der Herstellerseite lohnt sich Nachhaltigkeit oft nur, wenn sie sich rechnet, durch Imagegewinn oder Vorsprung; andernfalls bleibt sie ein Nischendasein, oder man bedient das gute Gewissen der Kundschaft nur oberflächlich, was man Greenwash nennt. Auf der Verbraucherseite klafft eine große Lücke zwischen Einstellung und Verhalten. In Befragungen geben sich viele sehr umweltbewusst, handeln aber erst, wenn soziale Normen oder die Kontrolle des Umfelds nachhelfen. Nach van Raaij entscheiden drei Faktoren, ob aus Einstellung Verhalten wird: ob man eine persönliche Verantwortung akzeptiert, ob man sich informiert, und wie man Vor- und Nachteile abwägt, beeinflusst vom regulatorischen und sozialen Umfeld. Wichtig ist auch Rückmeldung über den Erfolg, denn sie stärkt die Kontrollüberzeugung; deshalb führt die Meldung hoher Recyclingquoten nicht zu weniger, sondern zu mehr Recycling. Homburg und Matthies schließlich unterscheiden situative Interventionen, also technische Erleichterungen und finanzielle Anreize, von persönlichen, also Wissen und Normen. Situative Maßnahmen wirken sicher, können aber Trotzreaktionen, also Reaktanz, auslösen. Reine Wissensvermittlung reicht selten. Und auf finanzielle Anreize zu verzichten, wäre falsch, denn bei Pfand oder Lenkungsabgaben geht es nicht ums Bestrafen, sondern darum, dass jeder die vollen Kosten seines Konsums trägt statt sie auf andere abzuwälzen, was schlicht fair ist.",
       "Die Botschaft, mit der du Block 6 verlassen solltest, ist unbequem, aber ehrlich: Appelle an die individuelle Moral reichen nicht, weil unsere Kooperationsbereitschaft auf Gegenseitigkeit beruht und diese auf anonymen Märkten zusammenbricht. Deshalb braucht es faire Regeln, um genau die Normen am Leben zu halten, auf die wir uns sonst gern verlassen würden. Für die Klausur sind die heißesten Kandidaten dieses Teils der libertäre Paternalismus mit seinen vier Werkzeugen, die Unterscheidung zwischen sanftem Paternalismus und sanfter Wohltätigkeit, Arnetts vier Globalisierungsfolgen und die Logik der sozialen Dilemmata samt der 40-bis-60-Prozent-Regel der Public good games."
      ]

    "konzepte": "die vier Aussagentypen (deskriptiv, explikativ, normativ, präskriptiv), Hempel-Oppenheim-Schema und Falsifikation, ikonische und sprachliche Modelle, Modellplatonismus und das Box-Diktum, das Paradigma nach Kuhn, Post Normal Science sowie das H-Form-Kompetenzprofil.",

      "h": "",
      "body": [
       "Stell dir drei Personen vor dem gleichen Marktdiagramm vor. Die erste sagt nur, was sie sieht. Die zweite erklärt, warum die Kurve so verläuft. Die dritte sagt, wie der Markt eigentlich sein sollte. Diese drei reden nicht aneinander vorbei, weil sie verschiedener Meinung wären, sondern weil sie drei völlig verschiedene Dinge tun. Genau hier setzt die Wissenschaftstheorie an, mit der Block 8 beginnt: Bevor eine Aussage richtig oder falsch sein kann, muss klar sein, welche Art von Aussage überhaupt gemeint ist. Die Vertiefung unterscheidet vier solche Typen, und du verstehst sie am besten, wenn du sie als vier verschiedene Tätigkeiten liest, nicht als vier Vokabeln.",
       "Eine deskriptive Aussage beschreibt. Sie bildet einen Ist-Zustand ab und erhebt den Anspruch, das wertfrei zu tun, etwa der Satz, die Arbeitslosenquote liege bei sechs Prozent. Eine explikative Aussage geht einen Schritt weiter und will erklären. Dafür braucht sie Gesetzmäßigkeiten, sogenannte nomologische Hypothesen, und die systematische Verbindung solcher Gesetzesaussagen ergibt eine Theorie. Wie eine Erklärung logisch funktioniert, beschreibt das Hempel-Oppenheim-Schema: Aus einem allgemeinen Gesetz und den Randbedingungen wird das einzelne Ereignis deduktiv abgeleitet. Und weil eine Erklärung nur dann etwas taugt, wenn sie auch scheitern könnte, prüft man nomologische Hypothesen über den Versuch ihrer Falsifikation, am besten im Experiment. Hier schließt sich ein Kreis zu den Schlussbemerkungen aus Block 7: Dort war Falsifizierbarkeit genau das Kriterium, das seriöse Wissenschaft von Esoterik trennt.",
       "Die beiden anderen Aussagearten verlassen das Beschreiben und Erklären und betreten die Welt des Sollens. Eine normative Aussage begründet etwas mit Normen, also mit Regeln, die eine Gesellschaft festgelegt hat. Eine präskriptive Aussage schreibt vor: So soll es sein, so ist es gut, so ist es richtig. Im moralphilosophischen Sinn beschreibt die präskriptive Ethik genau diesen Sollzustand menschlichen Handelns. Der Gedanke, den du dir hier merken solltest, ist die saubere Trennung: Aus einem Ist folgt nicht von selbst ein Soll. Wer beides vermischt, begeht den klassischen Fehlschluss vom Sein auf das Sollen. Nicht zufällig markiert die Notion-Mitschrift genau diese Typologie der Aussagen (Folie 20) als prüfungsrelevant.",
       "Vom Aussagentyp ist es nur ein kleiner Schritt zum Modell, denn Wirtschaftswissenschaft und Wirtschaftspsychologie arbeiten fast ausschließlich mit Modellen, vom Bruttosozialprodukt über die Inflation bis zum Marktgleichgewicht. Ein Modell konstruiert und strukturiert einen Zusammenhang. Man unterscheidet ikonische Modelle, die etwas materiell oder virtuell abbilden, etwa ein Globus oder eine Modelleisenbahn, von sprachlich-semantischen Modellen wie dem Modell des Marktverhaltens. Theorien lassen sich dabei als Teilklasse von Modellen verstehen. So nützlich Modelle sind, sie haben eine Schattenseite, und die heißt Modellplatonismus: die Neigung, ein Modell gegen die Wirklichkeit zu immunisieren, indem man es bei jedem Widerspruch durch Zusatzannahmen rettet, allen voran durch Ceteris-paribus-Klauseln. Streng mathematische Prinzipal-Agent-Modelle mit ihren sehr engen Annahmen rein rationaler, geldmaximierender Akteure sind ein gutes Beispiel. Zwei Sätze fassen die richtige Haltung: George Box sagt, im Grunde seien alle Modelle falsch, aber einige nützlich. Und Eduard Kaeser warnt, die reale Welt sei alles, was nicht ins Modell passe, und gefährlich werde es erst, wenn Modellbauer ihr Modell mit der Realität verwechseln.",
       "Modelle leben nun nicht einzeln, sondern in größeren gedanklichen Familien, und die nennt man Paradigmen. Ein Paradigma ist ein zusammenhängendes, von vielen Forschern geteiltes Bündel aus Leitsätzen, Fragestellungen, Modellen und Methoden, das ganze Epochen überdauert. Thomas Kuhn hat in seinem Werk von 1962 gezeigt, dass ein Paradigma sogar bestimmt, was überhaupt beobachtet wird, welche Fragen man stellt und wie man die Ergebnisse deutet. Wenn zwei Paradigmen aufeinandertreffen, entsteht ein Richtungsstreit, und genau so einen wirst du in Lerntext 4 wiedersehen: den Battle of Ideas zwischen Keynes und Hayek. Über die gewohnte Wissenschaft hinaus beschreibt die Vertiefung schließlich die Post Normal Science. Ihre Lage lässt sich in vier englischen Stichworten fassen: facts uncertain, values in dispute, stakes high, decisions urgent, also unsichere Fakten, umstrittene Werte, hohe Risiken und dringende Entscheidungen. Beim Klimawandel etwa liefert die Wissenschaft nicht einfach fertige Wahrheit, sondern muss relevante Optionen identifizieren, über die Wünschbarkeit von Zukünften streiten und eine erweiterte Gemeinschaft über die Fachexperten hinaus einbeziehen. Dazu passt die Folie 40, die in der Mitschrift ausdrücklich mit dem Vermerk Klausur steht: Sie zeigt ein Kompetenzprofil in H-Form, also zwei sich ergänzende Wissensdomänen, vergleichbar mit Haupt- und Nebenfach, verbunden durch höhere kognitive und sozioemotionale Fähigkeiten und durch künstliche Intelligenz. Wer in einer Post-Normal-Science-Welt mitreden will, braucht genau dieses Profil."

      "body": [
       "Jedes Mal, wenn du eine Aufgabe an jemanden abgibst, den du nicht vollständig kontrollieren kannst, betrittst du das Prinzipal-Agent-Modell. Du beauftragst einen Handwerker, ohne ihm bei jeder Schraube zuzusehen. Du gibst einem Fondsmanager dein Geld, ohne jede seiner Entscheidungen zu prüfen. In all diesen Fällen handelt ein Agent mit eigenen Entscheidungsspielräumen im Auftrag eines Prinzipals. Das Modell stammt aus der Neuen Institutionenökonomik, und sein ganzer Reiz besteht darin, dass es ein scheinbar banales Alltagsproblem präzise macht.",
       "Das Grundproblem hat zwei Zutaten, die erst zusammen gefährlich werden. Die erste ist die Interessendivergenz: Was gut für den Agenten ist, ist nicht automatisch gut für den Prinzipal. Die zweite ist die Informationsasymmetrie: Der Agent weiß mehr über sich und sein Handeln als der Prinzipal. Aus dieser Mischung entstehen die Agency-Kosten, und du solltest dir merken, dass sie aus genau drei Bestandteilen bestehen. Da sind erstens die Überwachungs- und Kontrollkosten, die der Prinzipal trägt, um den Agenten im Blick zu behalten. Da sind zweitens die Signalisierungs- und Garantiekosten, die der Agent auf sich nimmt, um Vertrauen herzustellen. Und da ist drittens der Residualverlust, also der Wohlfahrtsverlust, der trotz aller Mühe übrig bleibt, weil sich die Lücke nie ganz schließen lässt. Dieser dritte Posten ist der gedanklich wichtigste, denn er sagt: Eine perfekte Lösung gibt es nicht, es geht immer nur um Eindämmung.",

    "konzepte": "der Geschäftsmodell-Begriff nach Stähler mit seinen drei Komponenten und Leitfragen, die Fallstudie Aldi und das Working-Capital-Management, die Dynamic Capabilities nach Teece und die Plattformökonomie am Gegensatz Spotify und OnlyFans.",

      "h": "",
      "body": [
       "Die Frage klingt simpel, ist es aber nicht: Womit verdient ein Unternehmen eigentlich Geld? Viele würden mit dem Produkt antworten, und genau das ist der Denkfehler, den Stählers Geschäftsmodell-Begriff korrigiert. Ein Geschäftsmodell wird bewusst nicht über Produkt oder Markt definiert, sondern allein über den gestifteten Nutzen. Es besteht aus drei Komponenten, die du dir am besten als drei Fragen merkst. Die erste ist die Value Proposition, das Nutzenversprechen: Welchen Nutzen ziehen Kunden und andere Stakeholder aus der Verbindung mit dem Unternehmen? Die zweite ist die Architektur der Wertschöpfung: Wie und über welche Stufen wird dieser Nutzen erzeugt? Hier, und erst hier, wohnen übrigens Produkt und Markt. Die dritte ist das Ertragsmodell: Wodurch und aus welchen Quellen fließt das Geld, und wie nachhaltig ist das? Die drei Leitfragen lauten also schlicht: Welchen Nutzen stiftet das Unternehmen, wie erbringt es ihn, und wie verdient es damit Geld?",
       "Wie ergiebig dieses Schema ist, zeigt der Fall Aldi, und er ist deshalb so lehrreich, weil die eigentliche Pointe nicht im Verkaufsregal liegt. Auf der Ebene der Value Proposition steht Aldi für günstige Preise, Verlässlichkeit und zunehmend ein jüngeres, moderneres Markenbild, mit dem klaren Fokus auf langfristige Kundenbindung und den Lifetime Value eines Kunden, also den Wert über die gesamte Kundenbeziehung. Die Wertschöpfungsarchitektur ist ein schlankes Discounter-Modell, in dem Aldi als verlässlicher, zuverlässig zahlender Partner seiner Lieferanten auftritt und die Ware oft schon innerhalb einer Woche abverkauft. Die eigentliche Finanzpointe steckt nun im Ertragsmodell, genauer im Working-Capital-Management. Aldi vereinnahmt den Umsatz sofort, geschätzt rund 370 Millionen Euro pro Tag, zahlt seine Lieferanten aber erst nach etwa 90 Tagen, also lange nachdem die Ware verkauft ist. In dieser Zeitspanne sammelt sich ein riesiger Kapitalbestand an, geschätzte 30 Milliarden Euro, die Aldi weiter investiert. Aus dem Discounter wird so beinahe eine große Geldeinsammelstelle, und die Vorlesung stellt halb provokativ sogar die Frage nach einer Art Giralgeldschöpfung. Dass dabei eine Handelsspanne von nur etwa einem halben Prozent reicht, um einen Tagesgewinn in der Größenordnung von rund 1,85 Millionen Euro zu erzielen, macht deutlich, dass hier mehrere Logiken zugleich wirken, eine Wachstums-, eine Marketing-, eine Lieferantenmanagement- und eine Finanzmarktlogik.",

       "Der vielleicht größte wirtschaftspolitische Streit des 20. Jahrhunderts hat zwei Namen, und die Dokumentarfilmreihe Commanding Heights macht ihn anschaulich. Dieses Seminar ist ausdrücklich als klausurrelevant überschrieben, also lohnt es sich, den Gegensatz wirklich zu verstehen und nicht nur zwei Namen zu lernen. John Maynard Keynes steht für die Überzeugung, dass Märkte instabil sein können und der Staat eingreifen soll, indem er die Nachfrage steuert und über antizyklische Fiskal- und Geldpolitik für Vollbeschäftigung und Stabilität sorgt. Diese Richtung verbindet man mit Cambridge und der keynesianischen Schule. Friedrich August von Hayek steht für das genaue Gegenteil: Vertrauen in den freien Markt und in den Preismechanismus als dezentralen Informationsträger, tiefe Skepsis gegenüber zentraler Planung und die Priorität stabilen Geldes. Diese Richtung verbindet man mit der Österreichischen Schule und, über Milton Friedman, mit Chicago und der London School of Economics. Du erkennst hier das Paradigmen-Duell aus Lerntext 1 wieder: zwei geschlossene Weltbilder, die auf dieselben Fragen entgegengesetzte Antworten geben.",
       "Aus diesem Streit folgt zunächst, woran man eine Volkswirtschaft überhaupt misst. Auf Keynes gehen die klassischen makroökonomischen Kenngrößen zurück, mit denen man eine Wirtschaft steuert und beurteilt: die Arbeitslosenquote, das Bruttoinlandprodukt und die Inflationsrate. Heute diskutiert man darüber hinaus neue ökonomische und psychologische Maße, die ein volleres Bild geben sollen, etwa Sicherheit und Finanzstabilität, einen Happiness-Index für die Zufriedenheit, den CO2-Fußabdruck, einen Korruptionsindex und den Human-Development-Index. An dieser Stelle knüpft das Seminar sichtbar an die Glücksforschung und die Nachhaltigkeitsdebatte aus den Blöcken 6 und 7 an. Der Gegensatz zieht sich auch durch das Finanzsystem: Bei Keynes steht die Regulierung im Vordergrund, um Instabilität zu verhindern, während bei Hayek der freie Markt Vorrang hat und stabiles Geld höchste Priorität genießt, mit einer angestrebten Inflation von unter zwei Prozent.",
       "Wie sehr Ideen zu Institutionen werden, zeigt Bretton Woods, die Wirtschaftsordnung für die Nachkriegszeit, an der Keynes beteiligt war. Damals entstanden der Internationale Währungsfonds, dessen Vorsitz traditionell aus Europa kommt, und die Weltbank als Weltentwicklungsbank, deren Vorsitz traditionell die USA stellen. Diese beiden Vorsitze sind ein beliebtes Prüfungsdetail, also merke dir die Zuordnung. Dass diese Ordnung in Bewegung ist, zeigt die Gründung der Asiatischen Infrastrukturinvestmentbank im Jahr 2015, einer Konkurrenzorganisation, die vor allem Russland und China vorantrieben, weil ihnen Reformen der alten Institutionen zu langsam gingen. Damit deutet sich eine neue Blockbildung an. Ein weiteres Schlüsselthema sind die Property Rights, die gesicherten Eigentumsrechte. Ohne die klare, verbriefte Zuordnung, wem was gehört, lässt sich Kapital nicht mobilisieren, und gerade in vielen Entwicklungsländern fehlt diese Grundlage, während Korruption als große Barriere wirkt. Der Krisenvergleich rundet das Bild: Rettungsaktionen für ganze Volkswirtschaften können zur Zerreißprobe werden, denn manche sind too big to fail, andere wiederum too small to bail out.",
       "Der entscheidende Punkt ist, dass dieser Battle of Ideas nicht entschieden ist. Globalisierung, Nachhaltigkeit, Corporate Social Responsibility, Populismus und Fake News halten ihn lebendig, vor dem Hintergrund der Entwicklungen in den USA, Russland, dem Mittleren Osten und China, und die Neue Seidenstraße steht für eine neue Blockbildung. Die wirtschaftspsychologische Konsequenz, die das Seminar zieht, ist klar: Regelungslücken sollte man nachhaltig und sozial füllen, statt den kleinsten gemeinsamen Nenner und den größten Profit zu suchen, und Unternehmen stärker in die Verantwortung nehmen, und zwar entlang von Absatzmarkt, Beschaffungsmarkt und Finanzmarkt.",
       "Damit ist die Brücke zur Ethik geschlagen, und der Fall Theranos macht sie greifbar. Die Gründerin Elizabeth Holmes versprach eine revolutionäre Bluttechnologie, die es nie gab, und wieder erkennst du das Prinzipal-Agent-Modell: Investoren konnten ihre verborgenen Eigenschaften und Absichten nicht durchschauen, bis es zu spät war. Um solches Handeln zu beurteilen, führt das Seminar einen Dreiklang ein, den du nicht vermischen darfst. Legalität bedeutet, dass ein Unternehmen gesetzeskonform handelt und geltendes Recht einhält. Legitimität geht weiter und fragt, ob das Handeln auch berechtigt und akzeptiert ist, im Sinne von Stakeholdern, Gesellschaft und ethischen Erwartungen. Ethik schließlich ist die moralische Bewertung des Handelns selbst. Der Clou liegt darin, dass diese Ebenen auseinanderfallen können: Ein Unternehmen kann legal handeln und trotzdem nicht legitim oder nicht ethisch sein, und genau dieses Auseinanderfallen zerstört Vertrauen. Wie schwer ehrliche Einschätzung fällt, zeigen zwei psychologische Zugänge: die Microexpressions nach Paul Ekman, also winzige, unwillkürliche Gesichtsausdrücke, die echte Emotionen verraten, und die Psychologie der Unehrlichkeit nach Dan Ariely, dessen Würfel- und Matrix-Experimente nahelegen, dass viele Menschen in kleinem Umfang schummeln, solange sie ihr Selbstbild als ehrliche Person bewahren können. Dass ausgerechnet Teile von Arielys Forschung später selbst in die Kritik gerieten, ist eine schöne Schlusspointe, denn sie führt dich genau dorthin zurück, wo Block 8 begann: zur Vorsicht gegenüber Modellen, zur Bedeutung von Falsifizierbarkeit und zu der Einsicht, dass am Ende ein Urteil nötig ist, das kein Modell allein fällen kann."
      ]
     }
